<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Portal Pakistan | Pro Edition</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar-link { transition: all 0.3s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
        .ai-processing { background: linear-gradient(90deg, #4f46e5, #7c3aed, #4f46e5); background-size: 200% 100%; animation: gradient-shift 2s ease infinite; }
        @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-xl z-20 flex flex-col h-full transition-all duration-300" id="sidebar">
        <div class="p-6 border-b border-gray-100 flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                <i class="fas fa-motorcycle"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg text-gray-800 leading-tight">Rider Portal</h1>
                <p class="text-xs text-gray-500">Pakistan Pro Edition</p>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="nav-menu">
            <!-- Dynamic Menu Items injected by JS -->
        </nav>

        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-gray-50">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=Rider&background=4f46e5&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate" id="user-name">Loading...</p>
                    <p class="text-xs text-gray-500 truncate" id="user-role">Rider</p>
                </div>
                <button onclick="app.logout()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <!-- Top Header -->
        <header class="bg-white shadow-sm z-10 px-8 py-4 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-gray-800" id="page-title">Dashboard</h2>
                <p class="text-sm text-gray-500" id="current-date">Loading date...</p>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 text-gray-400 hover:text-indigo-600 transition-colors relative">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                </button>
                <div class="h-8 w-px bg-gray-200"></div>
                <button onclick="app.toggleShift()" id="shift-btn" class="px-4 py-2 rounded-full text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition-colors">
                    <i class="fas fa-play mr-2"></i> Start Shift
                </button>
            </div>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto p-8 bg-gray-50 relative" id="main-container">
            <!-- Views will be injected here -->
        </div>
    </main>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl m-4 max-h-[90vh] overflow-y-auto transform transition-all scale-95 opacity-0" id="modal-content">
            <!-- Modal Content -->
        </div>
    </div>

    <script>
        // 🔥 FIREBASE CONFIGURATION - YEH AAPKO FIREBASE CONSOLE SE MILENGE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "dastak-rider-portal.firebaseapp.com",
            projectId: "dastak-rider-portal",
            storageBucket: "dastak-rider-portal.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Application Logic ---
        const app = {
            data: {
                currentUser: null,
                users: [],
                reports: [],
                attendance: [],
                announcements: [
                    { id: 1, title: 'Eid Bonus Policy', content: 'All riders delivering 50+ orders this week get a Rs. 2000 bonus.', date: '2023-10-25', priority: 'high' }
                ],
                currentShift: null,
                commissionSettings: {
                    defaultRate: 10,
                    adminRates: {
                        'Type 1': 10,
                        'Type 2': 12,
                        'Type 3': 15
                    }
                }
            },

            async init() {
                this.updateDate();
                
                // Check if user is already logged in
                auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        // User is signed in, get user data from Firestore
                        await this.loadUserData(user.uid);
                        document.getElementById('sidebar').classList.remove('hidden');
                        document.querySelector('header').classList.remove('hidden');
                        this.showDashboard();
                    } else {
                        // No user signed in
                        this.showLogin();
                    }
                });
            },

            async loadUserData(uid) {
                try {
                    const userDoc = await db.collection('users').doc(uid).get();
                    if (userDoc.exists) {
                        this.data.currentUser = { id: uid, ...userDoc.data() };
                    }
                    // Load reports from Firestore
                    await this.loadReportsFromFirebase();
                } catch (error) {
                    console.error("Error loading user data:", error);
                }
            },

            async loadReportsFromFirebase() {
                try {
                    const reportsSnapshot = await db.collection('reports').orderBy('createdAt', 'desc').get();
                    this.data.reports = reportsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error("Error loading reports:", error);
                }
            },

            updateDate() {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-PK', options);
            },

            // --- Authentication ---
            
            showLogin() {
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in">
                        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                            <div class="text-center mb-8">
                                <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4 shadow-lg shadow-indigo-200">
                                    <i class="fas fa-motorcycle"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
                                <p class="text-gray-500">Sign in to access your portal</p>
                            </div>
                            <form onsubmit="app.handleLogin(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                    <input type="email" id="login-email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="rider@example.com" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <input type="password" id="login-pass" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition-colors shadow-md shadow-indigo-200">
                                    Sign In
                                </button>
                            </form>
                            <div class="mt-4 text-center">
                                <p class="text-sm text-gray-500">Don't have an account? 
                                    <button onclick="app.showSignup()" class="text-indigo-600 font-semibold hover:underline">Sign Up as Rider</button>
                                </p>
                            </div>
                            <div class="mt-6 text-center text-sm text-gray-500 bg-gray-50 p-3 rounded-lg">
                                <p class="font-semibold mb-1">Firebase Connected ✅</p>
                                <p>Data will be saved permanently</p>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('sidebar').classList.add('hidden');
                document.querySelector('header').classList.add('hidden');
            },

            showSignup() {
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in">
                        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                            <div class="text-center mb-8">
                                <div class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4 shadow-lg shadow-green-200">
                                    <i class="fas fa-user-plus"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-800">Join as Rider</h2>
                                <p class="text-gray-500">Create your rider account</p>
                            </div>
                            <form onsubmit="app.handleSignup(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                    <input type="text" id="signup-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Muhammad Ali" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                    <input type="email" id="signup-email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="ali@example.com" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <input type="password" id="signup-pass" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Min 6 characters" minlength="6" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                                    <div class="flex gap-2">
                                        <input type="text" value="+92" readonly class="w-16 px-3 py-2 border border-gray-300 rounded-lg bg-gray-100 text-center">
                                        <input type="tel" id="signup-phone" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="300 1234567" required>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Zone</label>
                                    <select id="signup-zone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none bg-white">
                                        <option value="North">North</option>
                                        <option value="South">South</option>
                                        <option value="East">East</option>
                                        <option value="West">West</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Details</label>
                                    <input type="text" id="signup-vehicle" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Honda 125 - ABC-123">
                                </div>
                                <button type="submit" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold hover:bg-green-700 transition-colors shadow-md shadow-green-200">
                                    Create Account
                                </button>
                            </form>
                            <div class="mt-4 text-center">
                                <p class="text-sm text-gray-500">Already have an account? 
                                    <button onclick="app.showLogin()" class="text-green-600 font-semibold hover:underline">Sign In</button>
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            },

            async handleSignup(e) {
                e.preventDefault();
                const name = document.getElementById('signup-name').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-pass').value;
                const phone = '+92 ' + document.getElementById('signup-phone').value;
                const zone = document.getElementById('signup-zone').value;
                const vehicle = document.getElementById('signup-vehicle').value;

                try {
                    // Create user in Firebase Auth
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // Save user data to Firestore
                    await db.collection('users').doc(user.uid).set({
                        name: name,
                        email: email,
                        phone: phone,
                        zone: zone,
                        vehicle: vehicle,
                        role: 'rider',
                        joinDate: new Date().toISOString().split('T')[0],
                        salaryBase: 15000,
                        commissionRate: 10,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert('Account created successfully! Please sign in.');
                    this.showLogin();
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            },

            async handleLogin(e) {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-pass').value;

                try {
                    await auth.signInWithEmailAndPassword(email, pass);
                    // Auth state listener will handle the rest
                } catch (error) {
                    alert('Invalid credentials: ' + error.message);
                }
            },

            async logout() {
                await auth.signOut();
                this.data.currentUser = null;
                location.reload();
            },

            // --- Navigation & Rendering ---

            renderSidebar() {
                const nav = document.getElementById('nav-menu');
                const isAdmin = this.data.currentUser.role === 'admin';
                
                const menuItems = isAdmin ? [
                    { id: 'admin-dashboard', icon: 'fa-chart-line', label: 'Dashboard' },
                    { id: 'admin-riders', icon: 'fa-users', label: 'Manage Riders' },
                    { id: 'admin-reports', icon: 'fa-clipboard-check', label: 'Review Reports' },
                    { id: 'admin-online-payments', icon: 'fa-credit-card', label: 'Online Payments' },
                    { id: 'admin-attendance', icon: 'fa-calendar-check', label: 'Attendance Log' },
                    { id: 'admin-ai-parser', icon: 'fa-robot', label: 'AI Order Parser' },
                    { id: 'admin-announcements', icon: 'fa-bullhorn', label: 'Announcements' },
                    { id: 'admin-analytics', icon: 'fa-chart-pie', label: 'Analytics' }
                ] : [
                    { id: 'rider-dashboard', icon: 'fa-home', label: 'Dashboard' },
                    { id: 'rider-report', icon: 'fa-file-invoice-dollar', label: 'Daily Report' },
                    { id: 'rider-history', icon: 'fa-history', label: 'My History' },
                    { id: 'rider-payments', icon: 'fa-wallet', label: 'Online Payments' },
                    { id: 'rider-salary', icon: 'fa-money-bill-wave', label: 'Salary & Slips' },
                    { id: 'rider-docs', icon: 'fa-id-card', label: 'My Documents' }
                ];

                nav.innerHTML = menuItems.map(item => `
                    <button onclick="app.navigate('${item.id}')" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 font-medium hover:bg-gray-50" id="nav-${item.id}">
                        <i class="fas ${item.icon} w-5 text-center"></i>
                        ${item.label}
                    </button>
                `).join('');
                
                document.getElementById('user-name').textContent = this.data.currentUser.name;
                document.getElementById('user-role').textContent = isAdmin ? 'Administrator' : `Rider - ${this.data.currentUser.zone}`;
                document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${this.data.currentUser.name}&background=4f46e5&color=fff`;
            },

            navigate(viewId) {
                document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active', 'bg-indigo-600', 'text-white'));
                const activeBtn = document.getElementById(`nav-${viewId}`);
                if(activeBtn) activeBtn.classList.add('active');

                if (viewId === 'rider-dashboard') this.renderRiderDashboard();
                else if (viewId === 'rider-report') this.renderRiderReportForm();
                else if (viewId === 'rider-history') this.renderRiderHistory();
                else if (viewId === 'rider-payments') this.renderRiderPayments();
                else if (viewId === 'rider-salary') this.renderRiderSalary();
                else if (viewId === 'admin-dashboard') this.renderAdminDashboard();
                else if (viewId === 'admin-riders') this.renderAdminRiders();
                else if (viewId === 'admin-reports') this.renderAdminReports();
                else if (viewId === 'admin-online-payments') this.renderAdminOnlinePayments();
                else if (viewId === 'admin-attendance') this.renderAdminAttendance();
                else if (viewId === 'admin-ai-parser') this.renderAIParser();
                else if (viewId === 'admin-analytics') this.renderAdminAnalytics();
                else this.renderRiderDashboard();
            },

            showDashboard() {
                this.renderSidebar();
                if (this.data.currentUser.role === 'admin') {
                    this.renderAdminDashboard();
                } else {
                    this.renderRiderDashboard();
                }
            },

            // --- RIDER VIEWS ---

            renderRiderDashboard() {
                document.getElementById('page-title').textContent = 'Rider Dashboard';
                const container = document.getElementById('main-container');
                
                const myReports = this.data.reports.filter(r => r.riderId === this.data.currentUser.id);
                const todayReport = myReports.find(r => r.date === new Date().toISOString().split('T')[0]);
                const totalEarnings = myReports.reduce((acc, r) => acc + (r.totalEarnings || 0), 0);
                const pendingOnline = myReports.flatMap(r => r.onlinePayments || []).filter(p => p.status === 'pending').reduce((acc, p) => acc + p.amount, 0);

                container.innerHTML = `
                    <div class="space-y-6 fade-in">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Today's Earnings</p>
                                        <h3 class="text-2xl font-bold text-gray-800 mt-1">Rs. ${todayReport ? (todayReport.totalEarnings || 0).toLocaleString() : '0'}</h3>
                                    </div>
                                    <div class="p-2 bg-green-100 rounded-lg text-green-600"><i class="fas fa-wallet"></i></div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Pending Online</p>
                                        <h3 class="text-2xl font-bold text-gray-800 mt-1">Rs. ${pendingOnline.toLocaleString()}</h3>
                                    </div>
                                    <div class="p-2 bg-orange-100 rounded-lg text-orange-600"><i class="fas fa-clock"></i></div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Total Deliveries</p>
                                        <h3 class="text-2xl font-bold text-gray-800 mt-1">${myReports.reduce((acc, r) => acc + (r.orders || []).reduce((o, x) => o + (x.qty || 0), 0), 0)}</h3>
                                    </div>
                                    <div class="p-2 bg-blue-100 rounded-lg text-blue-600"><i class="fas fa-box"></i></div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Commission Rate</p>
                                        <h3 class="text-2xl font-bold text-purple-600 mt-1">${this.data.currentUser.commissionRate || 10}%</h3>
                                    </div>
                                    <div class="p-2 bg-purple-100 rounded-lg text-purple-600"><i class="fas fa-percentage"></i></div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-2">
                                <h3 class="font-bold text-lg mb-4">Quick Actions</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <button onclick="app.navigate('rider-report')" class="p-4 rounded-xl bg-indigo-50 text-indigo-700 hover:bg-indigo-100 transition-colors text-left group">
                                        <i class="fas fa-plus-circle text-2xl mb-2 group-hover:scale-110 transition-transform block"></i>
                                        <span class="font-semibold">Submit Daily Report</span>
                                    </button>
                                    <button onclick="app.toggleShift()" class="p-4 rounded-xl bg-green-50 text-green-700 hover:bg-green-100 transition-colors text-left group">
                                        <i class="fas fa-play-circle text-2xl mb-2 group-hover:scale-110 transition-transform block"></i>
                                        <span class="font-semibold">Start Shift</span>
                                    </button>
                                    <button onclick="app.navigate('rider-payments')" class="p-4 rounded-xl bg-orange-50 text-orange-700 hover:bg-orange-100 transition-colors text-left group">
                                        <i class="fas fa-hand-holding-usd text-2xl mb-2 group-hover:scale-110 transition-transform block"></i>
                                        <span class="font-semibold">Update Online Cash</span>
                                    </button>
                                    <button class="p-4 rounded-xl bg-blue-50 text-blue-700 hover:bg-blue-100 transition-colors text-left group">
                                        <i class="fas fa-camera text-2xl mb-2 group-hover:scale-110 transition-transform block"></i>
                                        <span class="font-semibold">Upload Delivery Proof</span>
                                    </button>
                                </div>
                            </div>

                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h3 class="font-bold text-lg mb-4">Announcements</h3>
                                <div class="space-y-4">
                                    ${this.data.announcements.map(a => `

            addOnlinePaymentRow() {

            calculateTotals() {
                const userCommission = this.data.currentUser.commissionRate || 10;
                
                // Orders with Commission
                let grossTotal = 0;
                let commissionTotal = 0;
                
                [1, 2, 3].forEach(i => {
                    const qty = parseFloat(document.getElementById(`order-qty-${i}`).value) || 0;
                    const rate = parseFloat(document.getElementById(`order-rate-${i}`).value) || 0;
                    const gross = qty * rate;
                    const commission = gross * (userCommission / 100);
                    
                    document.getElementById(`order-gross-${i}`).textContent = `Rs ${gross.toLocaleString()}`;
                    document.getElementById(`order-commission-${i}`).textContent = `Rs ${commission.toLocaleString()}`;
                    
                    grossTotal += gross;
                    commissionTotal += commission;
                });
                
                document.getElementById('grand-gross-total').textContent = `Rs ${grossTotal.toLocaleString()}`;
                document.getElementById('grand-commission-total').textContent = `Rs ${commissionTotal.toLocaleString()}`;

                // Online Payments
                let onlinePending = 0;
                let onlineReceived = 0;
                
                document.querySelectorAll('#online-payments-list > div').forEach(row => {
                    const amt = parseFloat(row.querySelector('.online-amt').value) || 0;
                    const status = row.querySelector('.online-status').value;
                    
                    if (status === 'pending') onlinePending += amt;
                    else onlineReceived += amt;
                });

                document.getElementById('online-pending-display').textContent = `Rs ${onlinePending.toLocaleString()}`;
                document.getElementById('online-received-display').textContent = `Rs ${onlineReceived.toLocaleString()}`;

                // Expenses
                const fuel = parseFloat(document.getElementById('exp-fuel').value) || 0;
                const food = parseFloat(document.getElementById('exp-food').value) || 0;
                const maint = parseFloat(document.getElementById('exp-maint').value) || 0;
                const expensesTotal = fuel + food + maint;

                const opening = parseFloat(document.getElementById('opening-balance').value) || 0;
                const final = opening + commissionTotal - onlineReceived - expensesTotal;

                // Update Summary UI
                document.getElementById('sum-opening').textContent = `Rs ${opening.toLocaleString()}`;
                document.getElementById('sum-commission').textContent = `Rs ${commissionTotal.toLocaleString()}`;
                document.getElementById('sum-online').textContent = `Rs ${onlineReceived.toLocaleString()}`;
                document.getElementById('sum-expenses').textContent = `Rs ${expensesTotal.toLocaleString()}`;
                document.getElementById('sum-final').textContent = `Rs ${final.toLocaleString()}`;
            },

            previewImage(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('proof-preview-img').src = e.target.result;
                        document.getElementById('proof-preview-img').classList.remove('hidden');
                        document.getElementById('proof-preview-area').classList.add('hidden');
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            },

            async submitReport(e) {
                e.preventDefault();
                if(!confirm("Are you sure you want to submit this report?")) return;

                const opening = parseFloat(document.getElementById('opening-balance').value) || 0;
                const userCommission = this.data.currentUser.commissionRate || 10;
                
                // Collect Orders
                const orders = [1, 2, 3].map(i => {
                    const qty = parseInt(document.getElementById(`order-qty-${i}`).value) || 0;
                    const rate = parseFloat(document.getElementById(`order-rate-${i}`).value) || 0;
                    const gross = qty * rate;
                    return {
                        type: `Type ${i}`,
                        qty: qty,
                        rate: rate,
                        gross: gross,
                        commission: gross * (userCommission / 100)
                    };
                }).filter(o => o.qty > 0);

                // Collect Online Payments
                const onlinePayments = [];
                document.querySelectorAll('#online-payments-list > div').forEach(row => {
                    const inputs = row.querySelectorAll('input, select');
                    onlinePayments.push({
                        detail: inputs[0].value,
                        amount: parseFloat(inputs[1].value) || 0,
                        status: inputs[2].value
                    });
                });

                // Collect Expenses
                const expenses = [
                    { type: 'Fuel', amount: parseFloat(document.getElementById('exp-fuel').value) || 0 },
                    { type: 'Food', amount: parseFloat(document.getElementById('exp-food').value) || 0 },
                    { type: 'Maintenance', amount: parseFloat(document.getElementById('exp-maint').value) || 0 }
                ].filter(e => e.amount > 0);

                const totalGross = orders.reduce((acc, o) => acc + o.gross, 0);
                const totalCommission = orders.reduce((acc, o) => acc + o.commission, 0);
                const totalExpenses = expenses.reduce((acc, e) => acc + e.amount, 0);
                const totalOnlineReceived = onlinePayments.filter(p => p.status === 'received').reduce((acc, p) => acc + p.amount, 0);
                const finalAmount = opening + totalCommission - totalOnlineReceived - totalExpenses;

                const newReport = {
                    riderId: this.data.currentUser.id,
                    riderName: this.data.currentUser.name,
                    riderEmail: this.data.currentUser.email,
                    date: new Date().toISOString().split('T')[0],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    openingBalance: opening,
                    orders: orders,
                    onlinePayments: onlinePayments,
                    expenses: expenses,
                    totalGross: totalGross,
                    totalCommission: totalCommission,
                    totalExpenses: totalExpenses,
                    totalEarnings: totalCommission,
                    finalAmount: finalAmount,
                    status: 'pending',
                    proofImage: document.getElementById('proof-preview-img').src || null,
                    commissionRate: userCommission
                };

                try {
                    // Save to Firestore
                    await db.collection('reports').add(newReport);
                    
                    // Reload reports
                    await this.loadReportsFromFirebase();
                    
                    alert('Report Submitted Successfully! Pending Admin Approval.');
                    this.navigate('rider-dashboard');
                } catch (error) {
                    alert('Error submitting report: ' + error.message);
                }
            },

                            </table>
                        </div>
                    </div>
                `;
            },

            async adminMarkReceived(reportId, idx) {
                try {
                    const reportRef = db.collection('reports').doc(reportId);
                    const reportDoc = await reportRef.get();
                    if (reportDoc.exists) {
                        const reportData = reportDoc.data();
                        if (reportData.onlinePayments && reportData.onlinePayments[idx]) {
                            reportData.onlinePayments[idx].status = 'received';
                            await reportRef.update({ onlinePayments: reportData.onlinePayments });
                            await this.loadReportsFromFirebase();
                            this.renderAdminOnlinePayments();
                        }
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            },

            async adminMarkPending(reportId, idx) {
                try {
                    const reportRef = db.collection('reports').doc(reportId);
                    const reportDoc = await reportRef.get();
                    if (reportDoc.exists) {
                        const reportData = reportDoc.data();
                        if (reportData.onlinePayments && reportData.onlinePayments[idx]) {
                            reportData.onlinePayments[idx].status = 'pending';
                            await reportRef.update({ onlinePayments: reportData.onlinePayments });
                            await this.loadReportsFromFirebase();
                            this.renderAdminOnlinePayments();
                        }
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            },

            renderAIParser() {
                document.getElementById('page-title').textContent = 'AI Order Parser';
                const container = document.getElementById('main-container');
                
                container.innerHTML = `
                    <div class="max-w-4xl mx-auto space-y-6 fade-in">
                        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-6 rounded-xl shadow-lg">
                            <h3 class="text-xl font-bold mb-2"><i class="fas fa-robot mr-2"></i>AI Customer Message Parser</h3>
                            <p class="text-purple-100">Paste customer messages in natural language (English/Urdu mix supported). The AI will extract items, quantities, weights, and preferences.</p>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h4 class="font-bold text-gray-800 mb-4">Customer Message</h4>
                                <textarea id="ai-input" rows="8" class="w-full border border-gray-300 rounded-lg p-4 focus:ring-2 focus:ring-indigo-500 outline-none resize-none" placeholder="Example: Bhai mujhe 2 kg aloo chahiye, 1 dozen ande, double roti 4 pieces, aur 1.5 liter coke. Jaldi bhejo please!"></textarea>
                                <button onclick="app.parseMessage()" id="parse-btn" class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-colors">
                                    <i class="fas fa-magic mr-2"></i>Parse Message
                                </button>
                            </div>

                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h4 class="font-bold text-gray-800 mb-4">Parsed Order List</h4>
                                <div id="ai-output" class="space-y-2 min-h-[200px]">
                                    <div class="text-center text-gray-400 py-12">
                                        <i class="fas fa-robot text-4xl mb-3"></i>
                                        <p>AI will generate the order list here</p>
                                    </div>
                                </div>
                                <div id="ai-actions" class="hidden mt-4 pt-4 border-t border-gray-100 flex gap-2">
                                    <button onclick="app.copyOrderList()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-200">
                                        <i class="fas fa-copy mr-2"></i>Copy
                                    </button>
                                    <button onclick="app.printOrderList()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700">
                                        <i class="fas fa-print mr-2"></i>Print
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            parseMessage() {
                const input = document.getElementById('ai-input').value.trim();
                if (!input) {
                    alert('Please enter a message to parse');
                    return;
                }

                const btn = document.getElementById('parse-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Processing...';
                btn.disabled = true;

                setTimeout(() => {
                    const parsedItems = this.aiParseLogic(input);
                    this.displayParsedItems(parsedItems);
                    btn.innerHTML = '<i class="fas fa-magic mr-2"></i>Parse Message';
                    btn.disabled = false;
                }, 1500);
            },

            aiParseLogic(message) {
                const items = [];
                const lowerMsg = message.toLowerCase();
                
                const patterns = [
                    { regex: /(\d+\.?\d*)\s*(kg|kilo|kilogram|kgs)\s+(\w+)/g, type: 'weight', unit: 'kg' },
                    { regex: /(\d+)\s*(dozen)\s+(\w+)/g, type: 'dozen', unit: 'dozen' },
                    { regex: /(\d+\.?\d*)\s*(liter|litre|l|ltr)\s+(\w+)/g, type: 'volume', unit: 'L' },
                    { regex: /(\d+)\s*(single|double|pack|bottle|can)?\s*(\w+)/g, type: 'piece', unit: 'pcs' },
                    { regex: /(\d+)\s*(gm|g|gram)\s+(\w+)/g, type: 'weight', unit: 'g' },
                    { regex: /(\d+)\s+(\w+)/g, type: 'piece', unit: 'pcs' }
                ];

                const seen = new Set();
                
                patterns.forEach(pattern => {
                    let match;
                    while ((match = pattern.regex.exec(lowerMsg)) !== null) {
                        const qty = parseFloat(match[1]);
                        const descriptor = match[2] || '';
                        const itemName = match[3];
                        
                        const key = `${itemName}-${qty}-${descriptor}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            items.push({
                                name: this.capitalizeFirst(itemName),
                                quantity: qty,
                                unit: pattern.unit,
                                descriptor: descriptor,
                                type: pattern.type,
                                original: match[0]
                            });
                        }
                    }
                });

                return items.filter((item, index, self) => 
                    index === self.findIndex((t) => t.name === item.name && t.quantity === item.quantity)
                );
            },

            capitalizeFirst(str) {
                return str.charAt(0).toUpperCase() + str.slice(1);
            },

            displayParsedItems(items) {
                const output = document.getElementById('ai-output');
                const actions = document.getElementById('ai-actions');
                
                if (items.length === 0) {
                    output.innerHTML = `
                        <div class="text-center text-orange-500 py-8">
                            <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
                            <p>Could not parse items. Try simplifying your message.</p>
                        </div>
                    `;
                    actions.classList.add('hidden');
                    return;
                }

                output.innerHTML = `
                    <div class="space-y-2">
                        ${items.map((item, idx) => `
                            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200">
                                <div class="flex items-center gap-3">
                                    <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-xs font-bold">${idx + 1}</span>
                                    <div>
                                        <p class="font-semibold text-gray-800">
                                            ${item.descriptor ? item.descriptor + ' ' : ''}${item.name}
                                        </p>
                                        <p class="text-xs text-gray-500">${item.original}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold text-indigo-600">${item.quantity} ${item.unit}</p>
                                    <p class="text-xs text-gray-400">${item.type}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 p-3 bg-green-50 rounded-lg border border-green-200">
                        <p class="text-sm text-green-800 font-medium">
                            <i class="fas fa-check-circle mr-2"></i>Successfully parsed ${items.length} items
                        </p>
                    </div>
                `;
                
                actions.classList.remove('hidden');
                this.currentParsedOrder = items;
            },

            copyOrderList() {
                if (!this.currentParsedOrder) return;
                const text = this.currentParsedOrder.map((item, i) => 
                    `${i + 1}. ${item.descriptor ? item.descriptor + ' ' : ''}${item.name} - ${item.quantity} ${item.unit}`
                ).join('\n');
                navigator.clipboard.writeText(text);
                alert('Order list copied to clipboard!');
            },

            printOrderList() {
                if (!this.currentParsedOrder) return;
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                    <head><title>Order List</title></head>
                    <body style="font-family: Arial; padding: 20px;">
                        <h2>Order List - ${new Date().toLocaleString()}</h2>
                        <table border="1" cellpadding="10" style="border-collapse: collapse; width: 100%;">
                            <tr style="background: #4f46e5; color: white;">
                                <th>#</th><th>Item</th><th>Qty</th><th>Unit</th>
                            </tr>
                            ${this.currentParsedOrder.map((item, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${item.descriptor ? item.descriptor + ' ' : ''}${item.name}</td>
                                    <td>${item.quantity}</td>
                                    <td>${item.unit}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            },

            renderAdminAttendance() {
                document.getElementById('page-title').textContent = 'Attendance Records';
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 fade-in">
                        <h3 class="font-bold text-lg mb-4">Attendance Management</h3>
                        <p class="text-gray-500">Feature coming soon: Track rider check-ins, shift durations, and absences.</p>
                    </div>
                `;
            },

            renderAdminAnalytics() {
                document.getElementById('page-title').textContent = 'Analytics & Insights';
                const container = document.getElementById('main-container');
                
                container.innerHTML = `
                    <div class="space-y-6 fade-in">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <h3 class="font-bold text-lg mb-4">Weekly Revenue Trend</h3>
                                <canvas id="revenueChart" height="200"></canvas>
                            </div>
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">

                                <canvas id="zoneChart" height="200"></canvas>

                        </div>

                `;

                setTimeout(() => {
                    new Chart(document.getElementById('revenueChart'), {
                        type: 'line',
                        data: {

                            datasets: [{
                                label: 'Revenue (Rs)',
                                data: [45000, 52000, 48000, 61000, 58000, 72000, 69000],
                                borderColor: '#4f46e5',
                                tension: 0.4,
                                fill: true,
                                backgroundColor: 'rgba(79, 70, 229, 0.1)'
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });

                    new Chart(document.getElementById('zoneChart'), {
                        type: 'bar',
                        data: {
                            labels: ['North', 'South', 'East', 'West'],
                            datasets: [{
                                label: 'Deliveries',
                                data: [120, 190, 150, 80],
                                backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444']
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });
                }, 100);
            },

            toggleShift() {
                const btn = document.getElementById('shift-btn');
                if (!this.data.currentShift) {
                    this.data.currentShift = { start: new Date(), isActive: true };
                    btn.innerHTML = '<i class="fas fa-pause mr-2"></i> End Shift';
                    btn.className = "px-4 py-2 rounded-full text-sm font-medium bg-red-100 text-red-700 hover:bg-red-200 transition-colors";
                    alert("Shift Started! Location tracking active.");
                } else {
                    this.data.currentShift = null;
                    btn.innerHTML = '<i class="fas fa-play mr-2"></i> Start Shift';
                    btn.className = "px-4 py-2 rounded-full text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition-colors";
                    alert("Shift Ended. Great job today!");
                }
            },

            closeModal() {
                const modalContent = document.getElementById('modal-content');
                const overlay = document.getElementById('modal-overlay');
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 200);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
