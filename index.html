<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rider Portal Pakistan | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar-link { transition: all 0.3s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
        .ai-processing { background: linear-gradient(90deg, #4f46e5, #7c3aed, #4f46e5); background-size: 200% 100%; animation: gradient-shift 2s ease infinite; }
        @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* Mobile Sidebar Styles */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        #sidebar.mobile-hidden {
            transform: translateX(-100%);
        }
        #sidebar-overlay {
            transition: opacity 0.3s ease;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 50;
                transform: translateX(-100%);
            }
            #sidebar.mobile-visible {
                transform: translateX(0);
            }
            .main-content-shift {
                margin-left: 0 !important;
            }
        }
        
        /* Card Styles */
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .quick-action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .quick-action-btn:active {
            transform: scale(0.98);
        }
        
        .section-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden" onclick="app.toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-xl z-50 flex flex-col h-full" id="sidebar">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                    <i class="fas fa-motorcycle"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg text-gray-800 leading-tight">Rider Portal</h1>
                    <p class="text-xs text-gray-500">Pakistan Pro Edition</p>
                </div>
            </div>
            <button onclick="app.toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-700 p-2">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto p-3 space-y-1" id="nav-menu">
            <!-- Dynamic Menu Items injected by JS -->
        </nav>

        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-gray-50">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=Rider&background=4f46e5&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate" id="user-name">Loading...</p>
                    <p class="text-xs text-gray-500 truncate" id="user-role">Rider</p>
                </div>
                <button onclick="app.logout()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden w-full">
        <!-- Top Header -->
        <header class="bg-white shadow-sm z-30 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="app.toggleSidebar()" class="md:hidden p-2 text-gray-600 hover:text-indigo-600 transition-colors">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800" id="page-title">Dashboard</h2>
                    <p class="text-xs text-gray-500 hidden sm:block" id="current-date">Loading date...</p>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <button class="p-2 text-gray-400 hover:text-indigo-600 transition-colors relative">
                    <i class="fas fa-bell text-lg md:text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                </button>
                <button onclick="app.toggleShift()" id="shift-btn" class="px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition-colors whitespace-nowrap">
                    <i class="fas fa-play mr-1"></i> <span class="hidden sm:inline">Start Shift</span><span class="sm:hidden">Shift</span>
                </button>
            </div>
        </header>

        <!-- Scrollable Content Area -->
        <div class="flex-1 overflow-y-auto p-4 bg-gray-50 relative" id="main-container">
            <!-- Views will be injected here -->
        </div>
    </main>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all scale-95 opacity-0" id="modal-content">
            <!-- Modal Content -->
        </div>
    </div>

    <script>
        // --- Application Logic ---

        const app = {
            data: {
                currentUser: null,
                users: [
                    { id: 'admin1', name: 'System Admin', email: 'admin@portal.com', password: 'admin123', role: 'admin', phone: '03001234567', zone: 'All' },
                    { id: 'r1', name: 'Ali Khan', email: 'ali@portal.com', password: 'rider123', role: 'rider', phone: '03001111111', zone: 'North', vehicle: 'Honda 125 - LEA-123', joinDate: '2023-01-15', salaryBase: 15000, commissionRate: 10 },
                    { id: 'r2', name: 'Ahmed Raza', email: 'ahmed@portal.com', password: 'rider123', role: 'rider', phone: '03002222222', zone: 'South', vehicle: 'Yamaha YBR - KHI-456', joinDate: '2023-03-10', salaryBase: 15000, commissionRate: 12 }
                ],
                reports: [],
                attendance: [],
                announcements: [
                    { id: 1, title: 'Eid Bonus Policy', content: 'All riders delivering 50+ orders this week get a Rs. 2000 bonus.', date: '2023-10-25', priority: 'high' }
                ],
                currentShift: null,
                commissionSettings: {
                    defaultRate: 10,
                    adminRates: {
                        'Type 1': 10,
                        'Type 2': 12,
                        'Type 3': 15
                    }
                },
                sidebarOpen: false
            },

            init() {
                this.loadData();
                this.updateDate();
                if (this.data.currentUser) {
                    this.showDashboard();
                } else {
                    this.showLogin();
                }
                
                // Handle window resize
                window.addEventListener('resize', () => {
                    if (window.innerWidth >= 768) {
                        document.getElementById('sidebar').classList.remove('mobile-visible');
                        document.getElementById('sidebar-overlay').classList.add('hidden');
                        this.data.sidebarOpen = false;
                    }
                });
            },

            toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                
                this.data.sidebarOpen = !this.data.sidebarOpen;
                
                if (this.data.sidebarOpen) {
                    sidebar.classList.add('mobile-visible');
                    overlay.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                } else {
                    sidebar.classList.remove('mobile-visible');
                    overlay.classList.add('hidden');
                    document.body.style.overflow = '';
                }
            },

            loadData() {
                const saved = localStorage.getItem('riderPortalData_v3');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    this.data.reports = parsed.reports || [];
                    this.data.attendance = parsed.attendance || [];
                    this.data.users = parsed.users || this.data.users;
                }
            },

            saveData() {
                localStorage.setItem('riderPortalData_v3', JSON.stringify({
                    reports: this.data.reports,
                    attendance: this.data.attendance,
                    users: this.data.users
                }));
            },

            updateDate() {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-PK', options);
            },

            // --- Authentication ---
            
            showLogin() {
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in p-4">
                        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                            <div class="text-center mb-6 md:mb-8">
                                <div class="w-14 h-14 md:w-16 md:h-16 bg-indigo-600 rounded-full flex items-center justify-center text-white text-xl md:text-2xl mx-auto mb-4 shadow-lg shadow-indigo-200">
                                    <i class="fas fa-motorcycle"></i>
                                </div>
                                <h2 class="text-xl md:text-2xl font-bold text-gray-800">Welcome Back</h2>
                                <p class="text-gray-500 text-sm">Sign in to access your portal</p>
                            </div>
                            <form onsubmit="app.handleLogin(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                    <input type="email" id="login-email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="rider@example.com" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <input type="password" id="login-pass" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="••••••••" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                                    <select id="login-role" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                                        <option value="rider">Rider</option>
                                        <option value="admin">Administrator</option>
                                    </select>
                                </div>
                                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors shadow-md shadow-indigo-200">
                                    Sign In
                                </button>
                            </form>
                            <div class="mt-4 text-center space-y-2">
                                <p class="text-sm text-gray-500">Don't have an account? 
                                    <button onclick="app.showSignup()" class="text-indigo-600 font-semibold hover:underline">Sign Up as Rider</button>
                                </p>
                                <button onclick="app.showForgotPassword()" class="text-sm text-gray-500 hover:text-indigo-600">
                                    Forgot Password?
                                </button>
                            </div>
                            <div class="mt-6 text-center text-xs md:text-sm text-gray-500 bg-gray-50 p-3 rounded-lg">
                                <p class="font-semibold mb-1">Demo Accounts:</p>
                                <p>Admin: admin@portal.com / admin123</p>
                                <p>Rider: ali@portal.com / rider123</p>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('sidebar').classList.add('hidden');
                document.querySelector('header').classList.add('hidden');
            },

            showForgotPassword() {
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in p-4">
                        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                            <div class="text-center mb-6 md:mb-8">
                                <div class="w-14 h-14 md:w-16 md:h-16 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 text-xl md:text-2xl mx-auto mb-4">
                                    <i class="fas fa-key"></i>
                                </div>
                                <h2 class="text-xl md:text-2xl font-bold text-gray-800">Reset Password</h2>
                                <p class="text-gray-500 text-sm">Enter your email to reset your password</p>
                            </div>
                            <form onsubmit="app.handleForgotPassword(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                    <input type="email" id="reset-email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all" placeholder="your@email.com" required>
                                </div>
                                <button type="submit" class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold hover:bg-orange-700 transition-colors shadow-md shadow-orange-200">
                                    Send Reset Link
                                </button>
                            </form>
                            <div class="mt-4 text-center">
                                <p class="text-sm text-gray-500">
                                    Remember your password? 
                                    <button onclick="app.showLogin()" class="text-orange-600 font-semibold hover:underline">Sign In</button>
                                </p>
                            </div>
                            <div class="mt-4 text-center text-xs text-gray-400">
                                <p>Note: This is a demo. In production, a reset link would be sent to your email.</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            handleForgotPassword(e) {
                e.preventDefault();
                const email = document.getElementById('reset-email').value;
                const user = this.data.users.find(u => u.email === email);
                
                if (!user) {
                    alert('No account found with this email address.');
                    return;
                }
                
                this.showResetForm(email);
            },

            showResetForm(email) {
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in p-4">
                        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                            <div class="text-center mb-6 md:mb-8">
                                <div class="w-14 h-14 md:w-16 md:h-16 bg-green-100 rounded-full flex items-center justify-center text-green-600 text-xl md:text-2xl mx-auto mb-4">
                                    <i class="fas fa-lock-open"></i>
                                </div>
                                <h2 class="text-xl md:text-2xl font-bold text-gray-800">Set New Password</h2>
                                <p class="text-gray-500 text-sm">Create a new password for ${email}</p>
                            </div>
                            <form onsubmit="app.handleResetPassword(event, '${email}')" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                                    <input type="password" id="new-password" minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Min 6 characters" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                                    <input type="password" id="confirm-password" minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Confirm new password" required>
                                </div>
                                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors shadow-md shadow-green-200">
                                    Reset Password
                                </button>
                            </form>
                        </div>
                    </div>
                `;
            },

            handleResetPassword(e, email) {
                e.preventDefault();
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;
                
                if (newPass !== confirmPass) {
                    alert('Passwords do not match!');
                    return;
                }
                
                const user = this.data.users.find(u => u.email === email);
                if (user) {
                    user.password = newPass;
                    this.saveData();
                    alert('Password reset successfully! Please sign in with your new password.');
                    this.showLogin();
                }
            },

            showSignup() {
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in p-4">
                        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                            <div class="text-center mb-6 md:mb-8">
                                <div class="w-14 h-14 md:w-16 md:h-16 bg-green-600 rounded-full flex items-center justify-center text-white text-xl md:text-2xl mx-auto mb-4 shadow-lg shadow-green-200">
                                    <i class="fas fa-user-plus"></i>
                                </div>
                                <h2 class="text-xl md:text-2xl font-bold text-gray-800">Join as Rider</h2>
                                <p class="text-gray-500 text-sm">Create your rider account</p>
                            </div>
                            <form onsubmit="app.handleSignup(event)" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                    <input type="text" id="signup-name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Muhammad Ali" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                    <input type="email" id="signup-email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="ali@example.com" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <input type="password" id="signup-pass" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Min 6 characters" minlength="6" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                                    <div class="flex gap-2">
                                        <input type="text" value="+92" readonly class="w-14 px-2 py-3 border border-gray-300 rounded-lg bg-gray-100 text-center text-sm">
                                        <input type="tel" id="signup-phone" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="300 1234567" required>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Details</label>
                                    <input type="text" id="signup-vehicle" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Honda 125 - ABC-123">
                                </div>
                                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors shadow-md shadow-green-200">
                                    Create Account
                                </button>
                            </form>
                            <div class="mt-4 text-center">
                                <p class="text-sm text-gray-500">Already have an account? 
                                    <button onclick="app.showLogin()" class="text-green-600 font-semibold hover:underline">Sign In</button>
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            },

            handleSignup(e) {
                e.preventDefault();
                const name = document.getElementById('signup-name').value;
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-pass').value;
                const phone = '+92 ' + document.getElementById('signup-phone').value;
                const vehicle = document.getElementById('signup-vehicle').value;

                if (this.data.users.find(u => u.email === email)) {
                    alert('Email already registered! Please use a different email.');
                    return;
                }

                const newRider = {
                    id: 'r' + Date.now(),
                    name,
                    email,
                    password,
                    phone,
                    zone: 'Unassigned',
                    vehicle,
                    role: 'rider',
                    joinDate: new Date().toISOString().split('T')[0],
                    salaryBase: 15000,
                    commissionRate: this.data.commissionSettings.defaultRate
                };

                this.data.users.push(newRider);
                this.saveData();
                alert('Account created successfully! Please sign in.');
                this.showLogin();
                document.getElementById('login-email').value = email;
            },

            handleLogin(e) {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-pass').value;
                const role = document.getElementById('login-role').value;

                const user = this.data.users.find(u => u.email === email && u.password === pass && u.role === role);
                
                if (user) {
                    this.data.currentUser = user;
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.querySelector('header').classList.remove('hidden');
                    this.showDashboard();
                } else {
                    alert('Invalid credentials! Please use demo accounts provided below.');
                }
            },

            logout() {
                this.data.currentUser = null;
                location.reload();
            },

            // --- Navigation & Rendering ---

            renderSidebar() {
                const nav = document.getElementById('nav-menu');
                const isAdmin = this.data.currentUser.role === 'admin';
                
                const menuItems = isAdmin ? [
                    { id: 'admin-dashboard', icon: 'fa-chart-line', label: 'Dashboard' },
                    { id: 'admin-riders', icon: 'fa-users', label: 'Manage Riders' },
                    { id: 'admin-reports', icon: 'fa-clipboard-check', label: 'Review Reports' },
                    { id: 'admin-online-payments', icon: 'fa-credit-card', label: 'Online Payments' },
                    { id: 'admin-attendance', icon: 'fa-calendar-check', label: 'Attendance Log' },
                    { id: 'admin-ai-parser', icon: 'fa-robot', label: 'AI Order Parser' },
                    { id: 'admin-announcements', icon: 'fa-bullhorn', label: 'Announcements' },
                    { id: 'admin-analytics', icon: 'fa-chart-pie', label: 'Analytics' }
                ] : [
                    { id: 'rider-dashboard', icon: 'fa-home', label: 'Dashboard' },

            addOnlinePaymentRow() {
                const container = document.getElementById('online-payments-list');
                const div = document.createElement('div');
                div.className = 'bg-gray-50 p-3 rounded-lg space-y-2';
                div.innerHTML = `
                    <div class="grid grid-cols-12 gap-2 items-center">
                        <div class="col-span-5">
                            <input type="text" placeholder="Customer" class="w-full bg-transparent text-sm outline-none border-b border-gray-300 focus:border-indigo-500 py-1" required>
                        </div>
                        <div class="col-span-4">
                            <input type="number" placeholder="Amount" class="w-full bg-transparent text-sm outline-none border-b border-gray-300 focus:border-indigo-500 py-1 online-amt" onchange="app.calculateTotals()" required>
                        </div>
                        <div class="col-span-2">
                            <select class="w-full bg-transparent text-xs outline-none border-b border-gray-300 py-1 online-status" onchange="app.calculateTotals()">
                                <option value="pending">Pending</option>
                                <option value="received">Received</option>
                            </select>
                        </div>
                        <div class="col-span-1 text-right">
                            <button type="button" onclick="this.closest('.bg-gray-50').remove(); app.calculateTotals()" class="text-red-500 hover:text-red-700"><i class="fas fa-times"></i></button>

                    </div>
                `;
                container.appendChild(div);
            },

            calculateTotals() {
                const userCommission = this.data.currentUser.commissionRate || this.data.commissionSettings.defaultRate;
                
                let grossTotal = 0;
                let commissionTotal = 0;
                
                [1, 2, 3].forEach(i => {
                    const qty = parseFloat(document.getElementById(`order-qty-${i}`).value) || 0;
                    const rate = parseFloat(document.getElementById(`order-rate-${i}`).value) || 0;
                    const gross = qty * rate;
                    const commission = gross * (userCommission / 100);
                    
                    document.getElementById(`order-gross-${i}`).textContent = `Rs ${gross.toLocaleString()}`;
                    document.getElementById(`order-commission-${i}`).textContent = `Rs ${commission.toLocaleString()}`;
                    
                    grossTotal += gross;
                    commissionTotal += commission;
                });
                
                document.getElementById('grand-gross-total').textContent = `Rs ${grossTotal.toLocaleString()}`;
                document.getElementById('grand-commission-total').textContent = `Rs ${commissionTotal.toLocaleString()}`;

                let onlineTotal = 0;
                let onlinePending = 0;
                let onlineReceived = 0;
                
                document.querySelectorAll('#online-payments-list > div').forEach(row => {
                    const amt = parseFloat(row.querySelector('.online-amt').value) || 0;
                    const status = row.querySelector('.online-status').value;
                    
                    onlineTotal += amt;
                    
                    if (status === 'pending') onlinePending += amt;
                    else onlineReceived += amt;
                });

                document.getElementById('online-pending-display').textContent = `Rs ${onlinePending.toLocaleString()}`;
                document.getElementById('online-received-display').textContent = `Rs ${onlineReceived.toLocaleString()}`;

                const fuel = parseFloat(document.getElementById('exp-fuel').value) || 0;
                const food = parseFloat(document.getElementById('exp-food').value) || 0;
                const maint = parseFloat(document.getElementById('exp-maint').value) || 0;
                const expensesTotal = fuel + food + maint;

                const opening = parseFloat(document.getElementById('opening-balance').value) || 0;
                const final = opening + commissionTotal - onlineTotal - expensesTotal;

                document.getElementById('sum-opening').textContent = `Rs ${opening.toLocaleString()}`;
                document.getElementById('sum-commission').textContent = `Rs ${commissionTotal.toLocaleString()}`;
                document.getElementById('sum-online').textContent = `Rs ${onlineTotal.toLocaleString()}`;
                document.getElementById('sum-expenses').textContent = `Rs ${expensesTotal.toLocaleString()}`;
                document.getElementById('sum-final').textContent = `Rs ${final.toLocaleString()}`;
            },

            previewImage(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('proof-preview-img').src = e.target.result;
                        document.getElementById('proof-preview-img').classList.remove('hidden');
                        document.getElementById('proof-preview-area').classList.add('hidden');
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            },

            submitReport(e) {
                e.preventDefault();
                if(!confirm("Submit this report?")) return;

                const opening = parseFloat(document.getElementById('opening-balance').value) || 0;
                const userCommission = this.data.currentUser.commissionRate || this.data.commissionSettings.defaultRate;
                
                const orders = [1, 2, 3].map(i => {
                    const qty = parseInt(document.getElementById(`order-qty-${i}`).value) || 0;
                    const rate = parseFloat(document.getElementById(`order-rate-${i}`).value) || 0;
                    const gross = qty * rate;
                    return {
                        type: `Type ${i}`,
                        qty: qty,
                        rate: rate,
                        gross: gross,
                        commission: gross * (userCommission / 100)
                    };
                }).filter(o => o.qty > 0);

                const onlinePayments = [];
                document.querySelectorAll('#online-payments-list > div').forEach(row => {
                    const inputs = row.querySelectorAll('input, select');
                    onlinePayments.push({
                        detail: inputs[0].value,
                        amount: parseFloat(inputs[1].value) || 0,
                        status: inputs[2].value
                    });
                });

                const expenses = [
                    { type: 'Fuel', amount: parseFloat(document.getElementById('exp-fuel').value) || 0 },
                    { type: 'Food', amount: parseFloat(document.getElementById('exp-food').value) || 0 },
                    { type: 'Maintenance', amount: parseFloat(document.getElementById('exp-maint').value) || 0 }
                ].filter(e => e.amount > 0);

                const totalGross = orders.reduce((acc, o) => acc + o.gross, 0);
                const totalCommission = orders.reduce((acc, o) => acc + o.commission, 0);
                const totalExpenses = expenses.reduce((acc, e) => acc + e.amount, 0);
                const totalOnline = onlinePayments.reduce((acc, p) => acc + p.amount, 0);
                const finalAmount = opening + totalCommission - totalOnline - totalExpenses;

                const newReport = {
                    id: 'rep-' + Date.now(),
                    riderId: this.data.currentUser.id,
                    riderName: this.data.currentUser.name,
                    date: new Date().toISOString().split('T')[0],
                    createdAt: new Date().toISOString(),
                    openingBalance: opening,
                    orders: orders,
                    onlinePayments: onlinePayments,
                    expenses: expenses,
                    totalGross: totalGross,
                    totalCommission: totalCommission,
                    totalExpenses: totalExpenses,
                    finalAmount: finalAmount,
                    status: 'pending',
                    proofImage: document.getElementById('proof-preview-img').src || null,
                    shiftDuration: '8h 30m',

                document.getElementById('page-title').textContent = 'Online Payments';
                const container = document.getElementById('main-container');
                
                let allPayments = [];
                this.data.reports.forEach(r => {
                    r.onlinePayments.forEach((p, idx) => {
                        allPayments.push({ ...p, reportId: r.id, riderId: r.riderId, riderName: r.riderName, date: r.date, idx: idx });
                    });
                });
                
                allPayments.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                const totalPending = allPayments.filter(p => p.status === 'pending').reduce((a,b) => a + b.amount, 0);
                const totalReceived = allPayments.filter(p => p.status === 'received').reduce((a,b) => a + b.amount, 0);

                container.innerHTML = `
                    <div class="fade-in pb-20 space-y-4">
                        <div class="grid grid-cols-3 gap-2">
                            <div class="stat-card text-center p-3">
                                <p class="text-xs text-orange-600">Pending</p>
                                <p class="text-lg font-bold text-orange-700">Rs ${totalPending.toLocaleString()}</p>
                            </div>
                            <div class="stat-card text-center p-3">
                                <p class="text-xs text-green-600">Received</p>
                                <p class="text-lg font-bold text-green-700">Rs ${totalReceived.toLocaleString()}</p>
                            </div>
                            <div class="stat-card text-center p-3">
                                <p class="text-xs text-blue-600">Total</p>
                                <p class="text-lg font-bold text-blue-700">Rs ${(totalPending + totalReceived).toLocaleString()}</p>
                            </div>
                        </div>

                        <div class="section-card">
                            <h3 class="font-bold text-gray-800 mb-3">All Payments</h3>
                            <div class="space-y-2">
                                ${allPayments.map(p => `
                                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                        <div>
                                            <p class="font-medium text-sm">${p.riderName}</p>
                                            <p class="text-xs text-gray-500">${p.detail} • ${new Date(p.date).toLocaleDateString()}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-bold">Rs ${p.amount.toLocaleString()}</p>
                                            ${p.status === 'pending' ? 
                                                `<button onclick="app.adminMarkReceived('${p.reportId}', ${p.idx})" class="text-xs bg-green-600 text-white px-2 py-1 rounded mt-1">Mark Received</button>` :
                                                `<span class="text-xs text-green-600">Received</span>`
                                            }
                                        </div>
                                    </div>
                                `).join('')}
                                ${allPayments.length === 0 ? '<p class="text-center text-gray-400 py-4">No payments found</p>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            },

            adminMarkReceived(reportId, idx) {
                const report = this.data.reports.find(r => r.id === reportId);
                if (report && report.onlinePayments[idx]) {
                    report.onlinePayments[idx].status = 'received';
                    this.saveData();
                    this.renderAdminOnlinePayments();
                }
            },

            renderAIParser() {
                document.getElementById('page-title').textContent = 'AI Parser';
                const container = document.getElementById('main-container');
                
                container.innerHTML = `
                    <div class="fade-in pb-20 space-y-4">
                        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-5 rounded-2xl">
                            <h3 class="font-bold mb-1"><i class="fas fa-robot mr-2"></i>AI Order Parser</h3>
                            <p class="text-sm text-purple-100">Paste customer message to extract items</p>
                        </div>

                        <div class="section-card">
                            <textarea id="ai-input" rows="4" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-sm" placeholder="Example: 2 kg aloo, 1 dozen ande, double roti 4"></textarea>
                            <button onclick="app.parseMessage()" id="parse-btn" class="w-full mt-3 bg-indigo-600 text-white py-3 rounded-lg font-bold">
                                <i class="fas fa-magic mr-2"></i>Parse Message
                            </button>
                        </div>

                        <div id="ai-output-section" class="hidden">
                            <div class="section-card">
                                <h3 class="font-bold text-gray-800 mb-3">Parsed Items</h3>
                                <div id="ai-output" class="space-y-2"></div>
                                <div class="flex gap-2 mt-4">
                                    <button onclick="app.copyOrderList()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium">Copy</button>
                                    <button onclick="app.printOrderList()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium">Print</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            parseMessage() {
                const input = document.getElementById('ai-input').value.trim();
                if (!input) return;

                const btn = document.getElementById('parse-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Processing...';
                btn.disabled = true;

                setTimeout(() => {
                    const items = this.aiParseLogic(input);
                    this.displayParsedItems(items);
                    btn.innerHTML = '<i class="fas fa-magic mr-2"></i>Parse Message';
                    btn.disabled = false;
                }, 1000);
            },

            aiParseLogic(message) {
                const items = [];
                const lowerMsg = message.toLowerCase();
                
                const patterns = [
                    { regex: /(\d+\.?\d*)\s*(kg|kilo|kilogram|kgs)\s+(\w+)/g, type: 'weight', unit: 'kg' },
                    { regex: /(\d+)\s*(dozen)\s+(\w+)/g, type: 'dozen', unit: 'dozen' },
                    { regex: /(\d+\.?\d*)\s*(liter|litre|l|ltr)\s+(\w+)/g, type: 'volume', unit: 'L' },
                    { regex: /(\d+)\s*(single|double|pack|bottle|can)?\s*(\w+)/g, type: 'piece', unit: 'pcs' },
                    { regex: /(\d+)\s*(gm|g|gram)\s+(\w+)/g, type: 'weight', unit: 'g' },
                    { regex: /(\d+)\s+(\w+)/g, type: 'piece', unit: 'pcs' }
                ];

                const seen = new Set();
                
                patterns.forEach(pattern => {
                    let match;
                    while ((match = pattern.regex.exec(lowerMsg)) !== null) {
                        const qty = parseFloat(match[1]);
                        const descriptor = match[2] || '';
                        const itemName = match[3];
                        const key = `${itemName}-${qty}-${descriptor}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            items.push({
                                name: itemName.charAt(0).toUpperCase() + itemName.slice(1),
                                quantity: qty,
                                unit: pattern.unit,
                                descriptor: descriptor
                            });
                        }
                    }
                });

                return items;
            },

            displayParsedItems(items) {
                const outputSection = document.getElementById('ai-output-section');
                const output = document.getElementById('ai-output');
                
                if (items.length === 0) {
                    alert('Could not parse items. Try simpler format.');
                    return;
                }

                output.innerHTML = items.map((item, idx) => `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-xs font-bold">${idx + 1}</span>
                            <span class="font-medium">${item.descriptor ? item.descriptor + ' ' : ''}${item.name}</span>
                        </div>
                        <span class="font-bold text-indigo-600">${item.quantity} ${item.unit}</span>
                    </div>
                `).join('');
                
                outputSection.classList.remove('hidden');
                this.currentParsedOrder = items;
            },

            copyOrderList() {
                if (!this.currentParsedOrder) return;
                const text = this.currentParsedOrder.map((item, i) => 
                    `${i + 1}. ${item.descriptor ? item.descriptor + ' ' : ''}${item.name} - ${item.quantity} ${item.unit}`
                ).join('\n');
                navigator.clipboard.writeText(text);
                alert('Copied to clipboard!');
            },

            printOrderList() {
                if (!this.currentParsedOrder) return;
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                    <head><title>Order List</title></head>
                    <body style="font-family: Arial; padding: 20px;">
                        <h2>Order List - ${new Date().toLocaleString()}</h2>
                        <table border="1" cellpadding="10" style="border-collapse: collapse; width: 100%;">
                            <tr style="background: #4f46e5; color: white;">
                                <th>#</th><th>Item</th><th>Qty</th><th>Unit</th>
                            </tr>
                            ${this.currentParsedOrder.map((item, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${item.descriptor ? item.descriptor + ' ' : ''}${item.name}</td>
                                    <td>${item.quantity}</td>
                                    <td>${item.unit}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            },

            renderAdminAttendance() {
                document.getElementById('page-title').textContent = 'Attendance';
                const container = document.getElementById('main-container');
                container.innerHTML = `
                    <div class="section-card fade-in">
                        <h3 class="font-bold text-gray-800 mb-4">Attendance Management</h3>
                        <p class="text-gray-500 text-center py-8">Feature coming soon</p>
                    </div>
                `;
            },

            renderAdminAnalytics() {
                document.getElementById('page-title').textContent = 'Analytics';
                const container = document.getElementById('main-container');
                
                container.innerHTML = `
                    <div class="fade-in pb-20 space-y-4">
                        <div class="section-card">
                            <h3 class="font-bold text-gray-800 mb-4">Weekly Revenue</h3>
                            <canvas id="revenueChart" height="200"></canvas>
                        </div>
                        <div class="section-card">
                            <h3 class="font-bold text-gray-800 mb-4">Zone Performance</h3>
                            <canvas id="zoneChart" height="200"></canvas>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    new Chart(document.getElementById('revenueChart'), {
                        type: 'line',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                            datasets: [{
                                label: 'Revenue (Rs)',
                                data: [45000, 52000, 48000, 61000, 58000, 72000, 69000],
                                borderColor: '#4f46e5',
                                tension: 0.4,
                                fill: true,
                                backgroundColor: 'rgba(79, 70, 229, 0.1)'
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });

                    new Chart(document.getElementById('zoneChart'), {
                        type: 'bar',
                        data: {
                            labels: ['North', 'South', 'East', 'West'],
                            datasets: [{
                                label: 'Deliveries',
                                data: [120, 190, 150, 80],
                                backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444']
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } } }
                    });
                }, 100);
            },

            updateReportStatus(id, status) {
                const report = this.data.reports.find(r => r.id === id);
                if (report) {
                    report.status = status;
                    this.saveData();
                    if(this.data.currentUser.role === 'admin') this.renderAdminReports();
                    else this.renderRiderHistory();
                }
            },

            toggleShift() {
                const btn = document.getElementById('shift-btn');
                if (!this.data.currentShift) {
                    this.data.currentShift = { start: new Date(), isActive: true };
                    btn.innerHTML = '<i class="fas fa-pause mr-1"></i> <span class="hidden sm:inline">End Shift</span><span class="sm:hidden">End</span>';
                    btn.className = "px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-red-100 text-red-700 hover:bg-red-200 transition-colors whitespace-nowrap";
                    alert("Shift Started!");
                } else {
                    this.data.currentShift = null;
                    btn.innerHTML = '<i class="fas fa-play mr-1"></i> <span class="hidden sm:inline">Start Shift</span><span class="sm:hidden">Start</span>';
                    btn.className = "px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition-colors whitespace-nowrap";
                    alert("Shift Ended!");
                }
            },

            closeModal() {
                const modalContent = document.getElementById('modal-content');
                const overlay = document.getElementById('modal-overlay');
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 200);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
