<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dastak Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f7; }

        /* ── Sidebar ── */
        #sidebar { transition: transform 0.28s cubic-bezier(.4,0,.2,1); }
        @media(max-width:767px){ #sidebar{ position:fixed;left:0;top:0;height:100vh;z-index:50;transform:translateX(-100%); } #sidebar.open{ transform:translateX(0); } }
        .nav-btn { transition: background .18s, color .18s; }
        .nav-btn.active, .nav-btn:hover { background:#4f46e5; color:#fff; }

        /* ── Cards ── */
        .card { background:#fff; border-radius:16px; padding:18px; box-shadow:0 1px 6px rgba(0,0,0,.07); }
        .stat-card { background:#fff; border-radius:14px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); }

        /* ── Smooth page transitions ── */
        .page-enter { animation: pageIn .22s ease-out both; }
        @keyframes pageIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* ── Status badges ── */
        .badge { padding:3px 10px; border-radius:999px; font-size:.7rem; font-weight:700; }
        .b-pending { background:#fef3c7; color:#92400e; }
        .b-approved { background:#d1fae5; color:#065f46; }
        .b-rejected { background:#fee2e2; color:#991b1b; }
        .b-draft { background:#fef9c3; color:#854d0e; }
        .b-deleted { background:#f3f4f6; color:#6b7280; }

        /* ── Offline banner ── */
        #offline-bar { display:none; position:fixed; top:0; left:0; right:0; z-index:999; background:#ef4444; color:#fff; text-align:center; padding:6px; font-size:.75rem; font-weight:600; }
        body.offline #offline-bar { display:block; }
        body.offline #main-header { top:32px; }

        /* ── Sync button pulse ── */
        @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(79,70,229,.5)} 70%{box-shadow:0 0 0 8px rgba(79,70,229,0)} 100%{box-shadow:0 0 0 0 rgba(79,70,229,0)} }
        .sync-pulse { animation: pulse-ring 1.5s infinite; }

        /* ── Wage toggle ── */
        .wage-toggle { position:relative; width:44px; height:24px; display:inline-block; }
        .wage-toggle input { opacity:0; width:0; height:0; }
        .wage-toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#d1d5db; border-radius:999px; transition:.25s; }
        .wage-toggle-slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.25s; }
        .wage-toggle input:checked + .wage-toggle-slider { background:#4f46e5; }
        .wage-toggle input:checked + .wage-toggle-slider:before { transform:translateX(20px); }

        /* ── Quick action ── */
        .qa-btn { border-radius:14px; padding:14px; text-align:center; cursor:pointer; transition:transform .15s, box-shadow .15s; }
        .qa-btn:active { transform:scale(.96); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:#f1f1f1; }
        ::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }

        /* ── Modal ── */
        #modal-overlay { transition: opacity .2s; }
        #modal-box { transition: transform .2s, opacity .2s; }

        .delivery-row { position:relative; }
        .cust-sugg { position:absolute; z-index:30; background:#fff; border:1px solid #e5e7eb; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,.1); max-height:150px; overflow-y:auto; width:calc(100% - 44px); }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex flex-col">

<!-- Offline bar -->
<div id="offline-bar"><i class="fas fa-wifi-slash mr-2"></i>Offline Mode — Reports local mein save ho rahe hain</div>

<div class="flex flex-1 overflow-hidden relative">

<!-- Sidebar overlay -->
<div id="sb-overlay" class="fixed inset-0 bg-black/40 z-40 hidden md:hidden" onclick="app.closeSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar" class="w-60 bg-white shadow-xl z-50 flex flex-col h-full hidden">
    <div class="p-4 border-b flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-base"><i class="fas fa-motorcycle"></i></div>
            <div><p class="font-bold text-gray-800 text-sm leading-tight">Dastak Portal</p><p class="text-xs text-gray-400">Delivery Service</p></div>
        </div>
        <button onclick="app.closeSidebar()" class="md:hidden text-gray-400 p-1"><i class="fas fa-times"></i></button>
    </div>
    <nav class="flex-1 overflow-y-auto p-2 space-y-0.5" id="nav-menu"></nav>
    <div class="p-3 border-t">
        <div class="flex items-center gap-2.5 p-2 rounded-xl bg-gray-50">
            <img id="user-avatar" src="https://ui-avatars.com/api/?name=U&background=4f46e5&color=fff" class="w-9 h-9 rounded-full">
            <div class="flex-1 min-w-0"><p class="text-xs font-bold text-gray-800 truncate" id="user-name">…</p><p class="text-xs text-gray-400 truncate" id="user-role">Rider</p></div>
            <button onclick="app.logout()" class="w-8 h-8 bg-red-50 text-red-500 hover:bg-red-100 rounded-lg flex items-center justify-center flex-shrink-0"><i class="fas fa-sign-out-alt text-xs"></i></button>
        </div>
    </div>
</aside>

<!-- Main -->
<div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header id="main-header" class="bg-white shadow-sm z-30 px-4 py-2.5 flex items-center justify-between hidden sticky top-0">
        <div class="flex items-center gap-2">
            <button onclick="app.toggleSidebar()" class="md:hidden p-2 text-gray-500"><i class="fas fa-bars text-lg"></i></button>
            <div>
                <h2 class="text-lg font-bold text-gray-800 leading-tight" id="page-title">Dashboard</h2>
                <p class="text-xs text-gray-400 hidden sm:block" id="current-date"></p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <!-- Month picker (admin) -->
            <div id="month-picker-wrap" class="hidden">
                <select id="global-month-picker" onchange="app.onMonthChange()" class="border border-indigo-200 bg-indigo-50 text-indigo-700 rounded-lg px-2 py-1.5 text-xs font-semibold outline-none"></select>
            </div>
            <!-- Sync button -->
            <button id="sync-btn" onclick="app.syncNow()" class="hidden px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold flex items-center gap-1.5 sync-pulse" title="Pending reports sync karo">
                <i class="fas fa-cloud-upload-alt"></i><span id="sync-count">0</span> Sync
            </button>
            <button onclick="app.showNotifications()" class="p-2 text-gray-400 hover:text-indigo-600 relative">
                <i class="fas fa-bell text-lg"></i>
                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-white hidden" id="notif-dot"></span>
            </button>
            <button onclick="app.toggleShift()" id="shift-btn" class="px-2.5 py-1.5 rounded-full text-xs font-bold bg-green-100 text-green-700 hover:bg-green-200 whitespace-nowrap hidden">
                <i class="fas fa-play mr-1"></i>Shift
            </button>
        </div>
    </header>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto bg-gray-50" id="main-container">
        <div class="flex flex-col items-center justify-center h-full gap-4" id="app-loading">
            <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg animate-pulse"><i class="fas fa-motorcycle text-white text-2xl"></i></div>
            <p class="font-bold text-gray-600">Dastak Portal</p>
            <p class="text-xs text-gray-400" id="loading-msg">Loading…</p>
        </div>
    </div>
</div>

</div><!-- end flex -->

<!-- Modal -->
<div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4 backdrop-blur-sm">
    <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[88vh] overflow-y-auto scale-95 opacity-0"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════════════
const firebaseConfig = {
    apiKey:"AIzaSyBdKbba0NjNmW2LNxEILiIcjv3DU3LTnks",
    authDomain:"dastak-rider-portal-1b9d9.firebaseapp.com",
    projectId:"dastak-rider-portal-1b9d9",
    storageBucket:"dastak-rider-portal-1b9d9.firebasestorage.app",
    messagingSenderId:"714540074485",
    appId:"1:714540074485:web:cf393ebd7edbedae518cbc"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
window.auth = firebase.auth();
window.db = firebase.firestore();

// ═══════════════════════════════════════════════
// OFFLINE STORAGE
// ═══════════════════════════════════════════════
const LS = {
    get(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } },
    set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} },
    del(k){ localStorage.removeItem(k); }
};
const CACHE_KEY = 'dastak_cache';
const OFFLINE_QUEUE_KEY = 'dastak_offline_queue';

function getCachedData(){ return LS.get(CACHE_KEY) || { reports:[], users:[], attendance:[], customers:[], companyExpenses:[], announcements:[] }; }
function setCachedData(data){ LS.set(CACHE_KEY, { ...getCachedData(), ...data, _ts: Date.now() }); }
function getOfflineQueue(){ return LS.get(OFFLINE_QUEUE_KEY) || []; }
function addToOfflineQueue(item){ const q = getOfflineQueue(); q.push({...item, _id: Date.now()+'_'+Math.random().toString(36).slice(2)}); LS.set(OFFLINE_QUEUE_KEY, q); }
function removeFromOfflineQueue(id){ const q = getOfflineQueue().filter(i => i._id !== id); LS.set(OFFLINE_QUEUE_KEY, q); }

// ═══════════════════════════════════════════════
// NETWORK STATUS
// ═══════════════════════════════════════════════
let isOnline = navigator.onLine;
function updateOnlineStatus(){
    isOnline = navigator.onLine;
    document.body.classList.toggle('offline', !isOnline);
    app && app.updateSyncBtn && app.updateSyncBtn();
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ═══════════════════════════════════════════════
// GLOBAL HELPERS
// ═══════════════════════════════════════════════
function addDeliveryRow(){
    const c = document.getElementById('delivery-rows-container');
    if(!c) return;
    const id = 'dr-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
    c.insertAdjacentHTML('beforeend',`
    <div class="delivery-row bg-gray-50 p-3 rounded-xl space-y-2 border border-gray-100" id="${id}" data-cust-id="">
        <div class="flex gap-2 relative">
            <input type="text" class="cust-inp flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white outline-none focus:border-indigo-400" placeholder="Customer Name"
                oninput="app.showSugg(this,'${id}')" onblur="setTimeout(()=>app.hideSugg('${id}'),200)">
            <button type="button" onclick="document.getElementById('${id}').remove();app.calcTotals()" class="text-red-400 hover:text-red-600 p-2 flex-shrink-0"><i class="fas fa-trash text-xs"></i></button>
            <div class="cust-sugg hidden" id="sugg-${id}"></div>
        </div>
        <input type="text" class="del-detail w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white outline-none focus:border-indigo-400" placeholder="Order Details">
        <div class="grid grid-cols-3 gap-2">
            <input type="number" class="del-amount border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white outline-none focus:border-indigo-400" placeholder="Order Rs" oninput="app.calcTotals()">
            <input type="number" class="del-charge border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white outline-none focus:border-indigo-400" placeholder="Delivery Rs" oninput="app.calcTotals()">
            <select class="del-paytype border border-gray-200 rounded-lg px-2 py-2 text-sm bg-white outline-none focus:border-indigo-400" onchange="app.calcTotals()">
                <option value="cash">Cash</option>
                <option value="online_pending">Online Pending</option>
                <option value="online_received">Online Received</option>
            </select>
        </div>
    </div>`);
}

function previewImage(input){
    const f = input.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = e => {
        const img = document.getElementById('proof-img');
        const area = document.getElementById('proof-area');
        if(img){ img.src=e.target.result; img.classList.remove('hidden'); }
        if(area) area.classList.add('hidden');
    };
    r.readAsDataURL(f);
}

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
const app = {
    D: {
        currentUser:null, users:[], reports:[], attendance:[],
        announcements:[], customers:[], companyExpenses:[],
        customersLoaded:false, companyExpLoaded:false,
        charts:{}, selectedMonth:new Date().getMonth(),
        selectedYear:new Date().getFullYear(),
        currentShift:null, paymentFilter:null,
        riderPayFilter:null, custPage:1, _isSubmitting:false
    },

    // ── INIT ──────────────────────────────────
    init(){
        this.updateDate();
        window.auth.onAuthStateChanged(u => u ? this.loadUser(u.uid) : this.showLogin());
        window.addEventListener('resize', ()=>{ if(window.innerWidth>=768) this.closeSidebar(); });
        window.addEventListener('popstate', e => {
            if(!this.D.currentUser) return;
            const v = e.state?.v || location.hash.slice(1) || null;
            if(v) this.renderView(v);
        });
    },

    async loadUser(uid){
        try{
            // Try from cache first for instant load
            const cached = getCachedData();
            let userData = null;

            if(isOnline){
                const doc = await window.db.collection('users').doc(uid).get();
                if(doc.exists){
                    userData = { id:uid, ...doc.data() };
                } else {
                    const u = window.auth.currentUser;
                    const isAdmin = u.email==='admin@portal.com';
                    const nd = { email:u.email, name:isAdmin?'Administrator':(u.displayName||'New User'), phone:'',
                        zone:isAdmin?'Head Office':'Unassigned', vehicle:isAdmin?'Admin':'', role:isAdmin?'admin':'rider',
                        joinDate:new Date().toISOString().split('T')[0], salaryBase:isAdmin?50000:15000, dailyWage:isAdmin?1000:500,
                        wageEnabled:true, wageType:'fixed' };
                    await window.db.collection('users').doc(uid).set(nd);
                    userData = { id:uid, ...nd };
                }
                setCachedData({ currentUser: userData });
            } else {
                userData = cached.currentUser;
                if(!userData || userData.id !== uid){ this.showLogin(); return; }
            }

            this.D.currentUser = userData;
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            const shiftBtn = document.getElementById('shift-btn');
            if(shiftBtn && userData.role!=='admin') shiftBtn.classList.remove('hidden');

            this.renderSidebar();
            this.initMonthPicker();
            await this.loadData();

            const initView = userData.role==='admin' ? 'admin-dashboard' : 'rider-dashboard';
            history.replaceState({v:initView},'','#'+initView);
            this.renderView(initView);
        } catch(e){
            console.error(e);
            // Offline fallback
            const cached = getCachedData();
            if(cached.currentUser){
                this.D.currentUser = cached.currentUser;
                this.D.reports = cached.reports||[];
                this.D.users = cached.users||[];
                this.D.attendance = cached.attendance||[];
                this.D.announcements = cached.announcements||[];
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-header').classList.remove('hidden');
                this.renderSidebar();
                const initView = this.D.currentUser.role==='admin' ? 'admin-dashboard' : 'rider-dashboard';
                this.renderView(initView);
            } else {
                alert('Login error: '+e.message);
                this.logout();
            }
        }
    },

    async loadData(){
        const setMsg = m => { const el=document.getElementById('loading-msg'); if(el) el.textContent=m; };
        try{
            setMsg('Data load ho raha hai…');
            const now = new Date();
            const twoBack = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString().split('T')[0];
            const mStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];

            const [ridersSnap, reportsSnap, attSnap, notifSnap] = await Promise.allSettled([
                window.db.collection('users').where('role','==','rider').get(),
                window.db.collection('reports').where('date','>=',twoBack).orderBy('date','desc').limit(300).get(),
                window.db.collection('attendance').where('date','>=',mStart).get(),
                window.db.collection('notifications').orderBy('createdAt','desc').limit(30).get()
            ]);

            if(ridersSnap.status==='fulfilled') this.D.users = ridersSnap.value.docs.map(d=>({id:d.id,...d.data()}));
            if(reportsSnap.status==='fulfilled') this.D.reports = reportsSnap.value.docs.map(d=>({id:d.id,...d.data()}));
            if(attSnap.status==='fulfilled') this.D.attendance = attSnap.value.docs.map(d=>({id:d.id,...d.data()}));
            if(notifSnap.status==='fulfilled' && !notifSnap.value.empty){
                this.D.announcements = notifSnap.value.docs.map(d=>({...d.data(),_docId:d.id}));
                const dot=document.getElementById('notif-dot'); if(dot) dot.classList.remove('hidden');
            }

            // Cache everything
            setCachedData({ users:this.D.users, reports:this.D.reports, attendance:this.D.attendance, announcements:this.D.announcements });
            setMsg('Taiyar!');
            this.updateSyncBtn();

        } catch(e){
            console.error('Load error:', e);
            // Use cache
            const c = getCachedData();
            this.D.users = c.users||[];
            this.D.reports = c.reports||[];
            this.D.attendance = c.attendance||[];
            this.D.announcements = c.announcements||[];
            setMsg('Offline mode — cached data');
            this.updateSyncBtn();
        }
    },

    // ── SYNC ────────────────────────────────────
    updateSyncBtn(){
        const q = getOfflineQueue();
        const btn = document.getElementById('sync-btn');
        const cnt = document.getElementById('sync-count');
        if(!btn) return;
        if(q.length > 0){
            btn.classList.remove('hidden');
            if(cnt) cnt.textContent = q.length;
            if(isOnline) btn.classList.add('sync-pulse');
            else btn.classList.remove('sync-pulse');
        } else {
            btn.classList.add('hidden');
        }
    },

    async syncNow(){
        if(!isOnline){ alert('Abhi offline ho. Internet aane par sync karo.'); return; }
        const q = getOfflineQueue();
        if(q.length===0){ alert('Koi pending report nahi.'); return; }
        const btn = document.getElementById('sync-btn');
        if(btn){ btn.innerHTML='<i class="fas fa-spinner fa-spin mr-1"></i> Syncing…'; btn.disabled=true; }
        let success=0, fail=0;
        for(const item of q){
            try{
                if(item.type==='report'){
                    const { _id, type, ...reportData } = item;
                    // Remove local fields
                    delete reportData.localId;
                    reportData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    const docRef = await window.db.collection('reports').add(reportData);
                    // Update local data array - replace local entry
                    this.D.reports = this.D.reports.filter(r => r.id !== item.localId);
                    this.D.reports.unshift({ id:docRef.id, ...reportData, createdAt:new Date() });

                    // Mark attendance
                    if(reportData.status==='pending' && reportData.riderId && reportData.date){
                        const docId = `${reportData.riderId}_${reportData.date}`;
                        const exists = this.D.attendance.find(a=>a.riderId===reportData.riderId && a.date===reportData.date);
                        if(!exists){
                            await window.db.collection('attendance').doc(docId).set({
                                riderId:reportData.riderId, date:reportData.date, status:'present',
                                isReliefDay:false, autoMarked:true, timestamp:firebase.firestore.FieldValue.serverTimestamp()
                            });
                            this.D.attendance.push({id:docId, riderId:reportData.riderId, date:reportData.date, status:'present'});
                        }
                    }
                    removeFromOfflineQueue(item._id);
                    success++;
                }
            } catch(e){ console.error('Sync fail:', e); fail++; }
        }
        setCachedData({ reports:this.D.reports, attendance:this.D.attendance });
        this.updateSyncBtn();
        if(btn){ btn.innerHTML='<i class="fas fa-cloud-upload-alt"></i> <span id="sync-count">0</span> Sync'; btn.disabled=false; }
        alert(`Sync complete!\n✅ ${success} uploaded${fail>0?'\n❌ '+fail+' failed':''}`);
        const activeEl = document.querySelector('.nav-btn.active');
        if(activeEl) this.renderView(activeEl.id.replace('nav-',''));
    },

    // ── SIDEBAR ──────────────────────────────────
    toggleSidebar(){
        const s=document.getElementById('sidebar'), o=document.getElementById('sb-overlay');
        const open = s.classList.toggle('open');
        o.classList.toggle('hidden',!open);
        document.body.style.overflow = open?'hidden':'';
    },
    closeSidebar(){
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sb-overlay').classList.add('hidden');
        document.body.style.overflow='';
    },

    renderSidebar(){
        const nav=document.getElementById('nav-menu');
        const isAdmin=this.D.currentUser.role==='admin';
        const items = isAdmin ? [
            {id:'admin-dashboard',icon:'fa-chart-line',label:'Dashboard'},
            {id:'admin-riders',icon:'fa-users',label:'Manage Riders'},
            {id:'admin-reports',icon:'fa-clipboard-check',label:'Reports'},
            {id:'admin-online-payments',icon:'fa-credit-card',label:'Online Payments'},
            {id:'admin-expenses',icon:'fa-receipt',label:'Rider Expenses'},
            {id:'admin-company-expenses',icon:'fa-building',label:'Company Expenses'},
            {id:'admin-customers',icon:'fa-address-book',label:'Customers'},
            {id:'admin-attendance',icon:'fa-calendar-check',label:'Attendance'},
            {id:'admin-analytics',icon:'fa-chart-pie',label:'Analytics'},
            {id:'admin-settings',icon:'fa-cog',label:'Settings'}
        ] : [
            {id:'rider-dashboard',icon:'fa-home',label:'Dashboard'},
            {id:'rider-report',icon:'fa-file-invoice-dollar',label:'Daily Report'},

    navigate(v, push=true){
        if(push) history.pushState({v},'','#'+v);
        this.renderView(v);

    renderView(v){
        document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
        const btn=document.getElementById('nav-'+v); if(btn) btn.classList.add('active');
        const r=this.D.currentUser?.role==='admin';
        if(v==='rider-dashboard') this.riderDash();
        else if(v==='rider-report') this.riderReportForm();
        else if(v==='rider-history') this.riderHistory();
        else if(v==='rider-payments') this.riderPayments();
        else if(v==='rider-salary') this.riderSalary();
        else if(v==='admin-dashboard') this.adminDash();
        else if(v==='admin-riders') this.adminRiders();
        else if(v==='admin-reports') this.adminReports();
        else if(v==='admin-online-payments') this.adminOnlinePayments();
        else if(v==='admin-expenses') this.adminExpenses();
        else if(v==='admin-company-expenses') this.adminCompanyExp();
        else if(v==='admin-customers') this.adminCustomers();
        else if(v==='admin-attendance') this.adminAttendance();
        else if(v==='admin-analytics') this.adminAnalytics();
        else if(v==='admin-settings'||v==='rider-settings') this.renderSettings();

    // ── MONTH PICKER ─────────────────────────────
    initMonthPicker(){
        const wrap=document.getElementById('month-picker-wrap'), sel=document.getElementById('global-month-picker');
        if(!wrap||!sel) return;
        if(this.D.currentUser?.role!=='admin'){ wrap.classList.add('hidden'); return; }
        wrap.classList.remove('hidden');
        const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
        sel.innerHTML='';
        const now=new Date();
        for(let i=0;i<24;i++){
            const d=new Date(now.getFullYear(),now.getMonth()-i,1);
            const opt=document.createElement('option');
            opt.value=`${d.getFullYear()}-${d.getMonth()}`;
            opt.textContent=`${mn[d.getMonth()]} ${d.getFullYear()}`;
            if(d.getMonth()===this.D.selectedMonth && d.getFullYear()===this.D.selectedYear) opt.selected=true;
            sel.appendChild(opt);
        }
    },
    onMonthChange(){
        const sel=document.getElementById('global-month-picker'); if(!sel) return;
        const [y,m]=sel.value.split('-').map(Number);
        this.D.selectedMonth=m; this.D.selectedYear=y;
        const ab=document.querySelector('.nav-btn.active');
        if(ab) this.renderView(ab.id.replace('nav-',''));
    },

    // ── ATTENDANCE HELPERS ───────────────────────
    getAbsences(rid,m,y){
        return this.D.attendance.filter(a=>{
            const d=new Date(a.date);
            return a.riderId===rid && a.status==='absent' && d.getMonth()===m && d.getFullYear()===y;
        });
    },
    calcAttDeductions(rid,m,y){
        const abs=this.getAbsences(rid,m,y);
        const rider=this.D.users.find(u=>u.id===rid)||this.D.currentUser;
        const dw=rider?.dailyWage||500;
        const deductible=Math.max(0,abs.length-1);
        return {totalAbsences:abs.length,reliefDays:Math.min(1,abs.length),deductibleAbsences:deductible,dailyWage:dw,totalDeduction:deductible*dw};
    },

    // ── FILTERED REPORTS ─────────────────────────
    monthReports(status=null){
        return this.D.reports.filter(r=>{
            const d=new Date(r.date);
            const mm=d.getMonth()===this.D.selectedMonth && d.getFullYear()===this.D.selectedYear;
            const sm=status?r.status===status:r.status!=='deleted';
            return mm&&sm;
        });
    },

    selectCust(cid,rid){
        const c=(this.D.customers||[]).find(x=>x.id===cid); if(!c) return;
        const row=document.getElementById(rid); if(!row) return;
        const inp=row.querySelector('.cust-inp'); if(inp) inp.value=c.name;

    calcTotals(){
        let totalOrder=0, totalDC=0, onlineDeduct=0;
        document.querySelectorAll('.delivery-row').forEach(row=>{
            const amt=parseFloat(row.querySelector('.del-amount')?.value)||0;
            const dc=parseFloat(row.querySelector('.del-charge')?.value)||0;
            const pt=row.querySelector('.del-paytype')?.value||'cash';
            totalOrder+=amt; totalDC+=dc;
            if(pt==='online_pending'||pt==='online_received') onlineDeduct+=amt+dc;
        });
        const fuel=parseFloat(document.getElementById('exp-fuel')?.value)||0;
        const food=parseFloat(document.getElementById('exp-food')?.value)||0;
        const maint=parseFloat(document.getElementById('exp-maint')?.value)||0;
        const expTotal=fuel+food+maint;
        const opening=parseFloat(document.getElementById('opening-balance')?.value)||0;
        const u=this.D.currentUser;
        const we=u?.wageEnabled!==false;
        const wt=u?.wageType||'fixed';
        let dw=0;
        if(we&&wt!=='none'){
            if(wt==='custom') dw=parseFloat(document.getElementById('wage-input')?.value)||0;
            else dw=u?.dailyWage||500;
        }
        const final=opening+totalDC-onlineDeduct-expTotal-dw;
        const $=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
        $('s-opening',`Rs ${opening.toLocaleString()}`);
        $('s-orders',`Rs ${totalOrder.toLocaleString()} (not added)`);
        $('s-dc',`+Rs ${totalDC.toLocaleString()}`);
        $('s-online',`-Rs ${onlineDeduct.toLocaleString()}`);
        $('s-exp',`-Rs ${expTotal.toLocaleString()}`);
        $('s-wage',`-Rs ${dw.toLocaleString()}`);
        $('s-final',`Rs ${final.toLocaleString()}`);
    },

    async submitReport(e){
        e.preventDefault();
        if(this.D._isSubmitting) return;
        this.D._isSubmitting=true;
        const isDraft=e.submitter?.dataset?.draft==='true';
        if(!isDraft&&!confirm('Report submit karna chahte ho?')){ this.D._isSubmitting=false; return; }

        const btns=document.querySelectorAll('button[type="submit"]');
        btns.forEach(b=>{b.disabled=true;b.style.opacity='.5';});

        try{
            const opening=parseFloat(document.getElementById('opening-balance').value)||0;
            const date=document.getElementById('report-date').value;
            const deliveries=[];
            document.querySelectorAll('.delivery-row').forEach(row=>{
                const cid=row.dataset.custId||'';
                const cn=row.querySelector('.cust-inp')?.value?.trim()||'';
                const detail=row.querySelector('.del-detail')?.value?.trim()||'';
                const orderAmount=parseFloat(row.querySelector('.del-amount')?.value)||0;
                const dc=parseFloat(row.querySelector('.del-charge')?.value)||0;
                const pt=row.querySelector('.del-paytype')?.value||'cash';
                if(cn||detail||orderAmount>0||dc>0) deliveries.push({custId:cid,custName:cn,detail,orderAmount,deliveryCharge:dc,payType:pt});
            });
            const expenses=[];
            const fuel=parseFloat(document.getElementById('exp-fuel')?.value)||0;
            const food=parseFloat(document.getElementById('exp-food')?.value)||0;
            const maint=parseFloat(document.getElementById('exp-maint')?.value)||0;
            if(fuel>0) expenses.push({type:'Fuel',amount:fuel});
            if(food>0) expenses.push({type:'Food',amount:food});
            if(maint>0) expenses.push({type:'Maintenance',amount:maint});

            const totalOrder=deliveries.reduce((a,d)=>a+d.orderAmount,0);
            const totalDC=deliveries.reduce((a,d)=>a+d.deliveryCharge,0);
            const totalGross=totalOrder+totalDC;
            const totalExp=expenses.reduce((a,ex)=>a+ex.amount,0);
            const onlinePayments=deliveries.filter(d=>d.payType==='online_pending'||d.payType==='online_received')
                .map(d=>({detail:d.custName+(d.detail?' · '+d.detail:''),amount:d.orderAmount,deliveryCharge:d.deliveryCharge,status:d.payType==='online_pending'?'pending':'received'}));
            const onlinePendingTotal=onlinePayments.filter(p=>p.status==='pending').reduce((a,p)=>a+p.amount+(p.deliveryCharge||0),0);

            const u=this.D.currentUser;
            const we=u?.wageEnabled!==false, wt=u?.wageType||'fixed';
            let dw=0;
            if(we&&wt!=='none'){
                if(wt==='custom') dw=parseFloat(document.getElementById('wage-input')?.value)||0;
                else dw=u?.dailyWage||500;
            }
            const finalAmount=opening+totalDC-onlinePendingTotal-totalExp-dw;

            const proofImg=document.getElementById('proof-img');
            const proofImage=(proofImg&&!proofImg.classList.contains('hidden'))?proofImg.src:null;

            const report={
                riderId:u.id, riderName:u.name, date,
                openingBalance:opening, deliveries, onlinePayments, expenses,
                totalGross, totalExpenses:totalExp, totalOrderAmount:totalOrder,
                totalDeliveryCharge:totalDC, dailyWage:dw, finalAmount,
                status:isDraft?'draft':'pending', proofImage
            };

            const editId=document.getElementById('edit-id')?.value;

            if(isOnline){
                if(editId){
                    await window.db.collection('reports').doc(editId).update({...report, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
                    const ex=this.D.reports.find(r=>r.id===editId); if(ex) Object.assign(ex,report);
                } else {
                    report.createdAt=firebase.firestore.FieldValue.serverTimestamp();
                    const ref=await window.db.collection('reports').add(report);
                    this.D.reports.unshift({id:ref.id,...report,createdAt:new Date()});
                    if(!isDraft){
                        const docId=`${u.id}_${date}`;
                        const exists=this.D.attendance.find(a=>a.riderId===u.id&&a.date===date);
                        if(!exists){
                            await window.db.collection('attendance').doc(docId).set({riderId:u.id,date,status:'present',isReliefDay:false,autoMarked:true,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
                            this.D.attendance.push({id:docId,riderId:u.id,date,status:'present'});
                        }
                    }
                }
                setCachedData({reports:this.D.reports, attendance:this.D.attendance});
                alert(isDraft?'Draft save ho gaya!':'Report submit ho gaya! Attendance mark ho gayi.');
            } else {
                // OFFLINE — save locally
                const localId='local_'+Date.now();
                const localReport={...report,id:localId,createdAt:new Date().toISOString(),_local:true};
                addToOfflineQueue({...report,type:'report',localId});
                this.D.reports.unshift(localReport);
                setCachedData({reports:this.D.reports});
                this.updateSyncBtn();
                alert(isDraft?'Draft offline save ho gaya!':'Report offline save ho gaya!\n\nInternet aane par Sync button se upload karo.');
            }
            this.navigate('rider-history');
        } catch(err){
            console.error(err);
            alert('Error: '+err.message);
        } finally {
            this.D._isSubmitting=false;
            btns.forEach(b=>{b.disabled=false;b.style.opacity='1';});
        }
    },

    updateDayStats(){
        const d=document.getElementById('dash-date')?.value; if(!d) return;
        const reps=this.D.reports.filter(r=>r.date===d&&r.status==='approved');
        const gross=reps.reduce((a,r)=>a+(r.totalGross||0),0);
        const wages=reps.reduce((a,r)=>a+(r.dailyWage||0),0);
        const exp=reps.reduce((a,r)=>a+(r.totalExpenses||0),0);
        const cExp=(this.D.companyExpenses||[]).filter(e=>e.date===d).reduce((a,e)=>a+e.amount,0);
        const profit=gross-wages-exp-cExp;
        const online=reps.flatMap(r=>r.onlinePayments||[]).filter(p=>p.status==='pending').reduce((a,p)=>a+(p.amount||0),0);
        const pend=this.D.reports.filter(r=>r.date===d&&r.status==='pending').length;
        const el=document.getElementById('day-stats'); if(!el) return;
        el.innerHTML=`<div class="bg-white/15 rounded-xl p-2"><p class="text-xs text-indigo-100">Gross</p><p class="font-bold">Rs ${gross.toLocaleString()}</p></div>
        <div class="bg-white/15 rounded-xl p-2"><p class="text-xs text-indigo-100">Wages</p><p class="font-bold text-yellow-200">-Rs ${wages.toLocaleString()}</p></div>
        <div class="bg-white/15 rounded-xl p-2"><p class="text-xs text-indigo-100">Net Profit</p><p class="font-bold ${profit>=0?'text-green-300':'text-red-300'}">Rs ${profit.toLocaleString()}</p></div>
        <div class="bg-white/15 rounded-xl p-2"><p class="text-xs text-indigo-100">Online Pending</p><p class="font-bold text-yellow-300">Rs ${online.toLocaleString()}</p></div>
        <div class="bg-white/15 rounded-xl p-2 col-span-2"><p class="text-xs text-indigo-100">Pending Approval</p><p class="font-bold ${pend>0?'text-red-300':'text-green-300'}">${pend} report(s)</p></div>
        ${reps.length===0&&pend===0?'<div class="col-span-3 bg-white/10 rounded-lg p-1.5 text-center text-xs opacity-70">Is din ki koi report nahi</div>':''}`;
    },

        </div>
        <div class="space-y-2">

        <div class="card">
            <div class="flex justify-between items-start">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 rounded-xl bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-lg">${r.name.charAt(0)}</div>
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${r.name}</p>
                        <p class="text-xs text-gray-400">${r.phone||'—'} · ${r.zone||'Unassigned'}</p>
                        <p class="text-xs text-purple-600 font-semibold">Base: Rs ${(r.salaryBase||15000).toLocaleString()}</p>

                    <button onclick="app.deleteRider('${r.id}')" class="p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><i class="fas fa-trash text-xs"></i></button>
                </div>
            </div>
            <div class="mt-2 pt-2 border-t border-gray-100 flex items-center gap-2 text-xs">
                ${r.wageEnabled===false?`<span class="bg-red-50 text-red-600 px-2 py-0.5 rounded-full font-semibold">Wage OFF</span>`
                :r.wageType==='none'?`<span class="bg-green-50 text-green-600 px-2 py-0.5 rounded-full font-semibold">No Wage</span>`
                :r.wageType==='custom'?`<span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-semibold">Custom Wage</span>`
                :`<span class="bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded-full font-semibold">Rs ${r.dailyWage||500}/day</span>`}
                <span class="text-gray-400">· ${r.vehicle||'No vehicle'}</span>
            </div>
        </div>`).join('')}
        ${riders.length===0?'<div class="text-center py-12 text-gray-300"><i class="fas fa-users text-5xl mb-3"></i><p>Koi rider nahi</p></div>':''}
        </div>`);
    },

    async toggleWage(riderId, enabled){
        try{
            await window.db.collection('users').doc(riderId).update({ wageEnabled: enabled });
            const r=this.D.users.find(u=>u.id===riderId); if(r) r.wageEnabled=enabled;
            // Update label without re-rendering
        } catch(e){ alert('Error: '+e.message); this.adminRiders(); }
    },

    editRider(rid){
        const r=this.D.users.find(u=>u.id===rid); if(!r) return;
        const wt=r.wageType||'fixed';
        this.openModal(`
        <div class="p-5">
            <div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold text-gray-800">Edit Rider</h2><button onclick="app.closeModal()" class="text-gray-400 p-1"><i class="fas fa-times text-xl"></i></button></div>
            <form onsubmit="app.saveRider(event,'${rid}')" class="space-y-3">
                <input type="text" id="er-name" value="${r.name}" placeholder="Full Name" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-indigo-400" required>
                <input type="email" id="er-email" value="${r.email||''}" placeholder="Email" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-indigo-400">
                <input type="tel" id="er-phone" value="${r.phone||''}" placeholder="Phone" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-indigo-400">
                <input type="text" id="er-vehicle" value="${r.vehicle||''}" placeholder="Vehicle" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-indigo-400">

                <div class="bg-yellow-50 border border-yellow-100 rounded-xl p-3 space-y-2">
                    <p class="font-bold text-sm text-gray-700">Wage Settings</p>
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-600">Wage On/Off</span>
                        <label class="wage-toggle"><input type="checkbox" id="er-we" ${r.wageEnabled!==false?'checked':''} onchange="app.toggleWageFields()"><span class="wage-toggle-slider"></span></label>
                    </div>
                    <div id="er-wt-wrap" class="${r.wageEnabled===false?'opacity-40 pointer-events-none':''}">
                        <p class="text-xs text-gray-400 mb-1.5">Wage Type</p>
                        <div class="flex gap-3">
                            ${['fixed','none','custom'].map(v=>`<label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="er-wt" value="${v}" ${wt===v?'checked':''} class="accent-indigo-600" onchange="app.toggleWageFields()"><span class="text-sm capitalize">${v==='fixed'?'Fixed':v==='none'?'No Wage':'Custom'}</span></label>`).join('')}
                        </div>
                        <div id="er-dw-wrap" class="mt-2 ${wt==='fixed'||wt==='custom'?'':'hidden'}">
                            <label class="text-xs text-gray-400">Daily Wage (Rs)</label>
                            <input type="number" id="er-dw" value="${r.dailyWage||500}" class="w-full mt-1 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none">
                        </div>
                    </div>
                </div>
                <div class="flex gap-2 pt-1">
                    <button type="button" onclick="app.closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl font-semibold text-sm">Cancel</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl font-semibold text-sm">Save</button>
                </div>
            </form>
        </div>`);
    },

    toggleWageFields(){
        const we=document.getElementById('er-we')?.checked;
        const wrap=document.getElementById('er-wt-wrap');
        if(wrap) wrap.className=we?'':'opacity-40 pointer-events-none';
        const wt=document.querySelector('input[name="er-wt"]:checked')?.value||'fixed';
        const dwWrap=document.getElementById('er-dw-wrap');
        if(dwWrap) dwWrap.className=`mt-2 ${wt==='fixed'||wt==='custom'?'':'hidden'}`;
    },

    async saveRider(e,rid){
        e.preventDefault();
        const we=document.getElementById('er-we')?.checked!==false;
        const wt=document.querySelector('input[name="er-wt"]:checked')?.value||'fixed';
        const dw=parseInt(document.getElementById('er-dw')?.value)||0;
        const u={name:document.getElementById('er-name').value,email:document.getElementById('er-email').value,
            phone:document.getElementById('er-phone').value,vehicle:document.getElementById('er-vehicle').value,
            salaryBase:parseInt(document.getElementById('er-salary').value)||15000,
            dailyWage:dw,wageType:wt,wageEnabled:we};
        try{
            await window.db.collection('users').doc(rid).update(u);
            const r=this.D.users.find(x=>x.id===rid); if(r) Object.assign(r,u);
            this.closeModal(); this.adminRiders(); alert('Rider updated!');
        } catch(err){ alert('Error: '+err.message); }
    },

    async deleteRider(rid){
        if(!confirm('Rider delete karna chahte ho?')) return;
        try{
            await window.db.collection('users').doc(rid).delete();
            this.D.users=this.D.users.filter(u=>u.id!==rid);
            this.adminRiders(); alert('Deleted!');
        } catch(e){ alert('Error: '+e.message); }
    },

        ${reps.length===0?'<div class="text-center py-12 text-gray-300"><i class="fas fa-clipboard text-5xl mb-3"></i><p>Koi report nahi</p></div>':''}

    async importCusts(input){
        const file=input.files[0]; if(!file) return;
        const self=this;
        const doImport=async()=>{
            const reader=new FileReader();
            reader.onload=async e=>{
                try{
                    const wb=XLSX.read(e.target.result,{type:'array'});
                    const ws=wb.Sheets[wb.SheetNames[0]];
                    const rows=XLSX.utils.sheet_to_json(ws,{header:1});
                    const headers=rows[0]||[];
                    const colIdx=names=>{ for(const n of names){ const i=headers.findIndex(h=>h&&h.toString().toLowerCase().includes(n.toLowerCase())); if(i>=0) return i; } return -1; };
                    const ni=colIdx(['first name','name','contact']), pi=colIdx(['mobile','phone','cell']), ai=colIdx(['address','street']);
                    const clean=p=>{ if(!p) return ''; p=p.toString().replace(/[\s\-\(\)]/g,''); if(p.startsWith('+92')) p='0'+p.slice(3); else if(p.startsWith('92')&&p.length>10) p='0'+p.slice(2); return p; };
                    let added=0,skipped=0; const newC=[];
                    const dataRows=rows.slice(1).filter(r=>r&&r.length>0);
                    for(let i=0;i<dataRows.length;i+=400){
                        const batch=window.db.batch();
                        dataRows.slice(i,i+400).forEach(row=>{
                            const name=(ni>=0?row[ni]:row[0])?.toString().trim()||'';
                            const phone=clean(pi>=0?row[pi]:row[1]);
                            const addr=(ai>=0?row[ai]||'':'').toString().trim();
                            if(!name||!phone){ skipped++; return; }
                            const ref=window.db.collection('customers').doc();
                            batch.set(ref,{name,phone,address:addr,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
                            newC.push({id:ref.id,name,phone,address:addr}); added++;
                        });
                        await batch.commit();
                    }
                    self.D.customers=[...self.D.customers,...newC];
                    alert(`${added} import!${skipped>0?'\n'+skipped+' skip':''}`); self._renderCusts();
                } catch(err){ alert('Import error: '+err.message); }
            };
            reader.readAsArrayBuffer(file);
        };
        if(window.XLSX) doImport();
        else{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'; s.onload=doImport; document.head.appendChild(s); }
    },

    showCalendar(rid){
        const rider=this.D.users.find(u=>u.id===rid); if(!rider) return;
        const cm=new Date().getMonth(), cy=new Date().getFullYear();
        const days=new Date(cy,cm+1,0).getDate();
        const firstDay=new Date(cy,cm,1).getDay();
        const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        let cal='';
        for(let i=0;i<firstDay;i++) cal+=`<div></div>`;
        for(let d=1;d<=days;d++){
            const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const att=this.D.attendance.find(a=>a.riderId===rid&&a.date===ds);
            let cls='border border-gray-200 bg-white', icon='';
            if(att){ if(att.status==='present'){cls='bg-green-100 border-green-300 text-green-800';icon='✓';} else{cls=att.isReliefDay?'bg-blue-100 border-blue-300 text-blue-800':'bg-red-100 border-red-300 text-red-800';icon=att.isReliefDay?'R':'✗';} }
            cal+=`<div onclick="app.toggleAtt('${rid}','${ds}')" class="aspect-square flex flex-col items-center justify-center rounded-lg cursor-pointer hover:scale-105 transition-transform text-xs font-bold ${cls}"><span>${d}</span><span class="text-xs">${icon}</span></div>`;
        }
        this.openModal(`<div class="p-5">
            <div class="flex justify-between items-center mb-3"><div><h2 class="text-lg font-bold">${rider.name}</h2><p class="text-xs text-gray-400">${mn[cm]} ${cy}</p></div><button onclick="app.closeModal()" class="text-gray-400"><i class="fas fa-times text-xl"></i></button></div>
            <div class="flex justify-center gap-4 mb-3 text-xs">
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-100 border border-green-300 rounded inline-block"></span>Present</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-red-100 border border-red-300 rounded inline-block"></span>Absent</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-100 border border-blue-300 rounded inline-block"></span>Relief</span>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-xs mb-1">
                ${['S','M','T','W','T','F','S'].map(d=>`<div class="font-bold text-gray-400 py-1">${d}</div>`).join('')}
            </div>
            <div class="grid grid-cols-7 gap-1">${cal}</div>
            <p class="text-xs text-gray-400 mt-3 text-center">Tap: Empty→Present→Absent→Remove</p>
        </div>`);
    },

    async toggleAtt(rid,date){
        const ex=this.D.attendance.find(a=>a.riderId===rid&&a.date===date);
        const m=new Date(date).getMonth(), y=new Date(date).getFullYear();
        const docId=`${rid}_${date}`;
        try{
            if(ex){
                if(ex.status==='present'){
                    const abs=this.getAbsences(rid,m,y);
                    const relief=abs.length===0;
                    await window.db.collection('attendance').doc(docId).update({status:'absent',isReliefDay:relief});
                    ex.status='absent'; ex.isReliefDay=relief;
                } else {
                    await window.db.collection('attendance').doc(docId).delete();
                    this.D.attendance=this.D.attendance.filter(a=>!(a.riderId===rid&&a.date===date));
                }
            } else {
                await window.db.collection('attendance').doc(docId).set({riderId:rid,date,status:'present',isReliefDay:false,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
                this.D.attendance.push({id:docId,riderId:rid,date,status:'present',isReliefDay:false});
            }
            this.showCalendar(rid);
        } catch(e){ alert('Error: '+e.message); }
    },

    adminAnalytics(){
        this.setTitle('Analytics');
        const mp=this._monthlyProfits(), yp=this._yearlyProfits();
        this.setContent(`
        <div class="space-y-3">
            <div class="card"><h3 class="font-bold text-sm text-gray-700 mb-3">Monthly Profit Trend</h3><canvas id="mChart" height="200"></canvas></div>
            <div class="card"><h3 class="font-bold text-sm text-gray-700 mb-3">Yearly Comparison</h3><canvas id="yChart" height="200"></canvas></div>
        </div>`);
        setTimeout(()=>{
            this.makeChart('mChart',{type:'bar',data:{labels:mp.map(m=>m.n),datasets:[{label:'Profit',data:mp.map(m=>m.p),backgroundColor:'rgba(79,70,229,.7)',borderRadius:5}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rs '+Number(v).toLocaleString(),font:{size:9}}}}}});
            this.makeChart('yChart',{type:'line',data:{labels:yp.map(y=>y.y),datasets:[{label:'Yearly',data:yp.map(y=>y.p),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',fill:true,tension:.4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rs '+Number(v).toLocaleString(),font:{size:9}}}}}});
        },120);

    _monthlyProfits(yr=new Date().getFullYear()){
        const data={}; for(let i=0;i<12;i++) data[i]=0;
        this.D.reports.filter(r=>r.status==='approved'&&new Date(r.date).getFullYear()===yr).forEach(r=>{ const profit=(r.totalGross||0)-(r.totalExpenses||0)-(r.dailyWage||0); data[new Date(r.date).getMonth()]+=profit; });
        (this.D.companyExpenses||[]).forEach(e=>{ const d=new Date(e.date); if(d.getFullYear()===yr) data[d.getMonth()]-=(e.amount||0); });
        const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return Object.entries(data).map(([m,p])=>({n:mn[m],p}));
    },

    _yearlyProfits(){
        const data={};
        this.D.reports.filter(r=>r.status==='approved').forEach(r=>{ const y=new Date(r.date).getFullYear(); data[y]=(data[y]||0)+(r.totalGross||0)-(r.totalExpenses||0)-(r.dailyWage||0); });
        (this.D.companyExpenses||[]).forEach(e=>{ const y=new Date(e.date).getFullYear(); data[y]=(data[y]||0)-(e.amount||0); });
        return Object.entries(data).map(([y,p])=>({y:parseInt(y),p})).sort((a,b)=>a.y-b.y);
    },

    async sendNotif(){
        const title=document.getElementById('nt')?.value.trim();
        const content=document.getElementById('nb')?.value.trim();

        const n={title,content,priority,date:new Date().toISOString().split('T')[0],createdAt:firebase.firestore.FieldValue.serverTimestamp()};
        try{
            const ref=await window.db.collection('notifications').add(n);
            this.D.announcements.unshift({...n,_docId:ref.id});
            alert('Sent!'); this.closeModal();
        } catch(e){ alert('Error: '+e.message); }
    },

    async delNotif(id){
        try{
            await window.db.collection('notifications').doc(id).delete();
            this.D.announcements=this.D.announcements.filter(a=>(a._docId||a.id)!==id);
            this.showNotifications();

        if(!wrap||!sel) return;
        if(this.D.currentUser?.role!=='admin'){ wrap.classList.add('hidden'); return; }
        wrap.classList.remove('hidden');
        const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
        sel.innerHTML='';
        const now=new Date();
        for(let i=0;i<24;i++){
            const d=new Date(now.getFullYear(),now.getMonth()-i,1);
            const opt=document.createElement('option');
            opt.value=`${d.getFullYear()}-${d.getMonth()}`;
            opt.textContent=`${mn[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
            if(d.getMonth()===this.D.selectedMonth&&d.getFullYear()===this.D.selectedYear) opt.selected=true;
            sel.appendChild(opt);
        }
    },

    onMonthChange(){
        const sel=document.getElementById('global-month-picker'); if(!sel) return;
        const [y,m]=sel.value.split('-').map(Number);
        this.D.selectedMonth=m; this.D.selectedYear=y;
        const ab=document.querySelector('.nav-btn.active');
        if(ab) this.renderView(ab.id.replace('nav-',''));
    }
};

document.addEventListener('DOMContentLoaded', ()=>app.init());
</script>
</body>
</html>
