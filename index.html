<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dastak Portal | Dastak Delivery Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overscroll-behavior-y: contain; }
        .glass-panel { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar-link { transition: all 0.3s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79,70,229,0.3); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .status-badge { padding:0.25rem 0.75rem; border-radius:9999px; font-size:0.75rem; font-weight:600; }
        .status-pending { background:#fef3c7; color:#92400e; }
        .status-approved { background:#d1fae5; color:#065f46; }
        .status-rejected { background:#fee2e2; color:#991b1b; }
        .status-draft { background:#fef9c3; color:#854d0e; }
        .status-deleted { background:#f3f4f6; color:#6b7280; }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:#f1f1f1; }
        ::-webkit-scrollbar-thumb { background:#c7c7c7; border-radius:3px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            #sidebar { position:fixed; left:0; top:0; height:100vh; z-index:50; transform:translateX(-100%); }
            #sidebar.mobile-visible { transform:translateX(0); }
        }
        .stat-card { background:white; border-radius:16px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.04); }
        .quick-action-btn { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border-radius:12px; padding:16px; text-align:center; transition:transform 0.2s; }
        .quick-action-btn:active { transform:scale(0.98); }
        .section-card { background:white; border-radius:16px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex">
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdKbba0NjNmW2LNxEILiIcjv3DU3LTnks",
            authDomain: "dastak-rider-portal-1b9d9.firebaseapp.com",
            projectId: "dastak-rider-portal-1b9d9",
            storageBucket: "dastak-rider-portal-1b9d9.firebasestorage.app",
            messagingSenderId: "714540074485",
            appId: "1:714540074485:web:cf393ebd7edbedae518cbc"
        };
        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();
    </script>

    <!-- Pull to Refresh -->
    <div id="pull-to-refresh" class="fixed top-0 left-0 right-0 flex items-center justify-center pointer-events-none transition-transform duration-200 ease-out z-50" style="transform:translateY(-50px);height:50px;">
        <div class="bg-white p-2 rounded-full shadow-md flex items-center justify-center border border-gray-200">
            <i id="ptr-icon" class="fas fa-arrow-down text-blue-600 transition-transform duration-200"></i>
        </div>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden" onclick="app.toggleSidebar()"></div>
    <aside class="w-64 bg-white shadow-xl z-50 flex flex-col h-full hidden" id="sidebar">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl"><i class="fas fa-motorcycle"></i></div>
                <div><h1 class="font-bold text-lg text-gray-800 leading-tight">Dastak Portal</h1><p class="text-xs text-gray-500">Dastak Delivery Service</p></div>
            </div>
            <button onclick="app.toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-700 p-2"><i class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 overflow-y-auto p-3 space-y-1" id="nav-menu"></nav>
        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-gray-50">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=Rider&background=4f46e5&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate" id="user-name">Loading...</p>
                    <p class="text-xs text-gray-500 truncate" id="user-role">Rider</p>
                </div>
                <button onclick="app.logout()" title="Logout" class="flex items-center justify-center w-9 h-9 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-700 transition-colors flex-shrink-0">
                    <i class="fas fa-sign-out-alt text-base"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden w-full">
        <header class="bg-white shadow-sm z-30 px-4 py-3 flex justify-between items-center hidden" id="main-header">
            <div class="flex items-center gap-3">
                <button onclick="app.toggleSidebar()" class="md:hidden p-2 text-gray-600 hover:text-indigo-600 transition-colors"><i class="fas fa-bars text-xl"></i></button>
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800" id="page-title">Dashboard</h2>
                    <p class="text-xs text-gray-500 hidden sm:block" id="current-date">Loading date...</p>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-3">
                <div id="month-picker-wrap" class="hidden">
                    <select id="global-month-picker" onchange="app.onMonthChange()" class="border border-indigo-200 bg-indigo-50 text-indigo-700 rounded-lg px-2 py-1.5 text-xs font-semibold outline-none cursor-pointer"></select>
                </div>
                <button id="notif-btn" onclick="app.showNotifications()" class="p-2 text-gray-400 hover:text-indigo-600 transition-colors relative">
                    <i class="fas fa-bell text-lg md:text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white hidden" id="notif-dot"></span>
                </button>
                <button onclick="app.logout()" title="Logout" class="flex items-center justify-center w-9 h-9 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 transition-colors flex-shrink-0 md:hidden" id="mobile-logout-btn">
                    <i class="fas fa-sign-out-alt text-base"></i>
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-4 bg-gray-50 relative" id="main-container">
            <div id="app-loading" class="flex flex-col items-center justify-center h-full min-h-64 gap-4">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 animate-pulse"><i class="fas fa-motorcycle text-white text-2xl"></i></div>
                <div class="text-center"><p class="font-bold text-gray-700 text-lg">Dastak Portal</p><p class="text-sm text-gray-400 mt-1" id="loading-msg">Loading data...</p></div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all scale-95 opacity-0" id="modal-content"></div>
    </div>

    <script>
    const app = {
        data: {
            currentUser: null, users: [], reports: [], attendance: [], customers: [], companyExpenses: [],
            announcements: [], currentShift: null, sidebarOpen: false, chartRegistry: {},
            selectedMonth: new Date().getMonth(), selectedYear: new Date().getFullYear(),
            customersLoaded: false, companyExpensesLoaded: false, _listenersSetup: false, _currentViewId: null
        },

        init() {
            this.updateDate();
            window.auth.onAuthStateChanged((user) => {
                if (user) this.loadUserData(user.uid);
                else this.showLogin();
            });
        },

        async loadUserData(uid) {
            try {
                const userDoc = await window.db.collection('users').doc(uid).get();
                if (userDoc.exists) {
                    this.data.currentUser = { id: uid, ...userDoc.data() };
                }
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-header').classList.remove('hidden');
                this.renderSidebar();
                this.initMonthPicker();
                const initView = this.data.currentUser.role === 'admin' ? 'admin-dashboard' : 'rider-dashboard';
                await this.setupRealtimeListeners();
                this._renderView(initView);
            } catch (error) {
                this.logout();
            }
        },

        async setupRealtimeListeners() {
            if (this.data._listenersSetup) return;
            this.data._listenersSetup = true;
            const ridersSnap = await window.db.collection('users').where('role', '==', 'rider').get();
            this.data.users = ridersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const reportsSnap = await window.db.collection('reports').get();
            this.data.reports = reportsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            await this.ensureCustomers();
        },

        async ensureCustomers() {
            if (this.data.customersLoaded) return;
            const snap = await window.db.collection('customers').get();
            this.data.customers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            this.data.customersLoaded = true;
        },

        updateDate() {
            const dateEl = document.getElementById('current-date');
            if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-PK', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        },

        showLogin() {
            document.getElementById('main-container').innerHTML = `
                <div class="min-h-full flex flex-col md:flex-row items-center justify-center gap-6 fade-in p-4 overflow-y-auto">
                    <!-- Standard Portal Login -->
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                        <div class="text-center mb-6">
                            <div class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white text-xl mx-auto mb-4 shadow-lg shadow-indigo-200"><i class="fas fa-motorcycle"></i></div>
                            <h2 class="text-xl font-bold text-gray-800">Dastak Portal</h2>
                            <p class="text-gray-500 text-sm">Sign in to access your portal</p>
                        </div>
                        <form onsubmit="app.handleLogin(event)" class="space-y-4">
                            <input type="email" id="login-email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="rider@example.com" required>
                            <input type="password" id="login-pass" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" required>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">Sign In</button>
                        </form>
                    </div>

                    <!-- Read-only Customer Quick View Box -->
                    <div class="bg-gradient-to-br from-purple-700 to-indigo-800 p-6 md:p-8 rounded-2xl shadow-xl w-full max-w-md text-white">
                        <div class="text-center mb-4">
                            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-xl mx-auto mb-2"><i class="fas fa-user-shield"></i></div>
                            <h2 class="text-lg font-bold">Customer Payment Ledger</h2>
                            <p class="text-purple-200 text-xs">Apni Online Payment Report Check Karein</p>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs font-medium text-purple-200 mb-1">Enter Customer ID (e.g., M081)</label>
                                <div class="flex gap-2">
                                    <input type="text" id="cust-search-id" class="flex-1 px-3 py-2 bg-white/10 border border-white/20 rounded-lg text-white font-bold placeholder-white/40 outline-none focus:ring-2 focus:ring-white/50 uppercase" placeholder="M081" autocomplete="off">
                                    <button onclick="app.fetchCustomerLedgerPublic()" class="bg-white text-indigo-900 font-bold px-4 py-2 rounded-lg hover:bg-purple-100 transition-colors text-sm">Check Status</button>
                                </div>
                            </div>
                            <div id="public-ledger-result" class="bg-white/10 rounded-xl p-3 hidden max-h-60 overflow-y-auto text-xs space-y-2">
                                <!-- Results populate dynamically here -->
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden');
        },

        // Customer read-only tracking system box logic
        async fetchCustomerLedgerPublic() {
            const searchId = document.getElementById('cust-search-id').value.trim().toUpperCase();
            const resultBox = document.getElementById('public-ledger-result');
            if(!searchId) { alert("Meherbani karke Customer ID enter karein."); return; }
            
            resultBox.classList.remove('hidden');
            resultBox.innerHTML = `<p class="text-center animate-pulse py-2">Searching data...</p>`;

            try {
                const querySnap = await window.db.collection('customers').where('customerId', '==', searchId).get();
                if(querySnap.empty) {
                    resultBox.innerHTML = `<p class="text-red-300 font-medium text-center">ID: ${searchId} Nahi Mili!</p>`;
                    return;
                }

                let pendingHtml = '', paidHtml = '';
                let tPending = 0, tPaid = 0;

                this.data.reports.forEach(report => {
                    if(report.status !== 'deleted' && report.onlinePayments) {
                        report.onlinePayments.forEach(p => {
                            if((p.customerId && p.customerId.toUpperCase() === searchId) || (p.customerDocId === querySnap.docs[0].id)) {
                                const itemText = p.items ? ` (${p.items})` : '';
                                if(p.status === 'pending') {
                                    tPending += p.amount;
                                    pendingHtml += `<div class="border-b border-white/10 pb-1 flex justify-between"><span>⏳ ${report.date}${itemText}</span><span class="font-bold text-orange-300">Rs ${p.amount}</span></div>`;
                                } else {
                                    tPaid += p.amount;
                                    paidHtml += `<div class="border-b border-white/10 pb-1 flex justify-between"><span>✅ ${report.date}${itemText}</span><span class="font-bold text-green-300">Rs ${p.amount}</span></div>`;
                                }
                            }
                        });
                    }
                });

                let finalOutput = `<div class="bg-black/20 p-2 rounded mb-2 text-center font-bold text-sm text-yellow-300">${querySnap.docs[0].data().name}</div>`;
                finalOutput += `<div class="grid grid-cols-2 gap-2 mb-2 font-bold text-center"><div class="bg-orange-600/30 p-1.5 rounded">Pending:<br>Rs ${tPending}</div><div class="bg-green-600/30 p-1.5 rounded">Paid:<br>Rs ${tPaid}</div></div>`;
                
                finalOutput += `<p class="font-bold text-orange-200 uppercase tracking-wider text-[10px] mt-2">⚠️ Pending Invoices</p>` + (pendingHtml || '<p class="text-white/40">No pending payments</p>');
                finalOutput += `<p class="font-bold text-green-200 uppercase tracking-wider text-[10px] mt-2">💼 Paid History</p>` + (paidHtml || '<p class="text-white/40">No paid ledger records found</p>');
                
                resultBox.innerHTML = finalOutput;
            } catch(e) {
                resultBox.innerHTML = `<p class="text-red-400">Error fetching data.</p>`;
            }
        },

        async handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            try {
                await window.auth.signInWithEmailAndPassword(email, password);
            } catch (error) { alert('Login failed: ' + error.message); }
        },

        logout() { this.data.currentUser = null; window.auth.signOut().then(() => location.reload()); },

        renderSidebar() {
            const nav = document.getElementById('nav-menu');
            if (!nav || !this.data.currentUser) return;
            const isAdmin = this.data.currentUser.role === 'admin';
            const menuItems = isAdmin ? [
                { id:'admin-dashboard', icon:'fa-chart-line', label:'Dashboard' },
                { id:'admin-customers', icon:'fa-address-book', label:'Customers / Contacts' }
            ] : [
                { id:'rider-dashboard', icon:'fa-home', label:'Dashboard' }
            ];
            nav.innerHTML = menuItems.map(item => `
                <button onclick="app.navigate('${item.id}')" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 font-medium hover:bg-gray-50 text-left" id="nav-${item.id}">
                    <i class="fas ${item.icon} w-5 text-center"></i><span>${item.label}</span>
                </button>`).join('');
        },

        initMonthPicker() {},
        onMonthChange() {},
        navigate(viewId) { this._renderView(viewId); },

        _renderView(viewId) {
            this.data._currentViewId = viewId;
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active', 'bg-indigo-600', 'text-white'));
            const activeBtn = document.getElementById(`nav-${viewId}`);
            if (activeBtn) activeBtn.classList.add('active');

            if (viewId === 'admin-customers') this.renderAdminCustomers();
            else if (viewId === 'admin-dashboard') this.renderAdminDashboard();
        },

        renderAdminDashboard() {
            document.getElementById('page-title').textContent = 'Admin Dashboard';
            document.getElementById('main-container').innerHTML = `
                <div class="space-y-4 fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="stat-card cursor-pointer bg-white border-l-4 border-indigo-600 shadow-sm" onclick="app.navigate('admin-customers')">
                            <h3 class="font-bold text-lg text-gray-800">Manage Customers & Contacts</h3>
                            <p class="text-xs text-gray-500 mt-1">Deduplicate system, adjust CSV uploads and dynamic IDs.</p>
                        </div>
                        <div class="stat-card bg-white border-l-4 border-purple-600 shadow-sm">
                            <h3 class="font-bold text-lg text-gray-800">Active Contacts Log</h3>
                            <p class="text-2xl font-bold text-purple-700 mt-2">${this.data.customers.length}</p>
                        </div>
                    </div>
                    <div id="duplicate-warning-banner"></div>
                </div>`;
            this.checkDuplicatesGlobal();
        },

        // Checks system dynamically for duplicates via phone numbers
        checkDuplicatesGlobal() {
            const banner = document.getElementById('duplicate-warning-banner');
            if(!banner) return;
            const seen = {};
            const duplicates = [];
            
            this.data.customers.forEach(c => {
                if(c.phone) {
                    const norm = c.phone.replace(/\D/g,'');
                    if(seen[norm]) duplicates.push(c);
                    else seen[norm] = true;
                }
            });

            if(duplicates.length > 0) {
                banner.innerHTML = `
                    <div class="bg-amber-50 border border-amber-300 rounded-xl p-4 text-amber-900 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                        <div>
                            <p class="font-bold"><i class="fas fa-exclamation-triangle mr-2 text-amber-600"></i>Duplicate System Entry Detected!</p>
                            <p class="text-xs text-amber-700">Total ${duplicates.length} duplicate customers/contacts matched via phone metrics.</p>
                        </div>
                        <button onclick="app.showDuplicateMergeModal()" class="bg-amber-600 text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-amber-700 whitespace-nowrap">Review & Merge/Delete</button>
                    </div>`;
            }
        },

        // Render customer administration panel
        renderAdminCustomers() {
            document.getElementById('page-title').textContent = 'Customers / Contacts Management';
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="space-y-4 fade-in pb-20">
                    <div class="flex flex-wrap gap-2 justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex gap-2">
                            <button onclick="app.openAddCustomerModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700"><i class="fas fa-plus mr-1"></i>New Contact</button>
                            <button onclick="app.showDuplicateMergeModal()" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-amber-700"><i class="fas fa-clone mr-1"></i>Check Duplicates</button>
                        </div>
                        <!-- CSV Integration System Area -->
                        <div class="border border-dashed border-gray-300 p-2 rounded-lg flex items-center gap-2 bg-gray-50">
                            <span class="text-xs font-semibold text-gray-600">Import CSV:</span>
                            <input type="file" id="csv-file-input" accept=".csv" class="text-xs text-gray-500 w-44">
                            <button onclick="app.processCSVUpload()" class="bg-green-600 text-white font-bold text-xs px-3 py-1.5 rounded hover:bg-green-700">Upload & Adjust</button>
                        </div>
                    </div>

                    <div class="section-card overflow-x-auto">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-gray-100 border-b border-gray-200 font-bold text-gray-600"><th class="p-3">ID (B ID)</th><th class="p-3">Customer Name</th><th class="p-3">Phone</th><th class="p-3">Address</th><th class="p-3 text-center">Actions</th></tr>
                            </thead>
                            <tbody>
                                ${this.data.customers.map(c => `
                                    <tr class="border-b border-gray-100 hover:bg-gray-50">
                                        <td class="p-3 font-bold text-indigo-600">${c.customerId || '<span class="text-red-500 italic text-xs">No B-ID</span>'}</td>
                                        <td class="p-3 font-medium">${c.name}</td><td class="p-3">${c.phone || '—'}</td><td class="p-3 truncate max-w-xs">${c.address || '—'}</td>
                                        <td class="p-3 text-center">
                                            <button onclick="app.openEditCustomerModal('${c.id}')" class="text-indigo-600 hover:underline mx-1 text-xs font-bold"><i class="fas fa-edit mr-0.5"></i>Edit</button> | 
                                            <button onclick="app.deleteCustomerDirect('${c.id}')" class="text-red-600 hover:underline mx-1 text-xs font-bold"><i class="fas fa-trash"></i>Delete</button>
                                        </td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        },

        // Generates clean system sequential B-IDs automatically
        generateAutoID() {
            let maxNum = 0;
            this.data.customers.forEach(c => {
                if(c.customerId && c.customerId.startsWith('M')) {
                    const num = parseInt(c.customerId.substring(1));
                    if(!isNaN(num) && num > maxNum) maxNum = num;
                }
            });
            return 'M' + String(maxNum + 1).padStart(3, '0');
        },

        openAddCustomerModal() {
            const mc = document.getElementById('modal-content');
            const ov = document.getElementById('modal-overlay');
            const newId = this.generateAutoID();
            mc.innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold">Add New Contact</h2><button onclick="app.closeModal()"><i class="fas fa-times"></i></button></div>
                    <form onsubmit="app.saveNewCustomerForm(event)" class="space-y-3">
                        <div><label class="block text-xs font-semibold mb-1">Customer ID (Auto-Generated)</label><input type="text" id="cust-modal-id" value="${newId}" class="w-full p-2 border rounded bg-gray-50 font-bold text-indigo-700 outline-none" required></div>
                        <div><label class="block text-xs font-semibold mb-1">Name *</label><input type="text" id="cust-modal-name" class="w-full p-2 border rounded" required></div>
                        <div><label class="block text-xs font-semibold mb-1">Phone *</label><input type="tel" id="cust-modal-phone" class="w-full p-2 border rounded" required></div>
                        <div><label class="block text-xs font-semibold mb-1">Address</label><input type="text" id="cust-modal-addr" class="w-full p-2 border rounded"></div>
                        <button type="submit" class="w-full bg-indigo-600 text-white p-2.5 rounded font-bold hover:bg-indigo-700">Save System Contact</button>
                    </form>
                </div>`;
            ov.classList.remove('hidden');
            mc.classList.remove('scale-95','opacity-0');
        },

        async saveNewCustomerForm(e) {
            e.preventDefault();
            const cId = document.getElementById('cust-modal-id').value.trim().toUpperCase();
            const name = document.getElementById('cust-modal-name').value.trim();
            const phone = document.getElementById('cust-modal-phone').value.trim();
            const address = document.getElementById('cust-modal-addr').value.trim();

            const payload = { customerId: cId, name, phone, address, createdAt: new Date().toISOString() };
            const docRef = await window.db.collection('customers').add(payload);
            this.data.customers.push({ id: docRef.id, ...payload });
            this.closeModal();
            this.renderAdminCustomers();
            alert("Contact added seamlessly!");
        },

        // Automatically fixes missing IDs dynamically while editing an item
        openEditCustomerModal(id) {
            const customer = this.data.customers.find(c => c.id === id);
            if(!customer) return;
            const mc = document.getElementById('modal-content');
            const ov = document.getElementById('modal-overlay');

            // Requirement fulfilled: Pehle se save contact me ID nahi thi to automatic code inject text generation
            let assignedId = customer.customerId;
            if(!assignedId || assignedId === "") {
                assignedId = this.generateAutoID(); // Auto-generates if B ID is missing on update
            }

            mc.innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold">Edit System Contact Details</h2><button onclick="app.closeModal()"><i class="fas fa-times"></i></button></div>
                    <form onsubmit="app.saveEditCustomerForm(event, '${id}')" class="space-y-3">
                        <div><label class="block text-xs font-semibold mb-1">Customer ID (Auto-Injected if empty)</label><input type="text" id="cust-edit-id" value="${assignedId}" class="w-full p-2 border rounded bg-yellow-50 font-bold text-indigo-700 outline-none" required></div>
                        <div><label class="block text-xs font-semibold mb-1">Name</label><input type="text" id="cust-edit-name" value="${customer.name}" class="w-full p-2 border rounded" required></div>
                        <div><label class="block text-xs font-semibold mb-1">Phone</label><input type="text" id="cust-edit-phone" value="${customer.phone || ''}" class="w-full p-2 border rounded" required></div>
                        <div><label class="block text-xs font-semibold mb-1">Address</label><input type="text" id="cust-edit-addr" value="${customer.address || ''}" class="w-full p-2 border rounded"></div>
                        <button type="submit" class="w-full bg-indigo-600 text-white p-2.5 rounded font-bold hover:bg-indigo-700">Update Record</button>
                    </form>
                </div>`;
            ov.classList.remove('hidden');
            mc.classList.remove('scale-95','opacity-0');
        },

        async saveEditCustomerForm(e, docId) {
            e.preventDefault();
            const cId = document.getElementById('cust-edit-id').value.trim().toUpperCase();
            const name = document.getElementById('cust-edit-name').value.trim();
            const phone = document.getElementById('cust-edit-phone').value.trim();
            const address = document.getElementById('cust-edit-addr').value.trim();

            await window.db.collection('customers').doc(docId).update({ customerId: cId, name, phone, address });
            const localIndex = this.data.customers.findIndex(c => c.id === docId);
            if(localIndex !== -1) {
                this.data.customers[localIndex].customerId = cId;
                this.data.customers[localIndex].name = name;
                this.data.customers[localIndex].phone = phone;
                this.data.customers[localIndex].address = address;
            }
            this.closeModal();
            this.renderAdminCustomers();
            alert("Contact data saved with assigned Auto ID structure!");
        },

        // Duplicate Manager Modal View with Merge & Purge features
        showDuplicateMergeModal() {
            const mc = document.getElementById('modal-content');
            const ov = document.getElementById('modal-overlay');
            
            const matches = {};
            this.data.customers.forEach(c => {
                if(c.phone) {
                    const cleanPhone = c.phone.replace(/\D/g,'');
                    if(!matches[cleanPhone]) matches[cleanPhone] = [];
                    matches[cleanPhone].push(c);
                }
            });

            let dupHtml = '';
            Object.keys(matches).forEach(key => {
                if(matches[key].length > 1) {
                    dupHtml += `<div class="bg-gray-50 border p-3 rounded-xl space-y-2 mb-3">
                        <p class="font-bold text-red-600 text-xs">Phone Network Match: ${key}</p>`;
                    matches[key].forEach(customer => {
                        dupHtml += `<div class="flex justify-between items-center text-xs bg-white p-2 border rounded shadow-2xs">
                            <div><span class="font-bold text-indigo-600">${customer.customerId || '[NO ID]'}</span> - <b>${customer.name}</b> (${customer.address || 'No Address'})</div>
                            <div class="flex gap-1">
                                <button onclick="app.executeInstantMerge('${matches[key][0].id}', '${customer.id}')" class="bg-indigo-100 text-indigo-700 font-bold px-2 py-1 rounded text-[10px] ${matches[key][0].id === customer.id ? 'hidden':''}">Merge Into Head</button>
                                <button onclick="app.deleteCustomerDirect('${customer.id}', true)" class="bg-red-100 text-red-600 font-bold px-2 py-1 rounded text-[10px]">Delete</button>
                            </div>
                        </div>`;
                    });
                    dupHtml += `</div>`;
                }
            });

            mc.innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-4"><h2 class="text-base font-bold text-gray-800">Duplicate Management Interface</h2><button onclick="app.closeModal()"><i class="fas fa-times"></i></button></div>
                    <div class="max-h-96 overflow-y-auto space-y-2">${dupHtml || '<p class="text-center text-gray-500 py-6 text-sm">System clean! No standard duplicates found.</p>'}</div>
                </div>`;
            ov.classList.remove('hidden');
            mc.classList.remove('scale-95','opacity-0');
        },

        async executeInstantMerge(targetId, sourceId) {
            if(targetId === sourceId) return;
            if(!confirm("Kya aap is entry ka saara record primary head account me merge karna chahte hain?")) return;

            // Updating payment tables references across reports locally
            this.data.reports.forEach(async (rep) => {
                let modified = false;
                if(rep.onlinePayments) {
                    rep.onlinePayments.forEach(pay => {
                        if(pay.customerDocId === sourceId) {
                            pay.customerDocId = targetId;
                            modified = true;
                        }
                    });
                    if(modified) {
                        await window.db.collection('reports').doc(rep.id).update({ onlinePayments: rep.onlinePayments });
                    }
                }
            });

            await window.db.collection('customers').doc(sourceId).delete();
            this.data.customers = this.data.customers.filter(c => c.id !== sourceId);
            alert("Ledger values merged and reference profile purged efficiently!");
            this.closeModal();
            this.renderAdminCustomers();
        },

        // CSV File Parser Engine with dynamic data duplication adjustment logic
        async processCSVUpload() {
            const input = document.getElementById('csv-file-input');
            if(!input.files || input.files.length === 0) { alert("Pehle koi valid CSV file select karein."); return; }

            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = async (e) => {
                const text = e.target.result;
                const rows = text.split('\n').map(row => row.split(','));
                let importedCount = 0;
                let adjustedCount = 0;

                // Loop skips CSV headers -> Format expected: Name, Phone, Address, CustomerID
                for(let i = 1; i < rows.length; i++) {
                    if(rows[i].length < 2 || !rows[i][0]) continue;
                    
                    const name = rows[i][0].replace(/"/g, '').trim();
                    const phone = rows[i][1].replace(/"/g, '').trim();
                    const address = rows[i][2] ? rows[i][2].replace(/"/g, '').trim() : '';
                    let cId = rows[i][3] ? rows[i][3].replace(/"/g, '').trim().toUpperCase() : '';

                    const cleanPhone = phone.replace(/\D/g, '');
                    // Cross checking system cache for existing customer profiles
                    const duplicateMatch = this.data.customers.find(c => c.phone.replace(/\D/g, '') === cleanPhone || (cId && c.customerId === cId));

                    if(duplicateMatch) {
                        // Adjustment Rule: Overwrites details or retains current data if conflicting records found
                        adjustedCount++;
                        await window.db.collection('customers').doc(duplicateMatch.id).update({
                            address: duplicateMatch.address || address
                        });
                    } else {
                        // Regular Entry creation
                        if(!cId) cId = this.generateAutoID();
                        const payload = { customerId: cId, name, phone, address, createdAt: new Date().toISOString() };
                        const res = await window.db.collection('customers').add(payload);
                        this.data.customers.push({ id: res.id, ...payload });
                        importedCount++;
                    }
                }

                alert(`CSV Processing completed! New Imported: ${importedCount}, Adjusted/Merged: ${adjustedCount}`);
                this.renderAdminCustomers();
            };
            reader.readAsText(file);
        },

        async deleteCustomerDirect(docId, insideModal = false) {
            if(!confirm("Kya aap is contact ko database se hamesha ke liye delete karna chahte hain?")) return;
            await window.db.collection('customers').doc(docId).delete();
            this.data.customers = this.data.customers.filter(c => c.id !== docId);
            if(insideModal) this.closeModal();
            this.renderAdminCustomers();
            alert("Entry removed.");
        },

        closeModal() {
            const mc = document.getElementById('modal-content');
            const ov = document.getElementById('modal-overlay');
            mc.classList.add('scale-95','opacity-0');
            ov.classList.add('hidden');
        }
    };

    window.onload = () => app.init();
    </script>
</body>
</html>
