            _adminLookupCust(val, idx) {
                const id = val.trim().toUpperCase();
                const nameEl = document.getElementById(`admin-pay-name-${idx}`);
                const addrEl = document.getElementById(`admin-pay-addr-${idx}`);
                const phoneEl = document.getElementById(`admin-pay-phone-${idx}`);
                const docEl = document.getElementById(`admin-pay-docid-${idx}`);
                if (id.length < 1) {
                    if (nameEl) nameEl.value = ''; if (addrEl) addrEl.value = '';
                    if (phoneEl) phoneEl.value = ''; if (docEl) docEl.value = '';
                    return;
                }
                const customers = this.data.customers || [];
                let match = customers.find(c => (c.customerId||'').toUpperCase() === id)
                    || customers.find(c => (c.name||'').toUpperCase() === id)
                    || customers.find(c => (c.phone||'').replace(/\D/g,'') === id.replace(/\D/g,''));
                if (match) {
                    if (nameEl) nameEl.value = match.name || '';
                    if (addrEl) addrEl.value = match.address || '';
                    if (phoneEl) phoneEl.value = match.phone || '';
                    if (docEl) docEl.value = match.id || '';
                } else {
                    if (nameEl) nameEl.value = ''; if (addrEl) addrEl.value = '';
                    if (phoneEl) phoneEl.value = ''; if (docEl) docEl.value = '';
                }
            },

            _adminCalcTotals() {
                let grossTotal = 0;
                [0,1,2].forEach(i => {
                    const qty = parseFloat(document.getElementById(`admin-order-qty-${i}`)?.value) || 0;
                    const rate = parseFloat(document.getElementById(`admin-order-rate-${i}`)?.value) || 0;
                    grossTotal += qty * rate;
                });
                const opening = parseFloat(document.getElementById('admin-opening')?.value) || 0;
                let onlineTotal = 0;
                document.querySelectorAll('[id^="admin-pay-amt-"]').forEach(el => {
                    onlineTotal += parseFloat(el?.value) || 0;
                });
                const fuel = parseFloat(document.getElementById('admin-exp-fuel')?.value) || 0;
                const food = parseFloat(document.getElementById('admin-exp-food')?.value) || 0;
                const maint = parseFloat(document.getElementById('admin-exp-maint')?.value) || 0;
                const expensesTotal = fuel + food + maint;
                const wage = parseFloat(document.getElementById('admin-wage')?.value) || 0;
                const final = opening + grossTotal - onlineTotal - expensesTotal - wage;
                if (document.getElementById('admin-sum-opening')) document.getElementById('admin-sum-opening').textContent = `Rs ${opening.toLocaleString()}`;
                if (document.getElementById('admin-sum-orders')) document.getElementById('admin-sum-orders').textContent = `+ Rs ${grossTotal.toLocaleString()}`;
                if (document.getElementById('admin-sum-online')) document.getElementById('admin-sum-online').textContent = `- Rs ${onlineTotal.toLocaleString()}`;
                if (document.getElementById('admin-sum-exp')) document.getElementById('admin-sum-exp').textContent = `- Rs ${expensesTotal.toLocaleString()}`;
                if (document.getElementById('admin-sum-wage')) document.getElementById('admin-sum-wage').textContent = `- Rs ${wage.toLocaleString()}`;
                if (document.getElementById('admin-sum-final')) document.getElementById('admin-sum-final').textContent = `Rs ${final.toLocaleString()}`;
            },

            async _adminSaveEdit(e, reportId) {
                e.preventDefault();
                const report = this.data.reports.find(r => r.id === reportId);
                if (!report) return;
                try {
                    const opening = parseFloat(document.getElementById('admin-opening').value) || 0;
                    const date = document.getElementById('admin-report-date').value;
                    const orders = [0,1,2].map(i => {
                        const qty = parseInt(document.getElementById(`admin-order-qty-${i}`)?.value) || 0;
                        const rate = parseFloat(document.getElementById(`admin-order-rate-${i}`)?.value) || 0;
                        return { type: `Type ${i+1}`, qty, rate, gross: qty * rate };
                    }).filter(o => o.qty > 0);
                    const onlinePayments = [];
                    document.querySelectorAll('[id^="admin-pay-amt-"]').forEach((el, idx) => {
                        const amt = parseFloat(el?.value) || 0;
                        if (amt <= 0) return;
                        const name = document.getElementById(`admin-pay-name-${idx}`)?.value || '';
                        const phone = document.getElementById(`admin-pay-phone-${idx}`)?.value || '';
                        const addr = document.getElementById(`admin-pay-addr-${idx}`)?.value || '';
                        const custId = document.getElementById(`admin-pay-custid-${idx}`)?.value || '';
                        const items = document.getElementById(`admin-pay-items-${idx}`)?.value || '';
                        const docId = document.getElementById(`admin-pay-docid-${idx}`)?.value || '';
                        const status = document.getElementById(`admin-pay-status-${idx}`)?.value || 'pending';
                        onlinePayments.push({
                            detail: name + (phone ? ' · ' + phone : '') || custId || '—',
                            customerName: name, customerAddress: addr, customerPhone: phone,
                            customerDocId: docId, customerId: custId, amount: amt, status, items
                        });
                    });
                    const expenses = [
                        { type: 'Fuel', amount: parseFloat(document.getElementById('admin-exp-fuel')?.value) || 0 },
                        { type: 'Food', amount: parseFloat(document.getElementById('admin-exp-food')?.value) || 0 },
                        { type: 'Maintenance', amount: parseFloat(document.getElementById('admin-exp-maint')?.value) || 0 }
                    ].filter(e => e.amount > 0);
                    const totalGross = orders.reduce((a, o) => a + o.gross, 0);
                    const totalExpenses = expenses.reduce((a, e) => a + e.amount, 0);
                    const totalOnline = onlinePayments.reduce((a, p) => a + p.amount, 0);
                    const dailyWage = parseFloat(document.getElementById('admin-wage')?.value) || 0;
                    const finalAmount = opening + totalGross - totalOnline - totalExpenses - dailyWage;
                    const updates = {
                        date, openingBalance: opening, orders, onlinePayments, expenses,
                        totalGross, totalExpenses, dailyWage, finalAmount,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await window.db.collection('reports').doc(reportId).update(updates);
                    Object.assign(report, updates);
                    this.closeModal();
                    this.renderAdminReports();
                    alert('Report updated successfully! ✅');
                } catch (error) { alert('Error: ' + error.message); }
            },

                try {
                    await window.db.collection('reports').doc(id).update({ status: 'deleted', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    const r = this.data.reports.find(r => r.id === id);
                    if (r) r.status = 'deleted';

                if (!confirm('Report recover karna hai?')) return;
                try {
                    await window.db.collection('reports').doc(id).update({ status: 'pending', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    const r = this.data.reports.find(r => r.id === id);
                    if (r) r.status = 'pending';

            async updateReportStatus(id, status) {
                const action = status === 'approved' ? 'approve' : status === 'rejected' ? 'reject' : 'update';
                if (!confirm(`Report ${action} karna hai?`)) return;
                try {
                    await window.db.collection('reports').doc(id).update({ status, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    const r = this.data.reports.find(r => r.id === id);
                    if (r) r.status = status;
                    if (this.data.currentUser.role === 'admin') this.renderAdminReports();
                    else this.renderRiderHistory();
                    alert(`Report ${status}! ✅`);
                } catch (error) { alert('Error: ' + error.message); }
            },

            exportMonthlyExcel() {
                const m = this.data.selectedMonth, y = this.data.selectedYear;
                const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
                const monthLabel = `${monthNames[m]} ${y}`;
                const reports = this.data.reports.filter(r => {
                    const d = new Date(r.date);
                    return d.getMonth() === m && d.getFullYear() === y && r.status !== 'deleted';
                }).sort((a,b) => new Date(a.date) - new Date(b.date));
                let csv = 'Date,Rider,Status,Opening,Gross,Online,Expenses,Wage,Final\n';
                reports.forEach(r => {
                    csv += `${r.date},${r.riderName},${r.status},${r.openingBalance||0},${r.totalGross||0},${(r.onlinePayments||[]).reduce((a,p)=>a+(p.amount||0),0)},${r.totalExpenses||0},${r.dailyWage||0},${r.finalAmount||0}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Dastak_Reports_${monthLabel.replace(' ','_')}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            },

                        <div class="stat-card border-l-4 border-green-500">
                            <p class="text-xs text-gray-500">Today's Status</p>
                            <h3 class="text-lg font-bold ${todayReport ? 'text-green-600' : draftReport ? 'text-yellow-600' : 'text-gray-400'}">${todayReport ? 'Submitted ✅' : draftReport ? 'Draft 📝' : 'Not Started'}</h3>
                        </div>
                        <div class="stat-card border-l-4 border-orange-500">
                            <p class="text-xs text-gray-500">Online Pending</p>
                            <h3 class="text-lg font-bold text-orange-600">Rs ${totalPending.toLocaleString()}</h3>
                        </div>
                    </div>
                    <button onclick="app.navigate('rider-report')" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition">
                        <i class="fas fa-plus-circle mr-2"></i>${todayReport ? 'Edit Report' : draftReport ? 'Continue Draft' : 'New Report'}
                    </button>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="app.navigate('rider-history')" class="section-card text-center py-4 hover:bg-gray-50 transition">
                            <i class="fas fa-history text-2xl text-indigo-600 mb-2"></i><p class="text-sm font-semibold">History</p>
                        </button>
                        <button onclick="app.navigate('rider-payments')" class="section-card text-center py-4 hover:bg-gray-50 transition">
                            <i class="fas fa-credit-card text-2xl text-green-600 mb-2"></i><p class="text-sm font-semibold">Payments</p>
                        </button>
                        <button onclick="app.navigate('rider-salary')" class="section-card text-center py-4 hover:bg-gray-50 transition">
                            <i class="fas fa-money-bill-wave text-2xl text-purple-600 mb-2"></i><p class="text-sm font-semibold">Salary</p>
                        </button>
                        <button onclick="app.logout()" class="section-card text-center py-4 hover:bg-gray-50 transition">
                            <i class="fas fa-sign-out-alt text-2xl text-red-500 mb-2"></i><p class="text-sm font-semibold">Logout</p>
                        </button>
                    </div>
                </div>`;
            },

            // ========== RIDER REPORT FORM ==========
            renderRiderReport() {
                document.getElementById('page-title').textContent = 'Daily Report';
                const container = document.getElementById('main-container');
                const user = this.data.currentUser;
                const wageEnabled = user?.wageEnabled !== false;
                const wageType = user?.wageType || 'fixed';
                const today = new Date().toISOString().split('T')[0];
                const editId = this.data._editReportId;
                let reportData = null;
                if (editId) {
                    reportData = this.data.reports.find(r => r.id === editId);
                    this.data._editReportId = null;
                }
                const isEdit = !!reportData;
                container.innerHTML = `<div class="fade-in pb-24 space-y-4">
                    <form id="report-form" onsubmit="app.submitReport(event)" class="space-y-4">
                        <input type="hidden" id="report-edit-id" value="${isEdit ? reportData.id : ''}">
                        <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                            <label class="text-xs text-gray-500 font-semibold">Date</label>
                            <input type="date" id="report-date" value="${isEdit ? reportData.date : today}" max="${today}"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none mt-1">
                        </div>
                        <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                            <label class="text-xs text-gray-500 font-semibold">Opening Balance (Rs)</label>
                            <input type="number" id="opening-balance" value="${isEdit ? reportData.openingBalance : 0}" min="0"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none mt-1"
                                oninput="app.calculateTotals()">
                        </div>
                        <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                            <h3 class="font-bold text-gray-700 text-sm mb-3">Orders</h3>
                            <div class="space-y-3">
                                ${[1,2,3].map(i => {
                                    const o = isEdit && reportData.orders ? reportData.orders[i-1] : null;
                                    return `<div class="bg-gray-50 rounded-lg p-3">
                                        <p class="text-xs font-semibold text-indigo-700 mb-2">Type ${i}</p>
                                        <div class="grid grid-cols-2 gap-2">
                                            <div><label class="text-xs text-gray-500">Qty</label>
                                                <input type="number" id="order-qty-${i}" value="${o ? o.qty : 0}" min="0"
                                                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none"
                                                    oninput="app.calculateTotals()"></div>
                                            <div><label class="text-xs text-gray-500">Rate</label>
                                                <input type="number" id="order-rate-${i}" value="${o ? o.rate : (i===1?100:i===2?150:200)}" min="0"
                                                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none"
                                                    oninput="app.calculateTotals()"></div>
                                        </div>
                                        <p class="text-xs text-right text-gray-500 mt-1">Gross: <span id="order-gross-${i}" class="font-semibold text-indigo-600">Rs 0</span></p>
                                    </div>`;
                                }).join('')}
                            </div>
                            <div class="text-right mt-2 pt-2 border-t border-gray-100">
                                <span class="text-xs text-gray-500">Grand Gross:</span>
                                <span id="grand-gross-total" class="font-bold text-indigo-700 ml-1">Rs 0</span>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-gray-700 text-sm">Online Payments</h3>
                                <button type="button" onclick="app.addOnlinePaymentRow()" class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg font-semibold">
                                    <i class="fas fa-plus mr-1"></i>Add
                                </button>
                            </div>
                            <div id="online-payments-list" class="space-y-2"></div>
                            <div class="text-right mt-2 pt-2 border-t border-gray-100">
                                <span class="text-xs text-gray-500">Total Pending:</span>
                                <span id="online-pending-display" class="font-bold text-orange-600 ml-1">Rs 0</span>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                            <h3 class="font-bold text-gray-700 text-sm mb-3">Expenses</h3>
                            <div class="grid grid-cols-3 gap-2">
                                <div><label class="text-xs text-gray-500">Fuel</label>
                                    <input type="number" id="exp-fuel" value="${isEdit && reportData.expenses ? (reportData.expenses.find(e=>e.type==='Fuel')?.amount||0) : 0}" min="0"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none"
                                        oninput="app.calculateTotals()"></div>
                                <div><label class="text-xs text-gray-500">Food</label>
                                    <input type="number" id="exp-food" value="${isEdit && reportData.expenses ? (reportData.expenses.find(e=>e.type==='Food')?.amount||0) : 0}" min="0"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none"
                                        oninput="app.calculateTotals()"></div>
                                <div><label class="text-xs text-gray-500">Maint.</label>
                                    <input type="number" id="exp-maint" value="${isEdit && reportData.expenses ? (reportData.expenses.find(e=>e.type==='Maintenance')?.amount||0) : 0}" min="0"
                                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none"
                                        oninput="app.calculateTotals()"></div>
                            </div>
                        </div>
                        ${wageEnabled && wageType !== 'none' ? `
                        <div class="bg-yellow-50 rounded-xl p-4 border border-yellow-200">
                            <h3 class="font-bold text-gray-700 text-sm mb-2">Daily Wage</h3>
                            ${wageType === 'custom' ? `
                            <input type="number" id="wage-input" value="${isEdit ? reportData.dailyWage : (user.dailyWage||500)}" min="0"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none"
                                oninput="app.calculateTotals()" placeholder="Enter wage">
                            ` : `<p class="text-sm text-gray-600">Fixed: Rs ${user.dailyWage||500}</p>`}
                        </div>` : ''}
                        <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                            <h3 class="font-bold text-gray-700 text-sm mb-2">Proof Image</h3>
                            <div id="proof-preview-area" class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center ${isEdit && reportData.proofImage ? 'hidden' : ''}">
                                <i class="fas fa-camera text-2xl text-gray-400 mb-2"></i>
                                <p class="text-xs text-gray-500">Tap to upload</p>
                                <input type="file" id="proof-image" accept="image/*" onchange="app.previewImage(this)" class="hidden">
                            </div>
                            <img id="proof-preview-img" src="${isEdit && reportData.proofImage ? reportData.proofImage : ''}" class="w-full rounded-lg max-h-48 object-cover ${isEdit && reportData.proofImage ? '' : 'hidden'}">
                        </div>
                        <div class="bg-indigo-50 rounded-xl p-4 space-y-1">
                            <div class="flex justify-between text-sm"><span>Opening:</span><span id="sum-opening">Rs 0</span></div>
                            <div class="flex justify-between text-sm text-green-600"><span>+ Orders:</span><span id="sum-orders">Rs 0</span></div>
                            <div class="flex justify-between text-sm text-red-500"><span>- Online:</span><span id="sum-online">Rs 0</span></div>
                            <div class="flex justify-between text-sm text-red-500"><span>- Expenses:</span><span id="sum-expenses">Rs 0</span></div>
                            <div class="flex justify-between text-sm text-red-500"><span>- Wage:</span><span id="sum-wage">Rs 0</span></div>
                            <div class="flex justify-between font-bold text-indigo-900 text-lg pt-2 border-t border-indigo-200"><span>Final</span><span id="sum-final">Rs 0</span></div>
                        </div>
                        <div class="flex gap-3">
                            <button type="submit" data-draft="true" class="flex-1 bg-yellow-500 text-white py-3 rounded-xl font-bold shadow">
                                <i class="fas fa-save mr-1"></i>Save Draft
                            </button>
                            <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow hover:bg-indigo-700">
                                <i class="fas fa-paper-plane mr-1"></i>Submit
                            </button>
                        </div>
                    </form>
                </div>`;
                if (isEdit && reportData.onlinePayments) {
                    reportData.onlinePayments.forEach(() => this.addOnlinePaymentRow());
                    setTimeout(() => {
                        reportData.onlinePayments.forEach((p, i) => {
                            const rows = document.querySelectorAll('#online-payments-list > div');
                            const row = rows[i]; if (!row) return;
                            row.querySelector('.cust-id-input').value = p.customerId || p.detail || '';
                            row.querySelector('.online-amt').value = p.amount || 0;
                            row.querySelector('.auto-cust-name').value = p.customerName || '';
                            row.querySelector('.auto-cust-phone').value = p.customerPhone || '';
                            row.querySelector('.auto-cust-addr').value = p.customerAddress || '';
                            row.querySelector('.online-items').value = p.items || '';
                            row.querySelector('.cust-doc-id').value = p.customerDocId || '';
                        });
                        this.calculateTotals();
                    }, 100);
                }
                setTimeout(() => this.calculateTotals(), 50);
            },

            addOnlinePaymentRow() {
                const container = document.getElementById('online-payments-list');
                const rowId = Date.now() + Math.random().toString(36).substr(2, 5);
                const div = document.createElement('div');
                div.className = 'bg-indigo-50 border border-indigo-100 rounded-xl p-3 space-y-2';
                div.innerHTML = `
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-2">
                        <label class="text-xs font-bold text-yellow-800 block mb-1">Customer ID</label>
                        <input type="text" placeholder="e.g. C001, R001..." class="cust-id-input w-full border border-yellow-300 rounded px-2 py-1.5 text-sm outline-none font-mono bg-white"
                            oninput="app.lookupCustomerById(this, '${rowId}')">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-xs text-gray-500">Name</label>
                            <input type="text" id="auto-name-${rowId}" class="auto-cust-name w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm outline-none"></div>
                        <div><label class="text-xs text-gray-500">Phone</label>
                            <input type="text" id="auto-phone-${rowId}" class="auto-cust-phone w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm outline-none"></div>
                    </div>
                    <div><label class="text-xs text-gray-500">Address</label>
                        <input type="text" id="auto-addr-${rowId}" class="auto-cust-addr w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm outline-none"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-xs text-gray-500">Amount (Rs)</label>
                            <input type="number" class="online-amt w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm outline-none" min="0" oninput="app.calculateTotals()"></div>
                        <div><label class="text-xs text-gray-500">Items</label>
                            <input type="text" class="online-items w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm outline-none" placeholder="e.g. 2x Biryani"></div>
                    </div>
                    <input type="hidden" id="cust-doc-id-${rowId}" class="cust-doc-id">`;
                container.appendChild(div);
            },

            // ========== COMPANY EXPENSES ==========
            renderCompanyExpenses() {
                document.getElementById('page-title').textContent = 'Company Expenses';
                const container = document.getElementById('main-container');
                const m = this.data.selectedMonth, y = this.data.selectedYear;
                const monthExpenses = (this.data.companyExpenses || []).filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === m && d.getFullYear() === y;
                }).sort((a,b) => new Date(b.date) - new Date(a.date));
                const total = monthExpenses.reduce((a,e) => a + (e.amount||0), 0);
                container.innerHTML = `<div class="fade-in pb-20 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-semibold">${new Date(y,m).toLocaleString('en-US',{month:'long',year:'numeric'})}</span>
                        <span class="text-sm font-bold text-purple-600">Total: Rs ${total.toLocaleString()}</span>
                    </div>
                    <form onsubmit="app.addCompanyExpense(event)" class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="comp-exp-date" value="${new Date().toISOString().split('T')[0]}" class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                            <input type="number" id="comp-exp-amount" placeholder="Amount" min="0" class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                        </div>
                        <input type="text" id="comp-exp-desc" placeholder="Description" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                        <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold"><i class="fas fa-plus mr-1"></i>Add Expense</button>
                    </form>
                    <div class="space-y-2">${monthExpenses.length === 0 ? '<p class="text-center text-gray-400 py-8">No expenses</p>' : monthExpenses.map(e => `
                        <div class="section-card flex justify-between items-center">
                            <div><p class="font-semibold text-sm">${e.description || '—'}</p><p class="text-xs text-gray-500">${new Date(e.date).toLocaleDateString()}</p></div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-purple-600">Rs ${(e.amount||0).toLocaleString()}</span>
                                <button onclick="app.deleteCompanyExpense('${e.id}')" class="text-red-500 p-1"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </div>`).join('')}</div>
                </div>`;
            },

            async addCompanyExpense(e) {
                e.preventDefault();
                try {
                    const date = document.getElementById('comp-exp-date').value;
                    const amount = parseFloat(document.getElementById('comp-exp-amount').value) || 0;
                    const description = document.getElementById('comp-exp-desc').value;
                    if (!date || amount <= 0 || !description) { alert('Sab fields fill karein!'); return; }
                    const docRef = await window.db.collection('companyExpenses').add({
                        date, amount, description,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        createdBy: this.data.currentUser.id
                    });
                    this.data.companyExpenses = this.data.companyExpenses || [];
                    this.data.companyExpenses.unshift({ id: docRef.id, date, amount, description });
                    this.renderCompanyExpenses();
                    alert('Expense added! ✅');
                } catch (error) { alert('Error: ' + error.message); }
            },

            async deleteCompanyExpense(id) {
                if (!confirm('Delete this expense?')) return;
                try {
                    await window.db.collection('companyExpenses').doc(id).delete();
                    this.data.companyExpenses = (this.data.companyExpenses || []).filter(e => e.id !== id);
                    this.renderCompanyExpenses();
                    alert('Deleted!');
                } catch (error) { alert('Error: ' + error.message); }
            },

            // ========== CUSTOMERS ==========
            ensureCustomers() {
                if (!this.data.customers) this.data.customers = [];
            },

            renderCustomers() {
                document.getElementById('page-title').textContent = 'Customers';
                const container = document.getElementById('main-container');
                this.ensureCustomers();
                const customers = this.data.customers;
                container.innerHTML = `<div class="fade-in pb-20 space-y-4">
                    <form onsubmit="app.addCustomer(event)" class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="cust-id" placeholder="Customer ID" class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none font-mono">
                            <input type="text" id="cust-name" placeholder="Name" class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="cust-phone" placeholder="Phone" class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                            <input type="text" id="cust-address" placeholder="Address" class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold"><i class="fas fa-plus mr-1"></i>Add Customer</button>
                    </form>
                    <div class="space-y-2">${customers.length === 0 ? '<p class="text-center text-gray-400 py-8">No customers</p>' : customers.map(c => `
                        <div class="section-card">
                            <div class="flex justify-between items-start">
                                <div><p class="font-bold text-sm">${c.name || '—'}</p><p class="text-xs text-gray-500">${c.customerId || '—'} · ${c.phone || '—'}</p><p class="text-xs text-gray-400">${c.address || ''}</p></div>
                                <button onclick="app.deleteCustomer('${c.id}')" class="text-red-500 p-1"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </div>`).join('')}</div>
                </div>`;
            },

            async addCustomer(e) {
                e.preventDefault();
                try {
                    const customerId = document.getElementById('cust-id').value.trim().toUpperCase();
                    const name = document.getElementById('cust-name').value.trim();
                    const phone = document.getElementById('cust-phone').value.trim();
                    const address = document.getElementById('cust-address').value.trim();
                    if (!customerId || !name) { alert('ID aur Name zaroori hain!'); return; }
                    const docRef = await window.db.collection('customers').add({
                        customerId, name, phone, address,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    this.data.customers = this.data.customers || [];
                    this.data.customers.push({ id: docRef.id, customerId, name, phone, address });
                    this.renderCustomers();
                    alert('Customer added! ✅');
                } catch (error) { alert('Error: ' + error.message); }
            },

            async deleteCustomer(id) {
                if (!confirm('Delete this customer?')) return;
                try {
                    await window.db.collection('customers').doc(id).delete();
                    this.data.customers = this.data.customers.filter(c => c.id !== id);
                    this.renderCustomers();
                    alert('Deleted!');
                } catch (error) { alert('Error: ' + error.message); }
            },

            // ========== ATTENDANCE ==========
            calculateAttendanceDeductions(riderId, month, year) {
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const monthAttendance = this.data.attendance.filter(a =>
                    a.riderId === riderId &&
                    new Date(a.date).getMonth() === month &&
                    new Date(a.date).getFullYear() === year
                );
                const presentDays = monthAttendance.filter(a => a.status === 'present').length;
                const absentDays = daysInMonth - presentDays;
                const perDaySalary = (this.data.currentUser.salaryBase || 15000) / daysInMonth;
                const totalDeduction = absentDays * perDaySalary;
                return { totalAbsences: absentDays, totalDeduction, presentDays, daysInMonth };
            },

            // ========== CHARTS ==========
            createChart(canvasId, config) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (window[canvasId + '_chart']) window[canvasId + '_chart'].destroy();
                window[canvasId + '_chart'] = new Chart(ctx, config);
            },

            // ========== DATA LOADING ==========
            async loadAllData() {
                try {
                    const [usersSnap, reportsSnap, attendanceSnap, expensesSnap, customersSnap] = await Promise.all([
                        window.db.collection('users').get(),
                        window.db.collection('reports').get(),
                        window.db.collection('attendance').get(),
                        window.db.collection('companyExpenses').get(),
                        window.db.collection('customers').get()
                    ]);
                    this.data.users = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.data.reports = reportsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.data.attendance = attendanceSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.data.companyExpenses = expensesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    this.data.customers = customersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                } catch (error) { console.error('Data load error:', error); }
            },

            getMonthFilteredReports(status) {
                const m = this.data.selectedMonth, y = this.data.selectedYear;
                return this.data.reports.filter(r => {
                    const d = new Date(r.date);
                    return d.getMonth() === m && d.getFullYear() === y && (status ? r.status === status : r.status !== 'deleted');
                });
            }
        };

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', () => {
            firebase.auth().onAuthStateChanged(async user => {
                if (user) {
                    const userDoc = await window.db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        app.data.currentUser = { id: user.uid, ...userDoc.data() };
                        if (app.data.currentUser.disabled) {
                            await firebase.auth().signOut();
                            app.navigate('login');
                            return;
                        }
                        await app.loadAllData();
                        const bottomNav = document.getElementById('bottom-nav');
                        if (bottomNav) bottomNav.classList.remove('hidden');
                        if (app.data.currentUser.role === 'admin') app.navigate('admin-dashboard');
                        else app.navigate('rider-dashboard');
                    } else { app.navigate('login'); }
                } else { app.navigate('login'); }
            });
        });
    </script>
</body>
</html>
