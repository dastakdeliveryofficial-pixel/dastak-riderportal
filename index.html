                <div class="space-y-3 text-sm">
                    <div class="flex justify-between"><span class="text-gray-500">Rider</span><span class="font-medium">${report.riderName}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Date</span><span class="font-medium">${new Date(report.date).toLocaleDateString()}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Status</span><span class="status-badge status-${report.status}">${report.status}</span></div>
                    <hr>
                    <div class="flex justify-between"><span class="text-gray-500">Opening Balance</span><span class="font-medium">Rs ${(report.openingBalance||0).toLocaleString()}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Orders Total</span><span class="font-medium">Rs ${orderTotal.toLocaleString()}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Online Payments</span><span class="font-medium text-orange-600">Rs ${onlinePayments.reduce((a,p)=>a+p.amount,0).toLocaleString()}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Expenses</span><span class="font-medium text-red-600">Rs ${((exp.fuel||0)+(exp.food||0)+(exp.maintenance||0)).toLocaleString()}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Daily Wage</span><span class="font-medium">Rs ${(report.dailyWage||0).toLocaleString()}</span></div>
                    <hr>
                    <div class="flex justify-between text-lg font-bold"><span>Final Amount</span><span>Rs ${(report.finalAmount||0).toLocaleString()}</span></div>
                    ${onlinePayments.length > 0 ? `
                    <hr><h4 class="font-semibold">Online Payments Detail</h4>
                    <div class="space-y-1">${onlinePayments.map(p => `
                        <div class="flex justify-between text-xs p-2 bg-gray-50 rounded"><span>${p.detail || '—'} ${p.customerId ? `(${p.customerId})` : ''}</span><span class="font-medium">Rs ${(p.amount||0).toLocaleString()}</span></div>
                    `).join('')}</div>` : ''}
                    ${report.proofImage ? `<img src="${report.proofImage}" class="max-h-48 mx-auto rounded-lg border">` : '<p class="text-xs text-gray-400 text-center">No proof image</p>'}
                </div>`);
        },


        // ========== ADMIN ONLINE PAYMENTS ==========
        renderAdminOnlinePayments() {
            document.getElementById('page-title').textContent = 'Online Payments';
            const container = document.getElementById('main-container');
            const cm = this.data.selectedMonth, cy = this.data.selectedYear;

            // Collect all online payments from approved reports
            let allPayments = [];
            this.data.reports.filter(r => r.status === 'approved').forEach(r => {
                const d = new Date(r.date);
                if (d.getMonth() === cm && d.getFullYear() === cy) {
                    (r.onlinePayments || []).forEach(p => {
                        allPayments.push({ ...p, riderName: r.riderName, riderId: r.riderId, reportDate: r.date, reportId: r.id });
                    });
                }
            });

            const pending = allPayments.filter(p => p.status === 'pending');
            const received = allPayments.filter(p => p.status === 'received');
            const pendingTotal = pending.reduce((a, p) => a + p.amount, 0);
            const receivedTotal = received.reduce((a, p) => a + p.amount, 0);

            // Group by rider
            const riderStats = {};
            allPayments.forEach(p => {
                if (!riderStats[p.riderId]) riderStats[p.riderId] = { name: p.riderName, pending: 0, received: 0, count: 0 };
                riderStats[p.riderId].count++;
                if (p.status === 'pending') riderStats[p.riderId].pending += p.amount;
                else riderStats[p.riderId].received += p.amount;
            });

            container.innerHTML = `
                <div class="fade-in pb-20 max-w-6xl mx-auto space-y-4">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="stat-card text-center border-l-4 border-orange-400"><p class="text-xs text-orange-600">Pending</p><p class="text-xl font-bold text-orange-700">Rs ${pendingTotal.toLocaleString()}</p><p class="text-xs text-gray-400">${pending.length} items</p></div>
                        <div class="stat-card text-center border-l-4 border-green-400"><p class="text-xs text-green-600">Received</p><p class="text-xl font-bold text-green-700">Rs ${receivedTotal.toLocaleString()}</p><p class="text-xs text-gray-400">${received.length} items</p></div>
                        <div class="stat-card text-center border-l-4 border-blue-400"><p class="text-xs text-blue-600">Total</p><p class="text-xl font-bold text-blue-700">Rs ${(pendingTotal+receivedTotal).toLocaleString()}</p><p class="text-xs text-gray-400">${allPayments.length} items</p></div>
                        <div class="stat-card text-center border-l-4 border-purple-400"><p class="text-xs text-purple-600">Riders</p><p class="text-xl font-bold text-purple-700">${Object.keys(riderStats).length}</p><p class="text-xs text-gray-400">Active</p></div>
                    </div>

                    <!-- Filter -->
                    <div class="flex gap-2 flex-wrap">
                        <select id="pay-status-filter" onchange="app._renderPaymentsList()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="received">Received</option>
                        </select>
                        <select id="pay-rider-filter" onchange="app._renderPaymentsList()" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                            <option value="all">All Riders</option>
                            ${Object.values(riderStats).map(r => `<option value="${r.name}">${r.name}</option>`).join('')}
                        </select>
                        <button onclick="app._showBulkPaymentModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">Bulk Receive</button>
                    </div>

                    <div id="payments-list" class="space-y-2"></div>
                </div>`;
            this._renderPaymentsList();
        },

        _renderPaymentsList() {
            const statusFilter = document.getElementById('pay-status-filter')?.value || 'all';
            const riderFilter = document.getElementById('pay-rider-filter')?.value || 'all';
            const list = document.getElementById('payments-list');
            if (!list) return;

            const cm = this.data.selectedMonth, cy = this.data.selectedYear;
            let allPayments = [];
            this.data.reports.filter(r => r.status === 'approved').forEach(r => {
                const d = new Date(r.date);
                if (d.getMonth() === cm && d.getFullYear() === cy) {
                    (r.onlinePayments || []).forEach(p => {
                        allPayments.push({ ...p, riderName: r.riderName, reportDate: r.date, reportId: r.id });
                    });
                }
            });

            if (statusFilter !== 'all') allPayments = allPayments.filter(p => p.status === statusFilter);
            if (riderFilter !== 'all') allPayments = allPayments.filter(p => p.riderName === riderFilter);
            allPayments.sort((a, b) => new Date(b.reportDate) - new Date(a.reportDate));

            if (allPayments.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-8">No payments found</p>';
                return;
            }

            list.innerHTML = allPayments.map(p => `
                <div class="section-card flex justify-between items-center ${p.status === 'pending' ? 'border-l-4 border-orange-400' : ''}">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                            <span class="status-badge status-${p.status}">${p.status}</span>
                            <span class="font-medium text-sm">${p.detail || '—'}</span>
                            ${p.customerId ? `<span class="text-xs font-mono bg-gray-100 px-1.5 py-0.5 rounded">${p.customerId}</span>` : ''}
                        </div>
                        ${p.customerName ? `<p class="text-xs text-gray-500 mt-0.5">👤 ${p.customerName} ${p.customerPhone ? '· 📱 ' + p.customerPhone : ''}</p>` : ''}
                        ${p.items ? `<p class="text-xs text-gray-500">🛒 ${p.items}</p>` : ''}
                        <p class="text-xs text-gray-400 mt-0.5">${new Date(p.reportDate).toLocaleDateString()} · ${p.riderName}</p>
                    </div>
                    <div class="text-right ml-3 flex-shrink-0">
                        <p class="font-bold text-lg ${p.status === 'pending' ? 'text-orange-700' : 'text-green-700'}">Rs ${(p.amount||0).toLocaleString()}</p>
                        ${p.status === 'pending' ? `
                        <div class="flex gap-1 mt-1">
                            <button onclick="app._markPaymentReceived('${p.reportId}', '${p.detail || ''}')" class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-semibold hover:bg-green-200">Receive</button>
                            <button onclick="app._sendWAReminder('${p.customerPhone || ''}', '${p.customerName || p.detail || ''}', ${p.amount||0}, '${p.reportDate}')" class="px-2 py-1 bg-green-500 text-white rounded text-xs font-semibold hover:bg-green-600" ${!p.customerPhone ? 'disabled title="No phone"' : ''}><i class="fab fa-whatsapp"></i></button>
                        </div>` : '<span class="text-xs text-green-600">✓ Received</span>'}
                    </div>
                </div>
            `).join('');
        },

        async _markPaymentReceived(reportId, detail) {
            try {
                const report = this.data.reports.find(r => r.id === reportId);
                if (!report) return;
                const payments = (report.onlinePayments || []).map(p => {
                    if (p.detail === detail || (!detail && p.status === 'pending')) {
                        return { ...p, status: 'received', receivedAt: new Date().toISOString() };
                    }
                    return p;
                });
                await window.db.collection('reports').doc(reportId).update({ onlinePayments: payments });
                this._renderPaymentsList();
            } catch (e) { alert('Error: ' + e.message); }
        },

        _sendWAReminder(phone, name, amount, date) {
            if (!phone) { alert('Customer ka phone number nahi hai!'); return; }
            const msg = this.data.waReminderTemplate
                .replace('{name}', name || 'Customer')
                .replace('{amount}', (amount || 0).toLocaleString())
                .replace('{date}', new Date(date).toLocaleDateString('en-PK'));
            const url = `https://wa.me/${phone.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        },

        _showBulkPaymentModal() {
            const cm = this.data.selectedMonth, cy = this.data.selectedYear;
            let pendingPayments = [];
            this.data.reports.filter(r => r.status === 'approved').forEach(r => {
                const d = new Date(r.date);
                if (d.getMonth() === cm && d.getFullYear() === cy) {
                    (r.onlinePayments || []).forEach((p, idx) => {
                        if (p.status === 'pending') {
                            pendingPayments.push({ ...p, riderName: r.riderName, reportId: r.id, paymentIdx: idx });
                        }
                    });
                }
            });

            if (pendingPayments.length === 0) { alert('Koi pending payment nahi!'); return; }

            this.showModal('Bulk Receive Payments', `
                <form onsubmit="app._bulkReceivePayments(event)" class="space-y-3">
                    <p class="text-sm text-gray-600">${pendingPayments.length} pending payments selected</p>
                    <div class="max-h-64 overflow-y-auto space-y-2">
                        ${pendingPayments.map((p, i) => `
                            <label class="flex items-center gap-3 p-2 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                                <input type="checkbox" name="bulk-pay" value="${p.reportId}__${p.paymentIdx}" checked class="rounded">
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-medium">${p.detail || '—'}</p>
                                    <p class="text-xs text-gray-500">${p.riderName} · Rs ${(p.amount||0).toLocaleString()}</p>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold">Mark Selected as Received</button>
                </form>`);
        },

        async _bulkReceivePayments(e) {
            e.preventDefault();
            const checked = [...document.querySelectorAll('input[name="bulk-pay"]:checked')].map(cb => cb.value.split('__'));
            if (checked.length === 0) { alert('Koi payment select nahi ki!'); return; }

            try {
                // Group by reportId
                const byReport = {};
                checked.forEach(([reportId, payIdx]) => {
                    if (!byReport[reportId]) byReport[reportId] = [];
                    byReport[reportId].push(parseInt(payIdx));
                });

                for (const [reportId, indices] of Object.entries(byReport)) {
                    const report = this.data.reports.find(r => r.id === reportId);
                    if (!report) continue;
                    const payments = (report.onlinePayments || []).map((p, idx) => {
                        if (indices.includes(idx)) {
                            return { ...p, status: 'received', receivedAt: new Date().toISOString() };
                        }
                        return p;
                    });
                    await window.db.collection('reports').doc(reportId).update({ onlinePayments: payments });
                }
                this.closeModal();
                this._renderPaymentsList();
            } catch (e) { alert('Error: ' + e.message); }
        },

        // ========== ADMIN EXPENSES (Rider Expenses) ==========
        renderAdminExpenses() {
            document.getElementById('page-title').textContent = 'Rider Expenses';
            const container = document.getElementById('main-container');
            const cm = this.data.selectedMonth, cy = this.data.selectedYear;
            const approvedReports = this.data.reports.filter(r => {
                const d = new Date(r.date);
                return r.status === 'approved' && d.getMonth() === cm && d.getFullYear() === cy;
            });

            let totalFuel = 0, totalFood = 0, totalMaint = 0;
            const riderExpenses = {};
            approvedReports.forEach(r => {
                const e = r.expenses || {};
                totalFuel += e.fuel || 0;
                totalFood += e.food || 0;
                totalMaint += e.maintenance || 0;
                if (!riderExpenses[r.riderId]) riderExpenses[r.riderId] = { name: r.riderName, fuel: 0, food: 0, maintenance: 0, count: 0 };
                riderExpenses[r.riderId].fuel += e.fuel || 0;
                riderExpenses[r.riderId].food += e.food || 0;
                riderExpenses[r.riderId].maintenance += e.maintenance || 0;
                riderExpenses[r.riderId].count++;
            });

            const grandTotal = totalFuel + totalFood + totalMaint;

            container.innerHTML = `
                <div class="fade-in pb-20 max-w-6xl mx-auto space-y-4">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="stat-card text-center border-l-4 border-red-400"><p class="text-xs text-red-600">Fuel</p><p class="text-xl font-bold text-red-700">Rs ${totalFuel.toLocaleString()}</p></div>
                        <div class="stat-card text-center border-l-4 border-yellow-400"><p class="text-xs text-yellow-600">Food</p><p class="text-xl font-bold text-yellow-700">Rs ${totalFood.toLocaleString()}</p></div>
                        <div class="stat-card text-center border-l-4 border-blue-400"><p class="text-xs text-blue-600">Maintenance</p><p class="text-xl font-bold text-blue-700">Rs ${totalMaint.toLocaleString()}</p></div>
                        <div class="stat-card text-center border-l-4 border-purple-400"><p class="text-xs text-purple-600">Total</p><p class="text-xl font-bold text-purple-700">Rs ${grandTotal.toLocaleString()}</p></div>
                    </div>
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Expense Distribution</h3>
                        <canvas id="expense-chart" height="200"></canvas>
                    </div>
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Per Rider Breakdown</h3>
                        <div class="space-y-2">${Object.values(riderExpenses).map(re => {
                            const rt = re.fuel + re.food + re.maintenance;
                            return `<div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                <div><p class="font-medium text-sm">${re.name}</p><p class="text-xs text-gray-500">${re.count} reports</p></div>
                                <div class="text-right"><p class="font-bold">Rs ${rt.toLocaleString()}</p><p class="text-xs text-gray-400">F:${re.fuel} Fd:${re.food} M:${re.maintenance}</p></div>
                            </div>`;
                        }).join('')}</div>
                    </div>
                </div>`;

            this.createChart('expense-chart', {
                type: 'doughnut',
                data: {
                    labels: ['Fuel', 'Food', 'Maintenance'],
                    datasets: [{ data: [totalFuel, totalFood, totalMaint], backgroundColor: ['#ef4444', '#eab308', '#3b82f6'], borderWidth: 0 }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        },

        // ========== COMPANY EXPENSES ==========
        renderCompanyExpenses() {
            document.getElementById('page-title').textContent = 'Company Expenses';
            const container = document.getElementById('main-container');

        _filterCustomers() {
            const search = document.getElementById('cust-search')?.value.toLowerCase() || '';
            const list = document.getElementById('customers-list');
            const pagination = document.getElementById('customers-pagination');
            if (!list) return;

            let customers = this.data.customers.filter(c => {
                return !search ||
                    (c.name || '').toLowerCase().includes(search) ||
                    (c.customerId || '').toLowerCase().includes(search) ||
                    (c.phone || '').includes(search) ||
                    (c.address || '').toLowerCase().includes(search);
            }).sort((a, b) => (a.name || '').localeCompare(b.name || ''));

            const totalPages = Math.ceil(customers.length / this.data.custPerPage) || 1;
            if (this.data.custPage > totalPages) this.data.custPage = totalPages;
            const start = (this.data.custPage - 1) * this.data.custPerPage;
            const pageItems = customers.slice(start, start + this.data.custPerPage);

            if (pageItems.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-8">No customers found</p>';
                if (pagination) pagination.innerHTML = '';
                return;
            }

            // Check for duplicate phone numbers
            const phoneCounts = {};
            customers.forEach(c => {
                const phone = (c.phone || '').replace(/\D/g, '').slice(-10);
                if (phone.length >= 10) {
                    phoneCounts[phone] = (phoneCounts[phone] || 0) + 1;
                }
            });

            list.innerHTML = pageItems.map(c => {
                const phone = (c.phone || '').replace(/\D/g, '').slice(-10);
                const isDuplicate = phone.length >= 10 && phoneCounts[phone] > 1;
                return `<div class="section-card ${isDuplicate ? 'duplicate-card' : ''} flex justify-between items-center">
                    <div class="flex items-center gap-3 min-w-0 flex-1">
                        <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 flex-shrink-0">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2">
                                <p class="font-medium text-sm truncate">${c.name || '—'}</p>
                                ${isDuplicate ? '<span class="text-xs text-amber-600 font-bold" title="Duplicate phone">⚠ DUP</span>' : ''}
                            </div>
                            <p class="text-xs font-mono text-indigo-600">${c.customerId || '—'}</p>
                            ${c.phone ? `<p class="text-xs text-gray-500">📱 ${c.phone}</p>` : ''}
                            ${c.address ? `<p class="text-xs text-gray-400 truncate">📍 ${c.address}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex gap-1 flex-shrink-0 ml-2">
                        <button onclick="app._showEditCustomerModal('${c.id}')" class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center hover:bg-indigo-100"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="app._deleteCustomer('${c.id}')" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-100"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                </div>`;
            }).join('');

            // Pagination
            if (pagination) {
                let pagesHtml = '';
                for (let i = 1; i <= totalPages; i++) {
                    pagesHtml += `<button onclick="app.data.custPage=${i};app._filterCustomers()" class="w-8 h-8 rounded-lg text-sm font-semibold ${i === this.data.custPage ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">${i}</button>`;
                }
                pagination.innerHTML = pagesHtml;
            }
        },

                    <input type="text" id="cust-name" placeholder="Customer Name *" class="w-full border border-gray-300 rounded-lg px-3 py-2" required>

        _exportCustomersCSV() {
            const headers = ['Customer ID', 'Name', 'Phone', 'Address'];
            const rows = this.data.customers.map(c => [c.customerId || '', c.name || '', c.phone || '', c.address || ''].map(f => `"${f.replace(/"/g, '""')}"`));
            const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `customers_${new Date().toISOString().split('T')[0]}.csv`; a.click();
            URL.revokeObjectURL(url);
        },


        // ========== ADMIN ATTENDANCE ==========
        renderAdminAttendance() {
            document.getElementById('page-title').textContent = 'Attendance';

                        <div class="stat-card text-center border-l-4 border-blue-400"><p class="text-xs text-blue-600">Relief</p><p class="text-xl font-bold text-blue-700">${totalRelief}</p></div>

                        </div>
                        <div id="attendance-day-view"></div>
                    </div>

                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Monthly Overview</h3>
                        <div class="space-y-3">${this.data.users.map(rider => {
                            const riderAtt = this.data.attendance.filter(a => {
                                const d = new Date(a.date);
                                return a.riderId === rider.id && d.getMonth() === cm && d.getFullYear() === cy;
                            });
                            const rp = riderAtt.filter(a => a.status === 'present').length;
                            const ra = riderAtt.filter(a => a.status === 'absent').length;
                            const rr = riderAtt.filter(a => a.status === 'relief').length;
                            return `<div class="border border-gray-200 rounded-xl p-3">
                                <div class="flex justify-between items-center mb-2">
                                    <p class="font-medium text-sm">${rider.name} <span class="text-xs text-gray-400">${rider.zone || ''}</span></p>
                                    <div class="flex gap-2 text-xs">
                                        <span class="text-green-600 font-semibold">P:${rp}</span>
                                        <span class="text-red-600 font-semibold">A:${ra}</span>
                                        <span class="text-blue-600 font-semibold">R:${rr}</span>
                                    </div>
                                </div>
                                <div class="attendance-calendar">
                                    ${Array.from({length: daysInMonth}, (_, i) => {
                                        const day = i + 1;

        _renderAttendanceForDate() {
            const date = document.getElementById('att-date-picker')?.value;

            const dayAtt = this.data.attendance.filter(a => a.date === date);

            container.innerHTML = `
                <div class="space-y-2">

                                <button onclick="app._setAttendance('${rider.id}','${date}','absent')" class="px-3 py-1 rounded text-xs font-semibold ${status === 'absent' ? 'bg-red-600 text-white' : 'bg-red-100 text-red-700 hover:bg-red-200'}">Absent</button>

                </div>`;
        },

        async _setAttendance(riderId, date, status) {
            try {
                const existing = this.data.attendance.find(a => a.riderId === riderId && a.date === date);
                if (existing) {
                    await window.db.collection('attendance').doc(existing.id).update({ status });
                } else {
                    await window.db.collection('attendance').add({ riderId, date, status, markedAt: new Date().toISOString() });
                }
                this._renderAttendanceForDate();
            } catch (e) { alert('Error: ' + e.message); }
        },

        async _markAttendance(riderId, date, currentStatus) {
            const statuses = ['', 'present', 'absent', 'relief'];
            const idx = statuses.indexOf(currentStatus);
            const nextStatus = statuses[(idx + 1) % statuses.length];
            if (nextStatus === '') {
                // Delete attendance
                const existing = this.data.attendance.find(a => a.riderId === riderId && a.date === date);
                if (existing) await window.db.collection('attendance').doc(existing.id).delete();
            } else {
                await this._setAttendance(riderId, date, nextStatus);
            }
        },

        // ========== ADMIN ANALYTICS ==========
        renderAdminAnalytics() {
            document.getElementById('page-title').textContent = 'Analytics';
            const container = document.getElementById('main-container');
            const cm = this.data.selectedMonth, cy = this.data.selectedYear;
            const approvedReports = this.data.reports.filter(r => {
                const d = new Date(r.date);
                return r.status === 'approved' && d.getMonth() === cm && d.getFullYear() === cy;
            });

            // Revenue by rider
            const riderRevenue = {};
            approvedReports.forEach(r => {
                if (!riderRevenue[r.riderId]) riderRevenue[r.riderId] = { name: r.riderName, orders: 0, revenue: 0, online: 0, expenses: 0 };
                const orderTotal = (r.orders || []).reduce((a, o) => a + (o.gross || 0), 0);
                const onlineTotal = (r.onlinePayments || []).reduce((a, p) => a + p.amount, 0);
                const expTotal = (r.expenses?.fuel || 0) + (r.expenses?.food || 0) + (r.expenses?.maintenance || 0);
                const orderCount = (r.orders || []).reduce((a, o) => a + (o.qty || 0), 0);
                riderRevenue[r.riderId].orders += orderCount;
                riderRevenue[r.riderId].revenue += orderTotal;
                riderRevenue[r.riderId].online += onlineTotal;
                riderRevenue[r.riderId].expenses += expTotal;
            });

            const riderLabels = Object.values(riderRevenue).map(r => r.name);
            const riderData = Object.values(riderRevenue).map(r => r.revenue);

            // Daily revenue chart
            const daysInMonth = new Date(cy, cm + 1, 0).getDate();
            const dailyRevenue = Array(daysInMonth).fill(0);
            const dailyOrders = Array(daysInMonth).fill(0);
            approvedReports.forEach(r => {
                const d = new Date(r.date).getDate() - 1;
                if (d >= 0 && d < daysInMonth) {
                    dailyRevenue[d] += (r.orders || []).reduce((a, o) => a + (o.gross || 0), 0);
                    dailyOrders[d] += (r.orders || []).reduce((a, o) => a + (o.qty || 0), 0);
                }
            });

            container.innerHTML = `
                <div class="fade-in pb-20 max-w-6xl mx-auto space-y-4">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="stat-card text-center"><p class="text-xs text-gray-500">Total Revenue</p><p class="text-xl font-bold text-indigo-600">Rs ${Object.values(riderRevenue).reduce((a,r)=>a+r.revenue,0).toLocaleString()}</p></div>
                        <div class="stat-card text-center"><p class="text-xs text-gray-500">Total Orders</p><p class="text-xl font-bold text-blue-600">${Object.values(riderRevenue).reduce((a,r)=>a+r.orders,0).toLocaleString()}</p></div>
                        <div class="stat-card text-center"><p class="text-xs text-gray-500">Online Collected</p><p class="text-xl font-bold text-green-600">Rs ${Object.values(riderRevenue).reduce((a,r)=>a+r.online,0).toLocaleString()}</p></div>
                        <div class="stat-card text-center"><p class="text-xs text-gray-500">Total Expenses</p><p class="text-xl font-bold text-red-600">Rs ${Object.values(riderRevenue).reduce((a,r)=>a+r.expenses,0).toLocaleString()}</p></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="section-card"><h3 class="font-bold text-gray-800 mb-3">Daily Revenue</h3><canvas id="analytics-revenue-chart" height="200"></canvas></div>
                        <div class="section-card"><h3 class="font-bold text-gray-800 mb-3">Revenue by Rider</h3><canvas id="analytics-rider-chart" height="200"></canvas></div>
                    </div>
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Rider Performance</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead><tr class="border-b border-gray-200"><th class="text-left py-2 px-3">Rider</th><th class="text-right py-2 px-3">Orders</th><th class="text-right py-2 px-3">Revenue</th><th class="text-right py-2 px-3">Online</th><th class="text-right py-2 px-3">Expenses</th><th class="text-right py-2 px-3">Net</th></tr></thead>
                                <tbody>${Object.values(riderRevenue).map(r => {
                                    const net = r.revenue - r.online - r.expenses;
                                    return `<tr class="border-b border-gray-100 hover:bg-gray-50">
                                        <td class="py-2 px-3 font-medium">${r.name}</td>
                                        <td class="text-right py-2 px-3">${r.orders}</td>
                                        <td class="text-right py-2 px-3">Rs ${r.revenue.toLocaleString()}</td>
                                        <td class="text-right py-2 px-3 text-green-600">Rs ${r.online.toLocaleString()}</td>
                                        <td class="text-right py-2 px-3 text-red-600">Rs ${r.expenses.toLocaleString()}</td>
                                        <td class="text-right py-2 px-3 font-bold ${net >= 0 ? 'text-indigo-600' : 'text-red-600'}">Rs ${net.toLocaleString()}</td>
                                    </tr>`;
                                }).join('')}</tbody>
                            </table>
                        </div>
                    </div>
                </div>`;

            this.createChart('analytics-revenue-chart', {
                type: 'line',
                data: {
                    labels: Array.from({length: daysInMonth}, (_, i) => i + 1),
                    datasets: [
                        { label: 'Revenue', data: dailyRevenue, borderColor: '#4f46e5', backgroundColor: 'rgba(79,70,229,0.1)', fill: true, tension: 0.3 },
                        { label: 'Orders', data: dailyOrders, borderColor: '#3b82f6', backgroundColor: 'transparent', borderDash: [5,5], tension: 0.3, yAxisID: 'y1' }
                    ]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true }, y1: { position: 'right', beginAtZero: true, grid: { display: false } } } }
            });

            this.createChart('analytics-rider-chart', {
                type: 'bar',
                data: {
                    labels: riderLabels,
                    datasets: [{ label: 'Revenue', data: riderData, backgroundColor: 'rgba(79,70,229,0.7)', borderRadius: 4 }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        },

        // ========== WHATSAPP TEMPLATES ==========
        renderWASettings() {
            document.getElementById('page-title').textContent = 'WhatsApp Templates';
            const container = document.getElementById('main-container');
            container.innerHTML = `
                <div class="fade-in pb-20 max-w-4xl mx-auto space-y-4">
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-2"><i class="fab fa-whatsapp text-green-500 mr-2"></i>Payment Reminder Template</h3>
                        <p class="text-xs text-gray-500 mb-3">Variables: {name}, {amount}, {date}</p>
                        <textarea id="wa-reminder-template" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono" rows="8">${this.data.waReminderTemplate}</textarea>
                        <button onclick="app._saveWAReminder()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700">Save Template</button>
                    </div>
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-2"><i class="fab fa-whatsapp text-green-500 mr-2"></i>Payment Received Template</h3>
                        <p class="text-xs text-gray-500 mb-3">Variables: {name}, {amount}, {date}</p>
                        <textarea id="wa-received-template" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono" rows="8">${this.data.waReceivedTemplate}</textarea>
                        <button onclick="app._saveWAReceived()" class="mt-2 bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700">Save Template</button>
                    </div>
                    <div class="section-card bg-green-50 border border-green-200">
                        <h4 class="font-semibold text-green-800 mb-2">Preview</h4>
                        <div class="bg-white p-3 rounded-lg border border-green-100 text-sm whitespace-pre-wrap font-mono text-gray-700">${this.data.waReminderTemplate.replace('{name}', 'Ahmed').replace('{amount}', '2,500').replace('{date}', '24 Jun 2026')}</div>
                    </div>
                </div>`;
        },

        _saveWAReminder() {
            const val = document.getElementById('wa-reminder-template').value;
            this.data.waReminderTemplate = val;
            localStorage.setItem('dastak_wa_reminder', val);
            alert('Reminder template saved!');
            this.renderWASettings();
        },

        _saveWAReceived() {
            const val = document.getElementById('wa-received-template').value;
            this.data.waReceivedTemplate = val;
            localStorage.setItem('dastak_wa_received', val);
            alert('Received template saved!');
            this.renderWASettings();
        },

        // ========== SETTINGS ==========
        renderSettings() {
            document.getElementById('page-title').textContent = 'Settings';
            const container = document.getElementById('main-container');
            const isAdmin = this.data.currentUser?.role === 'admin';
            const user = this.data.currentUser;

            container.innerHTML = `
                <div class="fade-in pb-20 max-w-4xl mx-auto space-y-4">
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Profile</h3>
                        <form onsubmit="app._updateProfile(event)" class="space-y-3">
                            <div><label class="text-xs text-gray-500">Name</label><input type="text" id="set-name" value="${user?.name || ''}" class="w-full border border-gray-300 rounded-lg px-3 py-2"></div>
                            <div><label class="text-xs text-gray-500">Phone</label><input type="tel" id="set-phone" value="${user?.phone || ''}" class="w-full border border-gray-300 rounded-lg px-3 py-2"></div>
                            <div><label class="text-xs text-gray-500">Zone</label><input type="text" id="set-zone" value="${user?.zone || ''}" class="w-full border border-gray-300 rounded-lg px-3 py-2" ${isAdmin ? '' : ''}></div>
                            <div><label class="text-xs text-gray-500">Vehicle</label><input type="text" id="set-vehicle" value="${user?.vehicle || ''}" class="w-full border border-gray-300 rounded-lg px-3 py-2"></div>
                            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">Update Profile</button>
                        </form>
                    </div>
                    ${!isAdmin ? `
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Salary Settings</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="p-3 bg-gray-50 rounded-lg"><p class="text-xs text-gray-500">Base Salary</p><p class="font-bold">Rs ${(user?.salaryBase || 15000).toLocaleString()}</p></div>
                            <div class="p-3 bg-gray-50 rounded-lg"><p class="text-xs text-gray-500">Daily Wage</p><p class="font-bold">Rs ${(user?.dailyWage || 500).toLocaleString()}</p></div>
                        </div>
                        <p class="text-xs text-gray-400 mt-2">Contact admin to change salary settings.</p>
                    </div>` : ''}
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Security</h3>
                        <form onsubmit="app._changePassword(event)" class="space-y-3">
                            <input type="password" id="set-current-pass" placeholder="Current Password" class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                            <input type="password" id="set-new-pass" placeholder="New Password (min 6 chars)" class="w-full border border-gray-300 rounded-lg px-3 py-2" minlength="6" required>
                            <button type="submit" class="bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-orange-700">Change Password</button>
                        </form>
                    </div>
                    <div class="section-card">
                        <h3 class="font-bold text-gray-800 mb-3">Danger Zone</h3>
                        <button onclick="if(confirm('Delete your account?'))app._deleteAccount()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-red-700">Delete Account</button>
                    </div>
                </div>`;
        },

        async _updateProfile(e) {
            e.preventDefault();
            try {
                const uid = this.data.currentUser.id;
                await window.db.collection('users').doc(uid).update({
                    name: document.getElementById('set-name').value,
                    phone: document.getElementById('set-phone').value,
                    zone: document.getElementById('set-zone').value,
                    vehicle: document.getElementById('set-vehicle').value
                });
                alert('Profile updated!');
            } catch (error) { alert('Error: ' + error.message); }
        },

        async _changePassword(e) {
            e.preventDefault();
            try {
                const user = window.auth.currentUser;
                const credential = firebase.auth.EmailAuthProvider.credential(user.email, document.getElementById('set-current-pass').value);
                await user.reauthenticateWithCredential(credential);
                await user.updatePassword(document.getElementById('set-new-pass').value);
                alert('Password changed!');
                document.getElementById('set-current-pass').value = '';
                document.getElementById('set-new-pass').value = '';
            } catch (error) { alert('Error: ' + error.message); }
        },

        async _deleteAccount() {
            try {
                const uid = this.data.currentUser.id;
                await window.db.collection('users').doc(uid).delete();
                await window.auth.currentUser.delete();
                this.logout();
            } catch (error) { alert('Error: ' + error.message); }
        },

        // ========== MODAL HELPERS ==========
        showModal(title, content) {
            const overlay = document.getElementById('modal-overlay');
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="flex justify-between items-center p-4 border-b border-gray-100 sticky top-0 bg-white rounded-t-2xl z-10">
                    <h3 class="font-bold text-lg text-gray-800">${title}</h3>
                    <button onclick="app.closeModal()" class="w-8 h-8 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center hover:bg-gray-200"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-4">${content}</div>`;
            overlay.classList.remove('hidden');
            requestAnimationFrame(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            });
        },

        closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modalContent = document.getElementById('modal-content');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                modalContent.innerHTML = '';
            }, 200);
        },

        // ========== SHIFT MANAGEMENT ==========
        toggleShift() {
            const btn = document.getElementById('shift-btn');
            if (!btn) return;
            if (this.data.currentShift) {
                // End shift
                const start = this.data.currentShift.start;
                const end = new Date();
                const hours = ((end - start) / (1000 * 60 * 60)).toFixed(1);
                this.data.currentShift = null;
                btn.className = 'px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition-colors whitespace-nowrap';
                btn.innerHTML = '<i class="fas fa-play mr-1"></i><span class="hidden sm:inline">Start Shift</span><span class="sm:hidden">Shift</span>';
                alert(`Shift ended! Duration: ${hours} hours`);
            } else {
                // Start shift
                this.data.currentShift = { start: new Date() };
                btn.className = 'px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-red-100 text-red-700 hover:bg-red-200 transition-colors whitespace-nowrap';
                btn.innerHTML = '<i class="fas fa-stop mr-1"></i><span class="hidden sm:inline">End Shift</span><span class="sm:hidden">Shift</span>';
                alert('Shift started!');
            }
        },

        // ========== NOTIFICATIONS ==========
        showNotifications() {
            const announcements = [...this.data.announcements].sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
            this.showModal('Notifications', `
                <div class="space-y-3">
                    ${announcements.length === 0 ? '<p class="text-center text-gray-400 py-4">No notifications</p>' : announcements.map(a => `
                        <div class="border-l-4 ${a.priority==='high'?'border-red-500 bg-red-50':'border-indigo-500 bg-indigo-50'} pl-3 py-3 rounded-r-lg">
                            <div class="flex justify-between items-start">
                                <h4 class="font-semibold text-sm ${a.priority==='high'?'text-red-800':'text-indigo-800'}">${a.title}</h4>
                                ${a.date ? `<span class="text-xs text-gray-400">${new Date(a.date).toLocaleDateString()}</span>` : ''}
                            </div>
                            <p class="text-xs text-gray-600 mt-1">${a.content}</p>
                        </div>
                    `).join('')}
                    ${this.data.currentUser?.role === 'admin' ? `
                    <hr class="my-3">
                    <form onsubmit="app._addAnnouncement(event)" class="space-y-2">
                        <input type="text" id="notif-title" placeholder="Title" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" required>
                        <textarea id="notif-content" placeholder="Content" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" rows="2" required></textarea>
                        <select id="notif-priority" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                            <option value="normal">Normal</option>
                            <option value="high">High Priority</option>
                        </select>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold">Post Announcement</button>
                    </form>` : ''}
                </div>`);
            // Clear notification dot
            const dot = document.getElementById('notif-dot');
            if (dot) dot.classList.add('hidden');
        },

        async _addAnnouncement(e) {
            e.preventDefault();
            try {
                await window.db.collection('notifications').add({
                    title: document.getElementById('notif-title').value,
                    content: document.getElementById('notif-content').value,
                    priority: document.getElementById('notif-priority').value,
                    date: new Date().toISOString().split('T')[0],
                    createdAt: new Date().toISOString()
                });
                this.closeModal();
            } catch (error) { alert('Error: ' + error.message); }
        },

        // ========== PULL TO REFRESH ==========
        _setupPullToRefresh() {
            let startY = 0;
            const container = document.getElementById('main-container');
            const ptr = document.getElementById('pull-to-refresh');
            const icon = document.getElementById('ptr-icon');
            if (!container) return;

            container.addEventListener('touchstart', (e) => {
                if (container.scrollTop === 0) startY = e.touches[0].clientY;
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (startY === 0 || container.scrollTop > 0) return;
                const diff = e.touches[0].clientY - startY;
                if (diff > 0 && diff < 100) {
                    ptr.style.transform = `translateY(${diff - 50}px)`;
                    icon.style.transform = `rotate(${diff * 2}deg)`;
                }
            }, { passive: true });

            container.addEventListener('touchend', () => {
                if (parseFloat(ptr.style.transform?.replace('translateY(', '') || 0) > 20) {
                    ptr.style.transform = 'translateY(0px)';
                    icon.style.transform = 'rotate(180deg)';
                    setTimeout(() => {
                        this._refreshCurrentView();
                        ptr.style.transform = 'translateY(-50px)';
                        startY = 0;
                    }, 500);
                } else {
                    ptr.style.transform = 'translateY(-50px)';
                    startY = 0;
                }
            });
        }
    };

    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
        app.init();
        app._setupPullToRefresh();

        // Close modal on overlay click
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') app.closeModal();
        });
    });
    </script>
</body>
</html>
