        async importCustomersFile(input) {
            const file=input.files[0]; if (!file) return;
            const self=this;
            const doImport=async()=>{
                const reader=new FileReader();
                reader.onload=async(e)=>{
                    try {
                        const wb=XLSX.read(e.target.result,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{header:1});
                        const headers=rows[0]||[];
                        const colIdx=(names)=>{ for(const n of names){const i=headers.findIndex(h=>h&&h.toString().toLowerCase().includes(n.toLowerCase()));if(i>=0)return i;} return -1;};
                        const firstNameIdx=colIdx(['first name','name','contact']); const mobileIdx=colIdx(['mobile phone','mobile','phone','primary phone','cell']); const addressIdx=colIdx(['address','street','city']);
                        const cleanPhone=(p)=>{if(!p)return'';p=p.toString().replace(/[\s\-\(\)]/g,'');if(p.startsWith('+92'))p='0'+p.slice(3);else if(p.startsWith('92')&&p.length>10)p='0'+p.slice(2);return p;};
                        const cleanName=(raw)=>{if(!raw)return'';return raw.toString().trim().replace(/^[^a-zA-Z0-9\u0600-\u06FF]+/,'').trim();};
                        let added=0,skipped=0; const newCustomers=[]; const dataRows=rows.slice(1).filter(r=>r&&r.length>0);
                        for(let i=0;i<dataRows.length;i+=400){
                            const batch=window.db.batch(); const chunk=dataRows.slice(i,i+400);
                            chunk.forEach(row=>{const name=cleanName(firstNameIdx>=0?row[firstNameIdx]:row[0]);const phone=cleanPhone(mobileIdx>=0?row[mobileIdx]:row[1]);const address=addressIdx>=0?(row[addressIdx]||'').toString().trim():'';if(!name||!phone){skipped++;return;}const ref=window.db.collection('customers').doc();batch.set(ref,{name,phone,address,createdAt:firebase.firestore.FieldValue.serverTimestamp()});newCustomers.push({id:ref.id,name,phone,address});added++;});
                            await batch.commit();
                        }
                        self.data.customers=[...self.data.customers,...newCustomers]; self.data.custPage=1;
                        alert(`✅ ${added} imported!${skipped>0?`\n⚠️ ${skipped} skipped`:''}`); self._renderCustomersPage();
                    } catch(err){alert('Import error: '+err.message);}
                };
                reader.readAsArrayBuffer(file);
            };
            if(window.XLSX){doImport();}else{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=doImport;document.head.appendChild(s);}
        },

        changeAttMonth(val) {
            const [year, month] = val.split('-').map(Number);

        async ensureAttendanceForMonth(month, year) {
            const monthStart = new Date(year, month, 1).toISOString().split('T')[0];
            const monthEnd = new Date(year, month + 1, 0).toISOString().split('T')[0];
            const already = this.data.attendance.some(a => { const d = new Date(a.date); return d.getMonth()===month && d.getFullYear()===year; });
            if (already) return;
            try {
                const snap = await window.db.collection('attendance').where('date','>=',monthStart).where('date','<=',monthEnd).get();
                const existingIds = new Set(this.data.attendance.map(a => a.id));
                snap.docs.map(doc=>({id:doc.id,...doc.data()})).forEach(r=>{ if(!existingIds.has(r.id)) this.data.attendance.push(r); });
            } catch(e) { console.error('Attendance fetch error:', e); }
        },

        showAttendanceCalendar(riderId, month, year) {
            if (month === undefined) month = this.data.attMonth ?? new Date().getMonth();
            if (year === undefined) year = this.data.attYear ?? new Date().getFullYear();
            const rider = this.data.users.find(u => u.id === riderId); if (!rider) return;
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const mc = document.getElementById('modal-content'); const ov = document.getElementById('modal-overlay');
            let calHTML = '';
            for (let i=0;i<firstDay;i++) calHTML+=`<div class="calendar-day empty"></div>`;
            for (let day=1;day<=daysInMonth;day++) {
                const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const att=this.data.attendance.find(a=>a.riderId===riderId&&a.date===dateStr);
                let cls='',icon='';
                if(att){if(att.status==='present'){cls='present';icon='<i class="fas fa-check text-xs"></i>';}else if(att.status==='absent'){cls=att.isReliefDay?'relief':'absent';icon=att.isReliefDay?'<i class="fas fa-umbrella text-xs"></i>':'<i class="fas fa-times text-xs"></i>';}}
                calHTML+=`<div class="calendar-day ${cls||'bg-white'}" onclick="app.toggleAttendance('${riderId}','${dateStr}',${month},${year})"><span class="font-bold">${day}</span>${icon}</div>`;
            }
            mc.innerHTML=`<div class="p-5"><div class="flex justify-between items-center mb-4"><div><h2 class="text-xl font-bold text-gray-800">${rider.name}</h2><p class="text-sm text-gray-500">${monthNames[month]} ${year}</p></div><button onclick="app.closeModal()" class="text-gray-400 p-2"><i class="fas fa-times text-xl"></i></button></div>
                <div class="flex justify-center gap-4 mb-4 text-xs"><div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-green-200 border border-green-500"></div> Present</div><div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-200 border border-red-500"></div> Absent</div><div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-blue-200 border border-blue-500"></div> Relief</div></div>
                <div class="attendance-calendar mb-4">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="text-center text-xs font-bold text-gray-500 py-2">${d}</div>`).join('')}${calHTML}</div>
                <p class="text-xs text-gray-500 text-center">Click: Present → Absent → Remove</p></div>`;
            ov.classList.remove('hidden');
            setTimeout(() => { mc.classList.remove('scale-95','opacity-0'); mc.classList.add('scale-100','opacity-100'); }, 10);
        },

        async toggleAttendance(riderId, dateStr, month, year) {
            const existing = this.data.attendance.find(a=>a.riderId===riderId&&a.date===dateStr);
            const docId = `${riderId}_${dateStr}`;
            try {
                if (existing) {

                    else { await window.db.collection('attendance').doc(docId).delete(); this.data.attendance=this.data.attendance.filter(a=>!(a.riderId===riderId&&a.date===dateStr)); }
                } else {
                    await window.db.collection('attendance').doc(docId).set({riderId,date:dateStr,status:'present',isReliefDay:false,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
                    this.data.attendance.push({id:docId,riderId,date:dateStr,status:'present',isReliefDay:false});
                }
                this.showAttendanceCalendar(riderId, month, year);
            } catch (error) { alert('Error: '+error.message); }
        },

                await user.updatePassword(newP);
                alert('Password update ho gaya! ✅');
                document.getElementById('set-curr-pass').value=''; document.getElementById('set-new-pass').value=''; document.getElementById('set-conf-pass').value='';

        // NEW: Email change for both riders and admins — Firebase Auth + Firestore
        async changeEmail() {
            const pass = document.getElementById('set-email-pass').value;
            const newEmail = document.getElementById('set-new-email').value.trim();
            if (!pass || !newEmail) { alert('Sab fields bharo!'); return; }
            // Basic email validation
            if (!newEmail.includes('@') || !newEmail.includes('.')) { alert('Valid email address likho!'); return; }
            try {
                const user = window.auth.currentUser;
                // Re-authenticate
                const cred = firebase.auth.EmailAuthProvider.credential(user.email, pass);
                await user.reauthenticateWithCredential(cred);
                // Send verification to new email (safer than direct update)
                await user.verifyBeforeUpdateEmail(newEmail);
                // Also update in Firestore immediately (will be verified separately)
                await window.db.collection('users').doc(this.data.currentUser.id).update({ email: newEmail });
                // Update local data
                this.data.currentUser.email = newEmail;
                alert(`✅ Verification email bhej diya gaya!\n\nNaye email (${newEmail}) ko check karein aur verify karein.\n\nVerify karne ke baad Firebase Auth mein update hoga.`);
                document.getElementById('set-email-pass').value = ''; document.getElementById('set-new-email').value = '';
                this.renderSettings();
            } catch(e) {
                if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') alert('Password ghalat hai!');
                else if (e.code === 'auth/email-already-in-use') alert('Yeh email already use ho rahi hai!');
                else if (e.code === 'auth/invalid-email') alert('Invalid email format!');
                else alert('Error: ' + e.message);
            }
        },

        // ========== NOTIFICATIONS ==========
        showNotifications() {
            const isAdmin = this.data.currentUser?.role === 'admin';
            const mc = document.getElementById('modal-content'); const ov = document.getElementById('modal-overlay');
            mc.innerHTML = `<div class="p-5">
                <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold text-gray-800">🔔 Notifications</h2><button onclick="app.closeModal()" class="text-gray-400 p-2"><i class="fas fa-times text-xl"></i></button></div>
                ${isAdmin ? `<div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-4 space-y-3"><h3 class="font-bold text-indigo-800 text-sm">New Notification</h3>
                    <input type="text" id="notif-title" placeholder="Title" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                    <textarea id="notif-body" rows="3" placeholder="Message..." class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none resize-none"></textarea>
                    <div class="flex gap-2"><select id="notif-priority" class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none bg-white flex-1"><option value="normal">Normal</option><option value="high">High 🔴</option></select><button onclick="app.sendNotification()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">Send</button></div>
                </div>` : ''}
                <div class="space-y-3">${this.data.announcements.length===0?'<div class="text-center py-8 text-gray-400"><i class="fas fa-bell-slash text-4xl mb-2"></i><p>Koi notification nahi</p></div>':[...this.data.announcements].reverse().map(a=>`<div class="border-l-4 ${a.priority==='high'?'border-red-500 bg-red-50':'border-indigo-400 bg-indigo-50'} pl-3 py-2 rounded-r-xl"><div class="flex justify-between items-start"><h4 class="font-semibold text-sm ${a.priority==='high'?'text-red-800':'text-indigo-800'}">${a.title}</h4>${isAdmin?`<button onclick="app.deleteNotification('${a._docId||a.id}')" class="text-gray-400 hover:text-red-500 text-xs ml-2"><i class="fas fa-trash"></i></button>`:''}</div><p class="text-xs text-gray-600 mt-1">${a.content}</p></div>`).join('')}</div>
            </div>`;
            ov.classList.remove('hidden');
            setTimeout(() => { mc.classList.remove('scale-95','opacity-0'); mc.classList.add('scale-100','opacity-100'); }, 10);
            const dot = document.getElementById('notif-dot'); if (dot) dot.classList.add('hidden');
        },

        async sendNotification() {
            const title=document.getElementById('notif-title')?.value.trim(); const content=document.getElementById('notif-body')?.value.trim(); const priority=document.getElementById('notif-priority')?.value||'normal';
            if (!title||!content) { alert('Title aur message zaroori hai!'); return; }
            try { const docRef=await window.db.collection('notifications').add({title,content,priority,date:new Date().toISOString().split('T')[0],createdAt:firebase.firestore.FieldValue.serverTimestamp()}); this.data.announcements.unshift({title,content,priority,date:new Date().toISOString().split('T')[0],_docId:docRef.id}); alert('Sent! ✅'); this.closeModal(); }
            catch(e) { alert('Error: '+e.message); }
        },

        async deleteNotification(docId) {
            try { await window.db.collection('notifications').doc(docId).delete(); this.data.announcements=this.data.announcements.filter(a=>(a._docId||a.id)!==docId); this.showNotifications(); }
            catch(e) { alert('Error: '+e.message); }
        },

        // ========== MISC ==========
        exportMonthlyExcel() {
            const m = this.data.selectedMonth, y = this.data.selectedYear;
            const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
            const monthLabel = `${monthNames[m]}_${y}`;
            const approvedReports = this.getMonthFilteredReports('approved');
            const dailyRows=[['Date','Rider','Orders','Gross','Fuel','Food','Maint','Expenses','Wage','Profit','Opening','Online','Final','Status']];
            approvedReports.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(r=>{
                const tq=(r.orders||[]).reduce((a,o)=>a+(o.qty||0),0);
                const fuel=(r.expenses||[]).filter(e=>e.type==='Fuel').reduce((a,e)=>a+e.amount,0);
                const food=(r.expenses||[]).filter(e=>e.type==='Food').reduce((a,e)=>a+e.amount,0);
                const maint=(r.expenses||[]).filter(e=>e.type==='Maintenance').reduce((a,e)=>a+e.amount,0);
                const onlineTotal=(r.onlinePayments||[]).reduce((a,p)=>a+(p.amount||0),0);
                const profit=(r.totalGross||0)-(r.totalExpenses||0)-(r.dailyWage||0);
                dailyRows.push([r.date,r.riderName,tq,r.totalGross||0,fuel,food,maint,r.totalExpenses||0,r.dailyWage||0,profit,r.openingBalance||0,onlineTotal,r.finalAmount||0,r.status]);
            });
            const doExport=()=>{
                const wb=XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(dailyRows),'Daily Reports');
                XLSX.writeFile(wb,`Dastak_${monthLabel}.xlsx`);
            };
            if(window.XLSX){doExport();}else{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=doExport;document.head.appendChild(s);}
        },

        toggleShift() {
            const btn=document.getElementById('shift-btn');
            if (!this.data.currentShift) { this.data.currentShift={start:new Date(),isActive:true}; btn.innerHTML='<i class="fas fa-pause mr-1"></i><span class="hidden sm:inline">End Shift</span><span class="sm:hidden">End</span>'; btn.className="px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-red-100 text-red-700 hover:bg-red-200 transition-colors whitespace-nowrap"; alert("Shift Started!"); }
            else { this.data.currentShift=null; btn.innerHTML='<i class="fas fa-play mr-1"></i><span class="hidden sm:inline">Start Shift</span><span class="sm:hidden">Start</span>'; btn.className="px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition-colors whitespace-nowrap"; alert("Shift Ended!"); }
        },

        closeModal() {
            const mc=document.getElementById('modal-content'); const ov=document.getElementById('modal-overlay');
            mc.classList.remove('scale-100','opacity-100'); mc.classList.add('scale-95','opacity-0');
            setTimeout(() => { ov.classList.add('hidden'); }, 200);
        }
    };

    // Pull to refresh
    let ts=0, tm=0;
    const ptr=document.getElementById('pull-to-refresh'); const ptrIcon=document.getElementById('ptr-icon');
    const msc=document.getElementById('main-container'); const pt=80;
    if(msc&&ptr&&ptrIcon){
        msc.addEventListener('touchstart',(e)=>{ if(msc.scrollTop===0) ts=e.touches[0].clientY; else ts=0; });
        msc.addEventListener('touchmove',(e)=>{ if(ts===0)return; tm=e.touches[0].clientY; const dist=tm-ts; if(dist>0){e.preventDefault(); const pd=Math.min(dist*0.4,pt+20); ptr.style.transform=`translateY(${pd}px)`; if(pd>=pt){ptrIcon.style.transform='rotate(180deg)';ptrIcon.className='fas fa-check text-green-600 transition-transform duration-200';}else{ptrIcon.style.transform='rotate(0deg)';ptrIcon.className='fas fa-arrow-down text-blue-600 transition-transform duration-200';}}},{passive:false});
        msc.addEventListener('touchend',async()=>{if(ts===0||tm===0)return; const dist=tm-ts; const pd=dist*0.4; if(pd>=pt){ptrIcon.className='fas fa-spinner fa-spin text-blue-600'; ptr.style.transform=`translateY(${pt}px)`; try{if(app.data.currentUser){await app.setupRealtimeListeners();app._refreshCurrentView();}}catch(err){console.error(err);}} setTimeout(()=>{ptr.style.transform='translateY(-50px)'; setTimeout(()=>{ptrIcon.className='fas fa-arrow-down text-blue-600'; ptrIcon.style.transform='rotate(0deg)';},200);},600); ts=0;tm=0;});
    }

    document.addEventListener('DOMContentLoaded', () => { app.init(); });
    </script>
</body>
</html>
