<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Portal Pakistan | Firebase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex">

    <aside class="w-64 bg-white shadow-xl z-20 flex flex-col h-full hidden" id="sidebar">
        <div class="p-6 border-b border-gray-100 flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                <i class="fas fa-motorcycle"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg text-gray-800 leading-tight">Rider Portal</h1>
                <p class="text-xs text-gray-500">Pakistan Official</p>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-indigo-600 text-white shadow-md">
                <i class="fas fa-home w-5"></i> Dashboard
            </button>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <button onclick="location.reload()" class="w-full text-left p-2 text-red-500 font-medium">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header class="bg-white shadow-sm z-10 px-8 py-4 flex justify-between items-center hidden" id="main-header">
            <div>
                <h2 class="text-2xl font-bold text-gray-800" id="page-title">Dashboard</h2>
                <p class="text-sm text-gray-500" id="current-date"></p>
            </div>
            <button id="shift-btn" class="px-4 py-2 rounded-full text-sm font-medium bg-green-100 text-green-700">
                <i class="fas fa-play mr-2"></i> Online
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-50" id="main-container">
            <div class="flex items-center justify-center h-full">
                <p class="text-indigo-600 animate-pulse font-bold text-xl">Database se connect ho raha hai...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Aapka provide kiya gaya config
        const firebaseConfig = {
            apiKey: "AIzaSyAS-fawKIbl4wBgZyLxB22V4plpXLSS3e8",
            authDomain: "dastak-rider-portal-cbc87.firebaseapp.com",
            projectId: "dastak-rider-portal-cbc87",
            storageBucket: "dastak-rider-portal-cbc87.firebasestorage.app",
            messagingSenderId: "551878692013",
            appId: "1:551878692013:web:a94ec6393c025bfe7b0a24",
            measurementId: "G-H01MQ9LX0L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global Logic
        window.portal = {
            users: [],
            
            async init() {
                await this.loadUsers();
                this.showLogin();
                document.getElementById('current-date').textContent = new Date().toDateString();
            },

            async loadUsers() {
                try {
                    const querySnapshot = await getDocs(collection(db, "riders"));
                    this.users = [];
                    querySnapshot.forEach(doc => this.users.push(doc.data()));
                } catch (e) { console.error("Load Error", e); }
            },

            showLogin() {
                document.getElementById('main-container').innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in">
                        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                            <h2 class="text-2xl font-bold text-center mb-6">Dastak Rider Login</h2>
                            <form onsubmit="portal.handleLogin(event)" class="space-y-4">
                                <input type="email" id="l-email" placeholder="Email Address" class="w-full px-4 py-2 border rounded-lg" required>
                                <input type="password" id="l-pass" placeholder="Password" class="w-full px-4 py-2 border rounded-lg" required>
                                <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-bold">Login</button>
                            </form>
                            <p class="mt-4 text-center text-sm">Account nahi hai? <button onclick="portal.showSignup()" class="text-indigo-600 font-bold underline">Sign Up Karein</button></p>
                        </div>
                    </div>`;
            },

            showSignup() {
                document.getElementById('main-container').innerHTML = `
                    <div class="min-h-full flex items-center justify-center fade-in">
                        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
                            <h2 class="text-2xl font-bold text-center mb-6 text-green-600">Naya Rider Register Karein</h2>
                            <form onsubmit="portal.handleSignup(event)" class="space-y-4">
                                <input type="text" id="s-name" placeholder="Full Name" class="w-full px-4 py-2 border rounded-lg" required>
                                <input type="email" id="s-email" placeholder="Email Address" class="w-full px-4 py-2 border rounded-lg" required>
                                <input type="password" id="s-pass" placeholder="Password (Min 6 chars)" class="w-full px-4 py-2 border rounded-lg" minlength="6" required>
                                <input type="text" id="s-phone" placeholder="Phone Number" class="w-full px-4 py-2 border rounded-lg" required>
                                <button type="submit" id="reg-btn" class="w-full bg-green-600 text-white py-2.5 rounded-lg font-bold">Account Banayein</button>
                            </form>
                            <button onclick="portal.showLogin()" class="w-full mt-4 text-gray-500">Wapis Login par jayein</button>
                        </div>
                    </div>`;
            },

            async handleSignup(e) {
                e.preventDefault();
                const btn = document.getElementById('reg-btn');
                btn.innerText = "Saving..."; btn.disabled = true;

                const newUser = {
                    name: document.getElementById('s-name').value,
                    email: document.getElementById('s-email').value,
                    password: document.getElementById('s-pass').value,
                    phone: document.getElementById('s-phone').value,
                    createdAt: new Date().toISOString()
                };

                try {
                    await addDoc(collection(db, "riders"), newUser);
                    alert("Account permanent save ho gaya! Ab login karein.");
                    await this.loadUsers();
                    this.showLogin();
                } catch (err) { alert("Error: " + err.message); btn.innerText = "Retry"; btn.disabled = false; }
            },

            handleLogin(e) {
                e.preventDefault();
                const email = document.getElementById('l-email').value;
                const pass = document.getElementById('l-pass').value;
                const user = this.users.find(u => u.email === email && u.password === pass);

                if (user) {
                    document.getElementById('sidebar').classList.remove('hidden');
                    document.getElementById('main-header').classList.remove('hidden');
                    this.renderDashboard(user);
                } else {
                    alert("Ghalat Email ya Password! Pehle account banayein.");
                }
            },

            renderDashboard(user) {
                document.getElementById('page-title').textContent = "Khush Amdeed, " + user.name;
                document.getElementById('main-container').innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 fade-in">
                        <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-600">
                            <p class="text-gray-500 text-sm">Rider Status</p>
                            <h3 class="text-xl font-bold text-green-600">Active & Online</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-600">
                            <p class="text-gray-500 text-sm">Database ID</p>
                            <h3 class="text-xs font-mono text-gray-800">Permanent Saved in Firebase</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-600">
                            <p class="text-gray-500 text-sm">Email</p>
                            <h3 class="font-bold text-gray-800">${user.email}</h3>
                        </div>
                    </div>
                    <div class="mt-8 bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                        <h4 class="font-bold text-indigo-800 mb-2">System Update</h4>
                        <p class="text-indigo-600 text-sm">Ab aapka data Google Firebase par save hai. GitHub refresh karne se data nahi udega!</p>
                    </div>`;
            }
        };

        window.onload = () => portal.init();
    </script>
</body>
</html>
