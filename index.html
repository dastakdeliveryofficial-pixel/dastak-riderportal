<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dastak Portal | Dastak Delivery Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overscroll-behavior-y: contain; }
        .glass-panel { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar-link { transition: all 0.3s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79,70,229,0.3); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .status-badge { padding:0.25rem 0.75rem; border-radius:9999px; font-size:0.75rem; font-weight:600; }
        .status-pending { background:#fef3c7; color:#92400e; }
        .status-approved { background:#d1fae5; color:#065f46; }
        .status-rejected { background:#fee2e2; color:#991b1b; }
        .status-draft { background:#fef9c3; color:#854d0e; }
        .status-deleted { background:#f3f4f6; color:#6b7280; }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:#f1f1f1; }
        ::-webkit-scrollbar-thumb { background:#c7c7c7; border-radius:3px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            #sidebar { position:fixed; left:0; top:0; height:100vh; z-index:50; transform:translateX(-100%); }
            #sidebar.mobile-visible { transform:translateX(0); }
        }
        .stat-card { background:white; border-radius:16px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.04); }
        .quick-action-btn { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border-radius:12px; padding:16px; text-align:center; transition:transform 0.2s; }
        .quick-action-btn:active { transform:scale(0.98); }
        .section-card { background:white; border-radius:16px; padding:20px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        .attendance-calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
        .calendar-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; font-size:0.75rem; cursor:pointer; transition:all 0.2s; border:1px solid #e5e7eb; }
        .calendar-day:hover { transform:scale(1.05); }
        .calendar-day.present { background:#d1fae5; color:#065f46; border-color:#10b981; }
        .calendar-day.absent { background:#fee2e2; color:#991b1b; border-color:#ef4444; }
        .calendar-day.relief { background:#dbeafe; color:#1e40af; border-color:#3b82f6; }
        .calendar-day.empty { background:#f9fafb; border-color:#f3f4f6; cursor:default; }
        .calendar-day.empty:hover { transform:none; }
        #dynamic-style { display:none; }
        /* Partial payment modal */
        .partial-pay-modal { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex">
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBdKbba0NjNmW2LNxEILiIcjv3DU3LTnks",
            authDomain: "dastak-rider-portal-1b9d9.firebaseapp.com",
            projectId: "dastak-rider-portal-1b9d9",
            storageBucket: "dastak-rider-portal-1b9d9.firebasestorage.app",
            messagingSenderId: "714540074485",
            appId: "1:714540074485:web:cf393ebd7edbedae518cbc"
        };
        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();
    </script>

    <!-- Pull to Refresh -->
    <div id="pull-to-refresh" class="fixed top-0 left-0 right-0 flex items-center justify-center pointer-events-none transition-transform duration-200 ease-out z-50" style="transform:translateY(-50px);height:50px;">
        <div class="bg-white p-2 rounded-full shadow-md flex items-center justify-center border border-gray-200">
            <i id="ptr-icon" class="fas fa-arrow-down text-blue-600 transition-transform duration-200"></i>
        </div>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden" onclick="app.toggleSidebar()"></div>
    <aside class="w-64 bg-white shadow-xl z-50 flex flex-col h-full hidden" id="sidebar">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl"><i class="fas fa-motorcycle"></i></div>
                <div><h1 class="font-bold text-lg text-gray-800 leading-tight">Dastak Portal</h1><p class="text-xs text-gray-500">Dastak Delivery Service</p></div>
            </div>
            <button onclick="app.toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-700 p-2"><i class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 overflow-y-auto p-3 space-y-1" id="nav-menu"></nav>
        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-gray-50">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=Rider&background=4f46e5&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate" id="user-name">Loading...</p>
                    <p class="text-xs text-gray-500 truncate" id="user-role">Rider</p>
                </div>
                <button onclick="app.logout()" title="Logout" class="flex items-center justify-center w-9 h-9 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-700 transition-colors flex-shrink-0">
                    <i class="fas fa-sign-out-alt text-base"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden w-full">
        <header class="bg-white shadow-sm z-30 px-4 py-3 flex justify-between items-center hidden" id="main-header">
            <div class="flex items-center gap-3">
                <button onclick="app.toggleSidebar()" class="md:hidden p-2 text-gray-600 hover:text-indigo-600 transition-colors"><i class="fas fa-bars text-xl"></i></button>
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800" id="page-title">Dashboard</h2>
                    <p class="text-xs text-gray-500 hidden sm:block" id="current-date">Loading date...</p>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-3">
                <div id="month-picker-wrap" class="hidden">
                    <select id="global-month-picker" onchange="app.onMonthChange()" class="border border-indigo-200 bg-indigo-50 text-indigo-700 rounded-lg px-2 py-1.5 text-xs font-semibold outline-none cursor-pointer"></select>
                </div>
                <button id="notif-btn" onclick="app.showNotifications()" class="p-2 text-gray-400 hover:text-indigo-600 transition-colors relative">
                    <i class="fas fa-bell text-lg md:text-xl"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white hidden" id="notif-dot"></span>
                </button>
                <button onclick="app.toggleShift()" id="shift-btn" class="px-3 py-2 rounded-full text-xs md:text-sm font-medium bg-green-100 text-green-700 hover:bg-green-200 transition-colors whitespace-nowrap">
                    <i class="fas fa-play mr-1"></i><span class="hidden sm:inline">Start Shift</span><span class="sm:hidden">Shift</span>
                </button>
                <button onclick="app.logout()" title="Logout" class="flex items-center justify-center w-9 h-9 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 transition-colors flex-shrink-0 md:hidden" id="mobile-logout-btn">
                    <i class="fas fa-sign-out-alt text-base"></i>
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-4 bg-gray-50 relative" id="main-container">
            <div id="app-loading" class="flex flex-col items-center justify-center h-full min-h-64 gap-4">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 animate-pulse"><i class="fas fa-motorcycle text-white text-2xl"></i></div>
                <div class="text-center"><p class="font-bold text-gray-700 text-lg">Dastak Portal</p><p class="text-sm text-gray-400 mt-1" id="loading-msg">Loading data...</p></div>
                <div class="flex gap-1.5">
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay:0s"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay:0.15s"></div>
                    <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay:0.3s"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all scale-95 opacity-0" id="modal-content"></div>
    </div>

    <style id="dynamic-style"></style>

    <script>
    const app = {
        data: {
            currentUser: null, users: [], reports: [], attendance: [], customers: [], companyExpenses: [],
            announcements: [{ id:1, title:'Eid Bonus Policy', content:'50+ orders this week get Rs 2000 bonus.', date:'2023-10-25', priority:'high' }],
            currentShift: null, sidebarOpen: false, chartRegistry: {},
            selectedMonth: new Date().getMonth(), selectedYear: new Date().getFullYear(),
            custPage: 1, custPerPage: 50,
            paymentDateFilter: new Date().toISOString().split('T')[0],
            paymentMonthFilter: null,
            riderPaymentFilter: 'all',
            customersLoaded: false, companyExpensesLoaded: false,
            _unsubReports: null, _unsubAtt: null, _unsubRiders: null,
            _refreshTimer: null, _listenersSetup: false, _currentViewId: null,
            _editReportId: null, _isSubmitting: false,
            attMonth: null, attYear: null,
            // WhatsApp template (editable by admin)
            waReminderTemplate: 'Assalam o Alaikum {name},\n\nآپ کی payment pending ہے۔\n\n💰 *Amount: Rs {amount}*\n📅 Date: {date}\n\nبراہ کرم payment کریں۔\nشکریہ — Dastak 🙏',
            waReceivedTemplate: 'Assalam o Alaikum *{name}*! 🙏\n\nآپ کی payment موصول ہو گئی۔ شکریہ!\n\n✅ *Rs {amount} Received*\n📅 Date: {date}\n\nDastak پر order کا شکریہ 🚀\n— Dastak Delivery Service',
        },

        init() {
            this.updateDate();
            // Load saved WA templates
            const savedReminder = localStorage.getItem('dastak_wa_reminder');
            const savedReceived = localStorage.getItem('dastak_wa_received');
            if (savedReminder) this.data.waReminderTemplate = savedReminder;
            if (savedReceived) this.data.waReceivedTemplate = savedReceived;

            window.auth.onAuthStateChanged((user) => {
                if (user) this.loadUserData(user.uid);
                else this.showLogin();
            });
            window.addEventListener('resize', () => {
                if (window.innerWidth >= 768) {
                    document.getElementById('sidebar').classList.remove('mobile-visible');
                    document.getElementById('sidebar-overlay').classList.add('hidden');
                    this.data.sidebarOpen = false;
                }
            });
            window.addEventListener('popstate', (e) => {
                if (!this.data.currentUser) return;
                const viewId = e.state?.viewId || location.hash.slice(1) || null;
                if (viewId) this._renderView(viewId);
            });
        },

        async loadUserData(uid) {
            try {
                const userDoc = await window.db.collection('users').doc(uid).get();
                if (userDoc.exists) {
                    this.data.currentUser = { id: uid, ...userDoc.data() };
                } else {
                    const user = window.auth.currentUser;
                    const isAdmin = user.email === "admin@portal.com";
                    const newUserData = {
                        email: user.email, name: isAdmin ? "Administrator" : "New User",
                        phone: "", zone: isAdmin ? "Head Office" : "Unassigned",
                        vehicle: isAdmin ? "Admin" : "", role: isAdmin ? "admin" : "rider",
                        joinDate: new Date().toISOString().split('T')[0],
                        salaryBase: isAdmin ? 50000 : 15000, dailyWage: isAdmin ? 1000 : 500,
                        disabled: false
                    };
                    await window.db.collection('users').doc(uid).set(newUserData);
                    this.data.currentUser = { id: uid, ...newUserData };
                }
                // Check if rider is disabled
                if (this.data.currentUser.disabled && this.data.currentUser.role !== 'admin') {
                    alert('آپ کا account disable ہے۔ Admin سے رابطہ کریں۔');
                    this.logout();
                    return;
                }
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-header').classList.remove('hidden');
                this.renderSidebar();
                this.initMonthPicker();
                const initView = this.data.currentUser.role === 'admin' ? 'admin-dashboard' : 'rider-dashboard';
                history.replaceState({ viewId: initView }, '', '#' + initView);
                await this.setupRealtimeListeners();
                this._renderView(initView);
            } catch (error) {
                console.error('Error loading user data:', error);
                alert('Error loading user data: ' + error.message);
                this.logout();
            }
        },

        async setupRealtimeListeners() {
            if (this.data._listenersSetup) return;
            this.data._listenersSetup = true;
            const self = this;
            const setMsg = (msg) => { const el = document.getElementById('loading-msg'); if (el) el.textContent = msg; };
            try {
                setMsg('Connecting...');
                const now = new Date();
                const twoMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString().split('T')[0];
                const monthStart = new Date(now.getFullYear(), now.getMonth() - 1, 0).toISOString().split('T')[0];

                setMsg('Loading users...');
                const ridersSnap = await window.db.collection('users').where('role', '==', 'rider').get();
                self.data.users = ridersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                setMsg('Loading reports...');
                const reportsSnap = await window.db.collection('reports').where('date', '>=', twoMonthsAgo).limit(300).get();
                self.data.reports = reportsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                setMsg('Loading attendance...');
                const attSnap = await window.db.collection('attendance').where('date', '>=', monthStart).get();
                self.data.attendance = attSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                setMsg('Loading notifications...');
                const notifSnap = await window.db.collection('notifications').limit(30).get();
                if (!notifSnap.empty) {
                    self.data.announcements = notifSnap.docs.map(doc => ({ ...doc.data(), _docId: doc.id }));
                    const dot = document.getElementById('notif-dot');
                    if (dot) dot.classList.remove('hidden');
                }

                setMsg('Loading expenses...');
                const companyExpSnap = await window.db.collection('companyExpenses').get();
                self.data.companyExpenses = companyExpSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                self.data.companyExpensesLoaded = true;

                setMsg('Setting up listeners...');
                let rf = true, af = true, uf = true;
                self.data._unsubReports = window.db.collection('reports').where('date', '>=', twoMonthsAgo).limit(300).onSnapshot(snap => {
                    self.data.reports = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (rf) { rf = false; return; }
                    self._debouncedRefresh();
                });
                self.data._unsubAtt = window.db.collection('attendance').where('date', '>=', monthStart).onSnapshot(snap => {
                    self.data.attendance = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (af) { af = false; return; }
                    self._debouncedRefresh();
                });
                self.data._unsubRiders = window.db.collection('users').where('role', '==', 'rider').onSnapshot(snap => {
                    self.data.users = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (uf) { uf = false; return; }
                    self._debouncedRefresh();
                });
                setMsg('Ready!');
            } catch(e) {
                console.error('Data load error:', e);
                setMsg('Error: ' + e.message);
            }
        },

        _debouncedRefresh() {
            if (this.data._refreshTimer) clearTimeout(this.data._refreshTimer);
            this.data._refreshTimer = setTimeout(() => { this._refreshCurrentView(); this.data._refreshTimer = null; }, 300);
        },

        _refreshCurrentView() {
            const id = this.data._currentViewId;
            if (!id || ['rider-report'].includes(id)) return;
            const ds = document.getElementById('dynamic-style');
            if (ds) ds.textContent = '.fade-in{animation:none!important;}';
            this._renderView(id);
            requestAnimationFrame(() => requestAnimationFrame(() => { if (ds) ds.textContent = ''; }));
        },

        async ensureCustomers() {
            if (this.data.customersLoaded) return;
            const snap = await window.db.collection('customers').get();
            this.data.customers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            this.data.customersLoaded = true;
        },

        async ensureCompanyExpenses() {
            if (this.data.companyExpensesLoaded) return;
            const snap = await window.db.collection('companyExpenses').get();
            this.data.companyExpenses = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            this.data.companyExpensesLoaded = true;
        },

        stopRealtimeListeners() {
            if (this.data._unsubReports) { this.data._unsubReports(); this.data._unsubReports = null; }
            if (this.data._unsubAtt) { this.data._unsubAtt(); this.data._unsubAtt = null; }
            if (this.data._unsubRiders) { this.data._unsubRiders(); this.data._unsubRiders = null; }
            this.data._listenersSetup = false;
            if (this.data._refreshTimer) { clearTimeout(this.data._refreshTimer); this.data._refreshTimer = null; }
            Object.values(this.data.chartRegistry).forEach(c => { try { c.destroy(); } catch(e){} });
            this.data.chartRegistry = {};
        },

        createChart(id, config) {
            if (this.data.chartRegistry[id]) { try { this.data.chartRegistry[id].destroy(); } catch(e){} delete this.data.chartRegistry[id]; }
            const ctx = document.getElementById(id);
            if (!ctx) return null;
            const chart = new Chart(ctx.getContext('2d'), config);
            this.data.chartRegistry[id] = chart;
            return chart;
        },

        updateDate() {
            const dateEl = document.getElementById('current-date');
            if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-PK', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        },

        toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            this.data.sidebarOpen = !this.data.sidebarOpen;
            if (this.data.sidebarOpen) { sidebar.classList.add('mobile-visible'); overlay.classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
            else { sidebar.classList.remove('mobile-visible'); overlay.classList.add('hidden'); document.body.style.overflow = ''; }
        },

        showLogin() {
            this.stopRealtimeListeners();
            document.getElementById('main-container').innerHTML = `
                <div class="min-h-full flex items-center justify-center fade-in p-4">
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
                        <div class="text-center mb-6">
                            <div class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white text-xl mx-auto mb-4 shadow-lg shadow-indigo-200"><i class="fas fa-motorcycle"></i></div>
                            <h2 class="text-xl font-bold text-gray-800">Welcome Back</h2>
                            <p class="text-gray-500 text-sm">Sign in to access your portal</p>
                        </div>
                        <form onsubmit="app.handleLogin(event)" class="space-y-4">
                            <input type="email" id="login-email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="rider@example.com" required>
                            <input type="password" id="login-pass" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" required>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">Sign In</button>
                        </form>
                        <div class="mt-4 text-center space-y-2">
                            <p class="text-sm text-gray-500">No account? <button onclick="app.showSignup()" class="text-indigo-600 font-semibold hover:underline">Sign Up</button></p>
                            <button onclick="app.showForgotPassword()" class="text-sm text-gray-500 hover:text-indigo-600">Forgot Password?</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('sidebar').classList.add('hidden');
            document.getElementById('main-header').classList.add('hidden');
        },

        async handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            try {
                const userCredential = await window.auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    if (userData.disabled && userData.role !== 'admin') {
                        alert('آپ کا account disable ہے۔ Admin سے رابطہ کریں۔');
                        await window.auth.signOut();
                        return;
                    }
                    this.data.currentUser = { id: user.uid, ...userData };
                } else {
                    const isAdmin = email === "admin@portal.com";
                    const newUserData = { email: user.email, name: isAdmin ? "Administrator" : "New User", phone: "", zone: isAdmin ? "Head Office" : "Unassigned", vehicle: isAdmin ? "Admin" : "", role: isAdmin ? "admin" : "rider", joinDate: new Date().toISOString().split('T')[0], salaryBase: isAdmin ? 50000 : 15000, dailyWage: isAdmin ? 1000 : 500, disabled: false };
                    await window.db.collection('users').doc(user.uid).set(newUserData);
                    this.data.currentUser = { id: user.uid, ...newUserData };
                }
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-header').classList.remove('hidden');
                this.renderSidebar();
                this.initMonthPicker();
                const initView = this.data.currentUser.role === 'admin' ? 'admin-dashboard' : 'rider-dashboard';
                history.replaceState({ viewId: initView }, '', '#' + initView);
                await this.setupRealtimeListeners();
                this._renderView(initView);
            } catch (error) {
                if (error.code === 'auth/user-not-found') alert('User not found.');
                else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') alert('Invalid email or password.');
                else if (error.code === 'auth/too-many-requests') alert('Too many attempts. Try again later.');
                else alert('Login failed: ' + error.message);
            }

        initMonthPicker() {
            const wrap = document.getElementById('month-picker-wrap');
            const sel = document.getElementById('global-month-picker');
            if (!wrap || !sel) return;
            if (this.data.currentUser?.role !== 'admin') { wrap.classList.add('hidden'); return; }
            wrap.classList.remove('hidden');
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            sel.innerHTML = '';
            const now = new Date();
            for (let i = 0; i < 24; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const opt = document.createElement('option');
                opt.value = `${d.getFullYear()}-${d.getMonth()}`;
                opt.textContent = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
                if (d.getMonth() === this.data.selectedMonth && d.getFullYear() === this.data.selectedYear) opt.selected = true;
                sel.appendChild(opt);
            }
        },

        onMonthChange() {
            const sel = document.getElementById('global-month-picker');
            if (!sel) return;
            const [year, month] = sel.value.split('-').map(Number);
            this.data.selectedMonth = month; this.data.selectedYear = year;
            const activeBtn = document.querySelector('.sidebar-link.active');
            if (activeBtn) this._renderView(activeBtn.id.replace('nav-', ''));
            else this.renderAdminDashboard();
        },

        navigate(viewId, addToHistory = true) {
            if (addToHistory) history.pushState({ viewId }, '', `#${viewId}`);
            this._renderView(viewId);
        },

        _renderView(viewId) {
            this.data._currentViewId = viewId;
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active', 'bg-indigo-600', 'text-white'));
            const activeBtn = document.getElementById(`nav-${viewId}`);
            if (activeBtn) activeBtn.classList.add('active');

            const views = {
                'rider-dashboard': () => this.renderRiderDashboard(),
                'rider-report': () => this.renderRiderReportForm(),
                'rider-history': () => this.renderRiderHistory(),
                'rider-payments': () => this.renderRiderPayments(),
                'rider-salary': () => this.renderRiderSalary(),

                'admin-riders': () => this.renderAdminRiders(),
                'admin-reports': () => this.renderAdminReports(),
                'admin-online-payments': () => this.renderAdminOnlinePayments(),
                'admin-expenses': () => this.renderAdminExpenses(),
                'admin-company-expenses': () => this.renderCompanyExpenses(),
                'admin-customers': () => this.renderAdminCustomers(),
                'admin-attendance': () => this.renderAdminAttendance(),
                'admin-analytics': () => this.renderAdminAnalytics(),
                'admin-wa-settings': () => this.renderWASettings(),
                'admin-settings': () => this.renderSettings(),
            };
            if (views[viewId]) views[viewId]();
            else this.navigate(this.data.currentUser?.role === 'admin' ? 'admin-dashboard' : 'rider-dashboard');
        },

        getMonthFilteredReports(status = null) {
            return this.data.reports.filter(r => {
                const d = new Date(r.date);
                const monthMatch = d.getMonth() === this.data.selectedMonth && d.getFullYear() === this.data.selectedYear;
                const statusMatch = status ? r.status === status : r.status !== 'deleted';
                return monthMatch && statusMatch;
            });
        },

        getMonthlyAbsences(riderId, month, year) {
            return this.data.attendance.filter(a => {
                const aDate = new Date(a.date);
                return a.riderId === riderId && a.status === 'absent' && aDate.getMonth() === month && aDate.getFullYear() === year;
            });
        },

        calculateAttendanceDeductions(riderId, month, year) {
            const absences = this.getMonthlyAbsences(riderId, month, year);
            const rider = this.data.users.find(u => u.id === riderId);
            const dailyWage = rider?.dailyWage || 500;
            const deductibleAbsences = Math.max(0, absences.length - 1);
            return { totalAbsences: absences.length, reliefDays: Math.min(1, absences.length), deductibleAbsences, dailyWage, totalDeduction: deductibleAbsences * dailyWage };
        },

                        <div class="col-span-4 relative">
                            <input type="text" placeholder="Customer ID *" class="w-full bg-transparent text-sm outline-none border-b border-gray-300 focus:border-indigo-500 py-1 cust-id-input" autocomplete="off" oninput="app.lookupCustomerById(this, '${rowId}')">
                        </div>
                        <div class="col-span-3"><input type="text" id="auto-name-${rowId}" placeholder="Naam (auto)" class="w-full bg-green-50 text-sm outline-none border-b border-green-200 py-1 auto-cust-name" readonly></div>
                        <div class="col-span-3"><input type="text" id="auto-phone-${rowId}" placeholder="Phone (auto)" class="w-full bg-green-50 text-sm outline-none border-b border-green-200 py-1 auto-cust-phone" readonly></div>
                        <div class="col-span-2"><input type="number" placeholder="Amount" class="w-full bg-transparent text-sm outline-none border-b border-gray-300 focus:border-indigo-500 py-1 online-amt" oninput="app.calculateTotals()" required></div>
                    </div>
                    <button type="button" onclick="document.getElementById('${rowId}').remove();app.calculateTotals();" class="flex-shrink-0 w-8 h-8 bg-red-100 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-200 ml-2"><i class="fas fa-times text-sm"></i></button>
                </div>
                <div><input type="text" id="auto-addr-${rowId}" placeholder="Address (auto)" class="w-full bg-green-50 text-sm outline-none border border-green-200 rounded-lg px-2 py-1 auto-cust-addr" readonly></div>
                <div><input type="text" placeholder="Item details..." class="w-full bg-white border border-gray-200 rounded-lg px-2 py-1 text-xs text-gray-600 outline-none focus:border-indigo-400 online-items" autocomplete="off"></div>
                <input type="hidden" class="cust-doc-id" id="cust-doc-id-${rowId}">`;

        lookupCustomerById(input, rowId) {
            const id = input.value.trim().toUpperCase();
            const nameEl = document.getElementById('auto-name-' + rowId);
            const addrEl = document.getElementById('auto-addr-' + rowId);
            const phoneEl = document.getElementById('auto-phone-' + rowId);
            const hiddenEl = document.getElementById('cust-doc-id-' + rowId);
            if (id.length < 1) {
                if (nameEl) nameEl.value = ''; if (addrEl) addrEl.value = '';
                if (phoneEl) phoneEl.value = ''; if (hiddenEl) hiddenEl.value = '';
                return;
            }
            const customers = this.data.customers || [];
            let match = customers.find(c => (c.customerId||'').toUpperCase() === id)
                || customers.find(c => (c.name||'').toUpperCase() === id)
                || customers.find(c => (c.phone||'').replace(/\D/g,'') === id.replace(/\D/g,''));
            if (match) {
                if (nameEl) nameEl.value = match.name || ''; if (addrEl) addrEl.value = match.address || '';
                if (phoneEl) phoneEl.value = match.phone || ''; if (hiddenEl) hiddenEl.value = match.id || '';
            } else {
                if (nameEl) nameEl.value = ''; if (addrEl) addrEl.value = '';
                if (phoneEl) phoneEl.value = ''; if (hiddenEl) hiddenEl.value = '';
            }
        },

        previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('proof-preview-img');
                    const area = document.getElementById('proof-preview-area');
                    if (img) { img.src = e.target.result; img.classList.remove('hidden'); }
                    if (area) area.classList.add('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        },

        calculateTotals() {
            let grossTotal = 0;
            [1,2,3].forEach(i => {
                const qty = parseFloat(document.getElementById(`order-qty-${i}`)?.value) || 0;
                const rate = parseFloat(document.getElementById(`order-rate-${i}`)?.value) || 0;
                const gross = qty * rate;
                const el = document.getElementById(`order-gross-${i}`); if (el) el.textContent = `Rs ${gross.toLocaleString()}`;
                grossTotal += gross;
            });
            const grandGross = document.getElementById('grand-gross-total'); if (grandGross) grandGross.textContent = `Rs ${grossTotal.toLocaleString()}`;
            let onlineTotal = 0;
            document.querySelectorAll('#online-payments-list > div').forEach(row => {
                onlineTotal += parseFloat(row.querySelector('.online-amt')?.value) || 0;
            });
            if (document.getElementById('online-pending-display')) document.getElementById('online-pending-display').textContent = `Rs ${onlineTotal.toLocaleString()}`;
            if (document.getElementById('online-received-display')) document.getElementById('online-received-display').textContent = `Rs ${onlineTotal.toLocaleString()}`;
            const fuel = parseFloat(document.getElementById('exp-fuel')?.value) || 0;
            const food = parseFloat(document.getElementById('exp-food')?.value) || 0;
            const maint = parseFloat(document.getElementById('exp-maint')?.value) || 0;
            const expensesTotal = fuel + food + maint;
            const opening = parseFloat(document.getElementById('opening-balance')?.value) || 0;
            const user = this.data.currentUser;
            const wageEnabled = user?.wageEnabled !== false;
            const wageType = user?.wageType || 'fixed';
            let dailyWage = 0;
            if (wageEnabled && wageType !== 'none') {
                if (wageType === 'custom') dailyWage = parseFloat(document.getElementById('wage-input')?.value) || 0;
                else dailyWage = user?.dailyWage || 500;
            }
            const final = opening + grossTotal - onlineTotal - expensesTotal - dailyWage;
            if (document.getElementById('sum-opening')) document.getElementById('sum-opening').textContent = `Rs ${opening.toLocaleString()}`;
            if (document.getElementById('sum-orders')) document.getElementById('sum-orders').textContent = `+ Rs ${grossTotal.toLocaleString()}`;
            if (document.getElementById('sum-online')) document.getElementById('sum-online').textContent = `- Rs ${onlineTotal.toLocaleString()}`;
            if (document.getElementById('sum-expenses')) document.getElementById('sum-expenses').textContent = `- Rs ${expensesTotal.toLocaleString()}`;
            if (document.getElementById('sum-wage')) document.getElementById('sum-wage').textContent = `Rs ${dailyWage.toLocaleString()}`;
            if (document.getElementById('sum-final')) document.getElementById('sum-final').textContent = `Rs ${final.toLocaleString()}`;
        },

        async submitReport(e) {
            e.preventDefault();
            if (this.data._isSubmitting) return;
            this.data._isSubmitting = true;
            const isDraft = e.submitter?.dataset?.draft === 'true';
            if (!isDraft && !confirm("Submit this report?")) { this.data._isSubmitting = false; return; }
            const allBtns = document.querySelectorAll('button[type="submit"]');
            allBtns.forEach(btn => { btn.disabled = true; btn.style.opacity = '0.5'; });
            try {
                const opening = parseFloat(document.getElementById('opening-balance').value) || 0;
                const orders = [1,2,3].map(i => {
                    const qty = parseInt(document.getElementById(`order-qty-${i}`).value) || 0;
                    const rate = parseFloat(document.getElementById(`order-rate-${i}`).value) || 0;
                    return { type: `Type ${i}`, qty, rate, gross: qty * rate };
                }).filter(o => o.qty > 0);
                const onlinePayments = [];
                document.querySelectorAll('#online-payments-list > div').forEach(row => {
                    const amt = parseFloat(row.querySelector('.online-amt')?.value) || 0;
                    if (amt <= 0) return;
                    onlinePayments.push({
                        detail: (row.querySelector('.auto-cust-name')?.value || '') + (row.querySelector('.auto-cust-phone')?.value ? ' · ' + row.querySelector('.auto-cust-phone').value : '') || row.querySelector('.cust-id-input')?.value || '',
                        customerName: row.querySelector('.auto-cust-name')?.value || '',
                        customerAddress: row.querySelector('.auto-cust-addr')?.value || '',
                        customerPhone: row.querySelector('.auto-cust-phone')?.value || '',
                        customerDocId: row.querySelector('.cust-doc-id')?.value || '',
                        customerId: row.querySelector('.cust-id-input')?.value || '',
                        amount: amt, status: 'pending', items: row.querySelector('.online-items')?.value || ''
                    });
                });
                const expenses = [
                    { type: 'Fuel', amount: parseFloat(document.getElementById('exp-fuel').value) || 0 },
                    { type: 'Food', amount: parseFloat(document.getElementById('exp-food').value) || 0 },
                    { type: 'Maintenance', amount: parseFloat(document.getElementById('exp-maint').value) || 0 }
                ].filter(e => e.amount > 0);
                const totalGross = orders.reduce((a, o) => a + o.gross, 0);
                const totalExpenses = expenses.reduce((a, e) => a + e.amount, 0);
                const totalOnline = onlinePayments.reduce((a, p) => a + p.amount, 0);
                const user = this.data.currentUser;
                const wageEnabled = user?.wageEnabled !== false;
                const wageType = user?.wageType || 'fixed';
                let dailyWage = 0;
                if (wageEnabled && wageType !== 'none') {
                    if (wageType === 'custom') dailyWage = parseFloat(document.getElementById('wage-input')?.value) || 0;
                    else dailyWage = user?.dailyWage || 500;
                }
                const finalAmount = opening + totalGross - totalOnline - totalExpenses - dailyWage;
                const reportStatus = isDraft ? 'draft' : 'pending';
                const selectedDate = document.getElementById('report-date')?.value || new Date().toISOString().split('T')[0];
                const newReport = {
                    riderId: this.data.currentUser.id, riderName: this.data.currentUser.name,
                    date: selectedDate, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    openingBalance: opening, orders, onlinePayments, expenses,
                    totalGross, totalExpenses, dailyWage, finalAmount,
                    status: reportStatus, proofImage: document.getElementById('proof-preview-img')?.src || null
                };
                const editId = document.getElementById('report-edit-id')?.value;
                if (editId) {
                    await window.db.collection('reports').doc(editId).update({ ...newReport, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    const existing = this.data.reports.find(r => r.id === editId);
                    if (existing) Object.assign(existing, newReport);
                    alert(isDraft ? 'Draft saved!' : 'Report updated!');
                } else {
                    const docRef = await window.db.collection('reports').add(newReport);
                    this.data.reports.unshift({ id: docRef.id, ...newReport, createdAt: new Date() });
                    if (!isDraft) {
                        const attDocId = `${this.data.currentUser.id}_${selectedDate}`;
                        if (!this.data.attendance.find(a => a.riderId === this.data.currentUser.id && a.date === selectedDate)) {
                            await window.db.collection('attendance').doc(attDocId).set({
                                riderId: this.data.currentUser.id, date: selectedDate,
                                status: 'present', isReliefDay: false, autoMarked: true,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            this.data.attendance.push({ id: attDocId, riderId: this.data.currentUser.id, date: selectedDate, status: 'present' });
                        }
                        alert('Report Submitted! ✅ Attendance auto-marked Present.');
                    } else { alert('Draft saved!'); }
                }
                this.navigate('rider-history');
            } catch (error) { alert('Error: ' + error.message); }
            finally { this.data._isSubmitting = false; allBtns.forEach(btn => { btn.disabled = false; btn.style.opacity = '1'; }); }
        },

        _restoreReportToForm(reportId) {
            const report = this.data.reports.find(r => r.id === reportId);
            if (!report) return;
            document.getElementById('report-edit-id').value = reportId;
            const dateEl = document.getElementById('report-date'); if (dateEl && report.date) dateEl.value = report.date;
            document.getElementById('opening-balance').value = report.openingBalance || 0;
            [1,2,3].forEach((i, idx) => { const o = report.orders?.[idx]; if (o) { const qe = document.getElementById(`order-qty-${i}`); const re = document.getElementById(`order-rate-${i}`); if (qe) qe.value = o.qty||0; if (re) re.value = o.rate||0; } });
            const container = document.getElementById('online-payments-list'); if (container) container.innerHTML = '';
            (report.onlinePayments||[]).forEach(p => {
                this.addOnlinePaymentRow();
                const rows = document.querySelectorAll('#online-payments-list > div'); const last = rows[rows.length-1];
                if (last) {
                    const ci = last.querySelector('.cust-id-input'); const ai = last.querySelector('.online-amt');
                    const an = last.querySelector('.auto-cust-name'); const ap = last.querySelector('.auto-cust-phone');
                    const aa = last.querySelector('.auto-cust-addr'); const at = last.querySelector('.online-items');
                    const ad = last.querySelector('.cust-doc-id');
                    if (ci) ci.value = p.customerId||p.detail||''; if (ai) ai.value = p.amount||0;
                    if (an) an.value = p.customerName||''; if (ap) ap.value = p.customerPhone||'';
                    if (aa) aa.value = p.customerAddress||''; if (at) at.value = p.items||'';
                    if (ad) ad.value = p.customerDocId||'';
                }
            });
            const expMap = {'Fuel':'exp-fuel','Food':'exp-food','Maintenance':'exp-maint'};
            (report.expenses||[]).forEach(e => { const el = document.getElementById(expMap[e.type]); if (el) el.value = e.amount||0; });
            this.calculateTotals();
            document.getElementById('page-title').textContent = report.status==='draft' ? 'Edit Draft' : 'Edit Report';
        },

            const monthlyReports = this.data.reports.filter(r => r.riderId === this.data.currentUser.id && new Date(r.date).getMonth() === cm && new Date(r.date).getFullYear() === cy);
            const totalOrders = monthlyReports.reduce((a,r)=>a+(r.orders||[]).reduce((o,x)=>o+(x.qty||0),0),0);
            const baseSalary = this.data.currentUser.salaryBase || 15000;

        downloadPayslip() {
            const user = this.data.currentUser;
            const cm = new Date().getMonth(), cy = new Date().getFullYear();
            const mn = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const ml = `${mn[cm]} ${cy}`;
            const mr = this.data.reports.filter(r => r.riderId===user.id && r.status==='approved' && new Date(r.date).getMonth()===cm && new Date(r.date).getFullYear()===cy);
            const to = mr.reduce((a,r)=>a+(r.orders||[]).reduce((o,x)=>o+(x.qty||0),0),0);
            const tg = mr.reduce((a,r)=>a+(r.totalGross||0),0);
            const bs = user.salaryBase||15000;
            const ai = this.calculateAttendanceDeductions(user.id, cm, cy);
            const ns = bs - ai.totalDeduction;
            const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Payslip</title></head><body style="font-family:Arial;padding:20px"><h2>Dastak — ${user.name} — ${ml}</h2><p>Base: Rs ${bs.toLocaleString()} | Deductions: Rs ${ai.totalDeduction.toLocaleString()} | Net: <b>Rs ${ns.toLocaleString()}</b></p><p>Total Orders: ${to} | Total Gross: Rs ${tg.toLocaleString()}</p><button onclick="window.print()">Print</button></body></html>`;
            const win = window.open('','_blank'); win.document.write(html); win.document.close(); setTimeout(()=>win.print(),500);
        },

        updateDayView() {
            const picker = document.getElementById('dash-date-picker'); const grid = document.getElementById('day-stats-grid');
            if (!picker || !grid) return;
            const date = picker.value;
            const reps = this.data.reports.filter(r=>r.date===date&&r.status==='approved');
            const gross = reps.reduce((a,r)=>a+(r.totalGross||0),0);
            const wages = reps.reduce((a,r)=>a+(r.dailyWage||0),0);
            const exp = reps.reduce((a,r)=>a+(r.totalExpenses||0),0);
            // Company expense day view se MINUS NAHI hoga — sirf rider expenses
            const profit = gross - wages - exp;
            const orders = reps.reduce((a,r)=>a+(r.orders||[]).reduce((s,o)=>s+(o.qty||0),0),0);
            const online = reps.flatMap(r=>r.onlinePayments||[]).filter(p=>p.status==='pending').reduce((a,p)=>a+(p.amount||0),0);
            const pending = this.data.reports.filter(r=>r.date===date&&r.status==='pending').length;

        // NEW: Toggle rider disable/enable in Firebase Auth + Firestore
        async toggleRiderDisable(riderId, currentlyDisabled) {
            const action = currentlyDisabled ? 'enable' : 'disable';
            if (!confirm(`Kya aap is rider ko ${action} karna chahte hain?`)) return;
            try {
                // Update Firestore (app-level disable)
                await window.db.collection('users').doc(riderId).update({ disabled: !currentlyDisabled });
                const rider = this.data.users.find(u => u.id === riderId);
                if (rider) rider.disabled = !currentlyDisabled;
                alert(`Rider ${action}d successfully! ✅\n\nNote: Firebase Auth disable ke liye Admin Console use karein.`);
                this.renderAdminRiders();
            } catch (error) { alert('Error: ' + error.message); }
        },

        async deleteRider(riderId) {
            if (!confirm('Delete this rider?')) return;
            try { await window.db.collection('users').doc(riderId).delete(); this.data.users = this.data.users.filter(u => u.id !== riderId); this.renderAdminRiders(); alert('Rider deleted!'); }
            catch (error) { alert('Error: ' + error.message); }
        },

        async saveRiderEdit(e, riderId) {
            e.preventDefault();
            const wageEnabled = document.getElementById('edit-wage-enabled')?.checked !== false;
            const wageType = document.querySelector('input[name="edit-wage-type"]:checked')?.value || 'fixed';
            let dailyWage = wageType==='fixed' ? parseInt(document.getElementById('edit-dailywage')?.value)||0 : wageType==='custom' ? parseInt(document.getElementById('edit-dailywage-custom')?.value)||0 : 0;
            const updates = { name: document.getElementById('edit-name').value, email: document.getElementById('edit-email').value, phone: document.getElementById('edit-phone').value, vehicle: document.getElementById('edit-vehicle').value, salaryBase: parseInt(document.getElementById('edit-salary').value), dailyWage, wageType, wageEnabled };

        // Helper: calculate order gross live in admin edit modal
        _adminCalcOrderGross(i) {
            const qty = parseFloat(document.getElementById(`admin-order-qty-${i}`)?.value) || 0;
            const rate = parseFloat(document.getElementById(`admin-order-rate-${i}`)?.value) || 0;
            const el = document.getElementById(`admin-order-gross-${i}`);
            if (el) el.textContent = `Rs ${(qty * rate).toLocaleString()}`;
        },

        // Helper: lookup customer by ID in admin edit modal
        _adminLookupCust(value, idx) {
            const id = (value||'').trim().toUpperCase();
            const nameEl = document.getElementById(`admin-pay-name-${idx}`);
            const phoneEl = document.getElementById(`admin-pay-phone-${idx}`);
            const addrEl = document.getElementById(`admin-pay-addr-${idx}`);
            if (!id || id.length < 1) return;
            const customers = this.data.customers || [];
            const match = customers.find(c=>(c.customerId||'').toUpperCase()===id)
                || customers.find(c=>(c.name||'').toUpperCase()===id)
                || customers.find(c=>(c.phone||'').replace(/\D/g,'')===id.replace(/\D/g,''));
            if (match) {
                if (nameEl) nameEl.value = match.name||'';
                if (phoneEl) phoneEl.value = match.phone||'';
                if (addrEl) addrEl.value = match.address||'';
            }
        },

        // Save full admin report edit
        async adminSaveFullReportEdit(e, id) {
            e.preventDefault();
            const report = this.data.reports.find(r => r.id === id);
            if (!report) return;

            try {
                // Date & status
                const date = document.getElementById('admin-edit-date').value || report.date;
                const status = document.getElementById('admin-edit-status').value;
                const openingBalance = parseFloat(document.getElementById('admin-edit-opening').value) || 0;
                const dailyWage = parseFloat(document.getElementById('admin-edit-wage').value) || 0;
                const finalAmount = parseFloat(document.getElementById('admin-edit-final').value) || 0;

                // Orders — support up to 6 rows (original max was 3, but some reports may have more)
                const originalOrders = report.orders || [
                    {type:'Type 1'},{type:'Type 2'},{type:'Type 3'}
                ];
                const orders = originalOrders.map((o, i) => {
                    const qty = parseInt(document.getElementById(`admin-order-qty-${i}`)?.value) || 0;
                    const rate = parseFloat(document.getElementById(`admin-order-rate-${i}`)?.value) || 0;
                    return { type: o.type||`Type ${i+1}`, qty, rate, gross: qty * rate };
                }).filter(o => o.qty > 0);

                // Online payments with customer details
                const onlinePayments = (report.onlinePayments||[]).map((p, i) => {
                    const customerId = document.getElementById(`admin-pay-custid-${i}`)?.value?.trim() || '';
                    const customerName = document.getElementById(`admin-pay-name-${i}`)?.value?.trim() || '';
                    const customerPhone = document.getElementById(`admin-pay-phone-${i}`)?.value?.trim() || '';
                    const customerAddress = document.getElementById(`admin-pay-addr-${i}`)?.value?.trim() || '';
                    const amount = parseFloat(document.getElementById(`admin-pay-amt-${i}`)?.value) || 0;
                    const payStatus = document.getElementById(`admin-pay-status-${i}`)?.value || p.status || 'pending';
                    const items = document.getElementById(`admin-pay-items-${i}`)?.value?.trim() || '';
                    const detail = customerName ? customerName + (customerPhone?' · '+customerPhone:'') : (customerId || p.detail || '—');
                    return { ...p, customerId, customerName, customerPhone, customerAddress, amount, status: payStatus, items, detail };
                });

                // Expenses
                const fuel = parseFloat(document.getElementById('admin-edit-fuel').value) || 0;
                const food = parseFloat(document.getElementById('admin-edit-food').value) || 0;
                const maint = parseFloat(document.getElementById('admin-edit-maint').value) || 0;
                const expenses = [];
                if (fuel > 0) expenses.push({ type:'Fuel', amount: fuel });
                if (food > 0) expenses.push({ type:'Food', amount: food });
                if (maint > 0) expenses.push({ type:'Maintenance', amount: maint });

                const totalGross = orders.reduce((a,o)=>a+o.gross,0);
                const totalExpenses = expenses.reduce((a,e)=>a+e.amount,0);

                const updates = {
                    date, status, openingBalance, orders,
                    onlinePayments, expenses,
                    totalGross, totalExpenses, dailyWage, finalAmount,
                    adminEditedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                await window.db.collection('reports').doc(id).update(updates);
                // Update local cache
                Object.assign(report, updates);

                this.closeModal();
                alert('Report update ho gayi! ✅');
                this.renderAdminReports();

            } catch(e) { alert('Error: ' + e.message); }
        },

        async updateReportStatus(id, status) {
            try { await window.db.collection('reports').doc(id).update({ status }); const r = this.data.reports.find(r=>r.id===id); if (r) r.status=status; if(this.data.currentUser.role==='admin') this.renderAdminReports(); else this.renderRiderHistory(); }
            catch (error) { alert('Error: ' + error.message); }
        },

        async adminRecoverReport(id) { try { await window.db.collection('reports').doc(id).update({status:'pending'}); const r=this.data.reports.find(r=>r.id===id); if(r) r.status='pending'; this.renderAdminReports(); } catch(e) { alert('Error: '+e.message); } },
        async adminDeleteReport(id) { if (!confirm('Delete this report?')) return; try { await window.db.collection('reports').doc(id).update({status:'deleted'}); const r=this.data.reports.find(r=>r.id===id); if(r) r.status='deleted'; this.renderAdminReports(); } catch(e) { alert('Error: '+e.message); } },

        // ========== ADMIN ONLINE PAYMENTS (with all new features) ==========
        renderAdminOnlinePayments(selectedDate = null) {
            const activeFilter = selectedDate !== null ? selectedDate : (this.data.paymentDateFilter || new Date().toISOString().split('T')[0]);
            this.data.paymentDateFilter = activeFilter;
            document.getElementById('page-title').textContent = 'Online Payments';
            const container = document.getElementById('main-container');
            const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const fullMonthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const now = new Date();
            // Build month options for month selector
            let monthOptions = '<option value="">-- Month --</option>';
            for (let i = 0; i < 18; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                monthOptions += `<option value="${val}" ${this.data.paymentMonthFilter===val?'selected':''}>${fullMonthNames[d.getMonth()]} ${d.getFullYear()}</option>`;
            }

            // Get all payments based on filter
            let allPendingPayments = [], allReceivedPayments = [];
            this.data.reports.forEach(r => {
                let include = false;
                if (activeFilter === 'all') include = true;
                else if (this.data.paymentMonthFilter && activeFilter === 'month') {
                    const [fy, fm] = this.data.paymentMonthFilter.split('-').map(Number);
                    const rd = new Date(r.date);
                    include = rd.getFullYear() === fy && rd.getMonth() === fm - 1;
                } else {
                    include = r.date === activeFilter;
                }
                if (!include) return;
                (r.onlinePayments||[]).forEach((p, idx) => {
                    const payment = { ...p, reportId: r.id, riderId: r.riderId, riderName: r.riderName, date: r.date, idx };

        // NEW: Execute partial payment receive
        async executePartialReceive(reportId, idx, totalAmount) {
            const enteredAmount = parseFloat(document.getElementById('partial-amount')?.value) || 0;
            if (enteredAmount <= 0) { alert('Amount likhna zaroori hai!'); return; }
            const report = this.data.reports.find(r => r.id === reportId);
            if (!report || !report.onlinePayments || !report.onlinePayments[idx]) { alert('Report nahi mila!'); return; }
            const currentFilter = this.data.paymentDateFilter;
            try {
                const updatedPayments = [...report.onlinePayments];
                const originalPayment = { ...updatedPayments[idx] };
                if (enteredAmount >= totalAmount) {
                    // Full receive
                    updatedPayments[idx] = { ...originalPayment, status: 'received', amount: totalAmount };
                    await window.db.collection('reports').doc(reportId).update({ onlinePayments: updatedPayments });
                    report.onlinePayments = updatedPayments;
                    alert(`✅ Rs ${totalAmount.toLocaleString()} fully received!`);
                } else {
                    // Partial: mark current as received with entered amount, add new pending entry for remainder
                    const remaining = totalAmount - enteredAmount;
                    updatedPayments[idx] = { ...originalPayment, status: 'received', amount: enteredAmount };
                    // Add new pending payment for remainder
                    updatedPayments.push({
                        ...originalPayment,
                        amount: remaining,
                        status: 'pending',
                        detail: (originalPayment.detail||'') + ' (Baaki)',
                        partialFrom: new Date().toISOString()
                    });
                    await window.db.collection('reports').doc(reportId).update({ onlinePayments: updatedPayments });
                    report.onlinePayments = updatedPayments;
                    alert(`✅ Rs ${enteredAmount.toLocaleString()} received!\n⏳ Rs ${remaining.toLocaleString()} pending mein raha.`);
                }
                // Send WhatsApp thank you
                this.sendReceivedThankYou(originalPayment.detail, enteredAmount, report.date);
                this.closeModal();
                this.renderAdminOnlinePayments(currentFilter);
            } catch (error) { alert('Error: ' + error.message); }
        },

        // NEW: Open WhatsApp reminder with direct phone number
        openWAReminder(riderName, customerDetail, customerPhone, amount, date) {
            const customers = this.data.customers || [];
            const detail = (customerDetail||'').toLowerCase();
            const phoneInDetail = detail.replace(/\D/g,'').slice(-10);
            const byPhone = customers.find(c => (c.phone||'').replace(/\D/g,'').slice(-10) === phoneInDetail && phoneInDetail.length >= 10);
            const byName = !byPhone && customers.find(c => (c.name||'').length >= 3 && detail.includes((c.name||'').toLowerCase()));
            const matched = byPhone || byName;
            const custName = matched ? matched.name : (customerDetail||'Customer');
            let waNumber = '';
            // Priority: passed phone → customer in DB → extract from detail
            if (customerPhone) {
                const p = customerPhone.replace(/\D/g,'');
                waNumber = p.startsWith('92') ? p : '92' + p.replace(/^0/,'');
            } else if (matched && matched.phone) {
                const p = matched.phone.replace(/\D/g,'');
                waNumber = p.startsWith('92') ? p : '92' + p.replace(/^0/,'');
            } else if (phoneInDetail.length >= 10) {
                waNumber = '92' + phoneInDetail;
            }

            const template = this.data.waReminderTemplate
                .replace('{name}', custName)
                .replace('{amount}', Number(amount).toLocaleString())
                .replace('{date}', new Date(date).toLocaleDateString('en-PK'));
            const encoded = encodeURIComponent(template);

            if (waNumber.length >= 12) {
                window.open(`https://api.whatsapp.com/send?phone=${waNumber}&text=${encoded}`, '_blank');
            } else {
                // No number found — open WhatsApp with text only
                if (confirm(`Customer ka phone number nahi mila!\n\nKya bina number ke WhatsApp open karna chahte hain?\n(Manually number type karna hoga)`)) {
                    window.open(`https://api.whatsapp.com/send?text=${encoded}`, '_blank');
                }
            }
        },

        // NEW: Send full statement — saari pending payments ek message mein
        sendWhatsAppStatement(customerDetail, customerPhone) {
            const detail = (customerDetail || '').toLowerCase();
            const customers = this.data.customers || [];

            // Customer match karo — phone se ya naam se
            const phoneInDetail = detail.replace(/\D/g,'').slice(-10);
            const byPhone = customers.find(c => (c.phone||'').replace(/\D/g,'').slice(-10) === phoneInDetail && phoneInDetail.length >= 10);
            const byName = !byPhone && customers.find(c => (c.name||'').length >= 3 && detail.includes((c.name||'').toLowerCase()));
            const matched = byPhone || byName;
            const custName = matched ? matched.name : (customerDetail || 'Customer');

            // Saari PENDING payments dhoondo is customer ki — sari reports mein se
            const allPending = [];
            this.data.reports.forEach(r => {
                (r.onlinePayments || []).forEach(p => {
                    if (p.status !== 'pending') return;
                    const d = (p.detail || '').toLowerCase();
                    const dPhone = d.replace(/\D/g,'').slice(-10);

                    // Match: phone exact match YA naam match YA detail exact match
                    const phoneMatch = phoneInDetail.length >= 10 && dPhone === phoneInDetail;
                    const nameMatch = matched && (matched.name||'').length >= 3 && d.includes((matched.name||'').toLowerCase());
                    const exactMatch = p.detail === customerDetail;
                    const passedPhoneMatch = customerPhone && (p.customerPhone||'').replace(/\D/g,'').slice(-10) === customerPhone.replace(/\D/g,'').slice(-10) && customerPhone.replace(/\D/g,'').length >= 10;

                    if (phoneMatch || nameMatch || exactMatch || passedPhoneMatch) {
                        allPending.push({
                            date: r.date,
                            amount: p.amount || 0,
                            detail: p.detail || '',
                            items: p.items || ''
                        });
                    }
                });
            });

            if (allPending.length === 0) {
                alert(`"${custName}" ki koi pending payment nahi mili.\n\nTip: Customer ID ya exact naam use karein.`);
                return;
            }

            // Sort by date (purani pehle)
            allPending.sort((a, b) => new Date(a.date) - new Date(b.date));
            const totalPending = allPending.reduce((a, p) => a + p.amount, 0);
            const oldestDate = allPending[0].date;
            const daysSince = Math.floor((new Date() - new Date(oldestDate)) / (1000 * 60 * 60 * 24));

            // Build statement lines
            const lines = allPending.map((p, i) => {
                const d = Math.floor((new Date() - new Date(p.date)) / (1000 * 60 * 60 * 24));
                const dateFormatted = new Date(p.date).toLocaleDateString('en-PK', { day: 'numeric', month: 'short', year: 'numeric' });
                return `${i + 1}. 📅 ${dateFormatted} — *Rs ${p.amount.toLocaleString()}* (${d} din پہلے)${p.items ? '\n   🛒 ' + p.items : ''}`;
            }).join('\n');

            const message = `Assalam o Alaikum *${custName}*! 🙏\n\nآپ کی درج ذیل payments ابھی تک pending ہیں:\n\n${lines}\n\n━━━━━━━━━━━━━━━\n💰 *کل باقی: Rs ${totalPending.toLocaleString()}*\n📆 *${daysSince} دن سے pending*\n━━━━━━━━━━━━━━━\n\nبراہ کرم جلد از جلد payment کریں۔\nشکریہ — Dastak Delivery Service 🚀`;

            // Phone number determine karo
            let waNumber = '';
            if (customerPhone) {
                const p = customerPhone.replace(/\D/g,'');
                if (p.length >= 10) waNumber = p.startsWith('92') ? p : '92' + p.replace(/^0/,'');
            }
            if (!waNumber && matched && matched.phone) {
                const p = matched.phone.replace(/\D/g,'');
                waNumber = p.startsWith('92') ? p : '92' + p.replace(/^0/,'');
            }
            if (!waNumber && phoneInDetail.length >= 10) {
                waNumber = '92' + phoneInDetail;
            }

            const encoded = encodeURIComponent(message);
            if (waNumber.length >= 12) {
                window.open(`https://api.whatsapp.com/send?phone=${waNumber}&text=${encoded}`, '_blank');
            } else {
                if (confirm(`Customer ka phone number nahi mila!\n\nKya bina number ke WhatsApp open karna chahte hain?\n(Manually number type karna hoga)`)) {
                    window.open(`https://api.whatsapp.com/send?text=${encoded}`, '_blank');
                }
            }
        },

        // ========== ADMIN EXPENSES ==========

                        <p class="text-xs text-gray-500">Filter ka Total</p>
                        <h3 class="text-2xl font-bold text-indigo-600">Rs ${totalFiltered.toLocaleString()}</h3>
                    </div>` : `<div class="stat-card border-l-4 border-gray-300">
                        <p class="text-xs text-gray-400">Entries</p>
                        <h3 class="text-2xl font-bold text-gray-600">${allExpenses.length}</h3>
                    </div>`}

                <!-- Filters -->

                    <div class="flex items-center gap-2">
                        <div class="relative flex-1">
                            <i class="fas fa-calendar-alt absolute left-3 top-1/2 -translate-y-1/2 text-purple-400 text-sm"></i>
                            <input type="date" value="${activeDateFilter}"
                                max="${now.toISOString().split('T')[0]}"
                                onchange="app.data.ceFilterMonth='';app.renderCompanyExpenses(this.value,'')"
                                class="w-full border border-purple-200 bg-white rounded-xl pl-10 pr-3 py-2.5 text-sm font-semibold text-purple-700 outline-none cursor-pointer">
                        </div>
                        <button onclick="app.renderCompanyExpenses('','')"
                            class="flex-shrink-0 px-3 py-2.5 rounded-xl text-sm font-semibold transition-colors ${!activeDateFilter&&!activeMonthFilter?'bg-purple-600 text-white':'bg-white text-gray-600 border border-gray-300'}">
                            Sab
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fas fa-calendar text-purple-400 text-sm ml-1"></i>
                        <select onchange="app.data.ceFilterDate='';app.renderCompanyExpenses('',this.value)"

                            ${monthOptions}
                        </select>
                    </div>
                    ${isFiltered ? `<div class="flex items-center gap-2 bg-purple-50 border border-purple-200 rounded-lg px-3 py-2">
                        <i class="fas fa-filter text-purple-500 text-xs"></i>
                        <span class="text-xs text-purple-700 font-medium">${activeDateFilter ? new Date(activeDateFilter+'T12:00:00').toLocaleDateString('en-PK',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : (() => { const [fy,fm] = activeMonthFilter.split('-').map(Number); return monthNames[fm-1]+' '+fy; })()}</span>
                        <button onclick="app.renderCompanyExpenses('','')" class="ml-auto text-xs text-red-500 font-medium">✕ Clear</button>

                <!-- Add Expense -->

                                    ${categories.map(c=>`<option>${c}</option>`).join('')}

                            <i class="fas fa-info-circle text-yellow-600 text-xs mt-0.5"></i>

                            <i class="fas fa-plus mr-2"></i>Add Expense
                        </button>
                    </div>
                </div>

                <!-- Category breakdown -->
                ${filteredExpenses.length > 0 ? `
                <div class="section-card">
                    <h3 class="font-bold text-gray-800 mb-3">Category Breakdown ${isFiltered?'(Filtered)':'(All Time)'}</h3>
                    <div class="grid grid-cols-2 gap-2">
                        ${categories.filter(c=>catTotals[c]>0).map(c=>`
                        <div class="bg-purple-50 rounded-lg p-3 border border-purple-100">
                            <p class="text-xs text-gray-500">${c}</p>
                            <p class="font-bold text-purple-700">Rs ${catTotals[c].toLocaleString()}</p>
                        </div>`).join('')}
                    </div>
                </div>` : ''}

                <!-- All Entries -->
                <div class="section-card">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-gray-800">Entries (${filteredExpenses.length})</h3>
                        ${isFiltered ? `<span class="text-xs text-purple-600 font-semibold">Total: Rs ${totalFiltered.toLocaleString()}</span>` : ''}
                    </div>
                    <div class="space-y-2">

                            [...filteredExpenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e => `

                                    </div>
                                </div>
                                <div class="flex items-center gap-2 ml-2 flex-shrink-0">
                                    <p class="font-bold text-purple-600">Rs ${(e.amount||0).toLocaleString()}</p>

        async addCompanyExpense() {
            const category = document.getElementById('ce-category').value;
            const amount = parseFloat(document.getElementById('ce-amount').value)||0;
            const description = document.getElementById('ce-desc').value.trim();
            const date = document.getElementById('ce-date').value;
            if (!amount||amount<=0) { alert('Amount zaroori hai!'); return; }
            try {
                const newExp = {category,amount,description,date};
                const docRef = await window.db.collection('companyExpenses').add({...newExp,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
                this.data.companyExpenses.push({id:docRef.id,...newExp});
                this.renderCompanyExpenses();
            } catch(e) { alert('Error: '+e.message); }
        },

        async deleteCompanyExpense(id) {
            if (!confirm('Delete?')) return;
            try { await window.db.collection('companyExpenses').doc(id).delete(); this.data.companyExpenses=this.data.companyExpenses.filter(e=>e.id!==id); this.renderCompanyExpenses(); }
            catch(e) { alert('Error: '+e.message); }
        },

        getCustomerPaymentStats(c) {
            let total=0,pending=0,received=0,count=0;
            const custPhone=(c.phone||'').replace(/\D/g,'').slice(-10);
            const custName=(c.name||'').trim().toLowerCase();
            this.data.reports.forEach(r => {
                (r.onlinePayments||[]).forEach(p => {
                    const detail=(p.detail||'').toLowerCase();
                    const dPhone=detail.replace(/\D/g,'').slice(-10);
                    const phoneMatch=custPhone.length>=10&&dPhone===custPhone;
                    const nameMatch=custName.length>=4&&detail.includes(custName);
                    if(phoneMatch||nameMatch){total+=p.amount||0;count++;if(p.status==='pending')pending+=p.amount||0;else received+=p.amount||0;}
                });
            });
            return {total,pending,received,count};
        },

        renderCustomerCard(c) {
            const stats = this.getCustomerPaymentStats(c);
            const phone=(c.phone||'').replace(/\D/g,'');
            const wa=phone.startsWith('92')?phone:'92'+phone.replace(/^0/,'');
            return `<div class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                <input type="checkbox" class="cust-checkbox w-4 h-4 accent-indigo-600 flex-shrink-0" data-id="${c.id}" onchange="app.updateBulkDeleteBtn()">
                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm flex-shrink-0">${(c.name||'?').charAt(0).toUpperCase()}</div>
                <div class="flex-1 min-w-0">
                    <p class="font-semibold text-sm truncate">${c.name}</p>
                    <p class="text-xs text-gray-500">${c.phone||'No phone'}${c.address?' · '+c.address:''}</p>
                    ${c.customerId?`<p class="text-xs text-indigo-500 font-mono">ID: ${c.customerId}</p>`:''}
                    ${stats.count>0?`<p class="text-xs ${stats.pending>0?'text-orange-600':'text-green-600'} font-medium">Rs ${stats.total.toLocaleString()}${stats.pending>0?' · Pending: Rs '+stats.pending.toLocaleString():' · Clear ✓'}</p>`:''}
                </div>
                <div class="flex gap-1 flex-shrink-0">
                    ${stats.pending>0&&phone.length>=10?`<a href="https://api.whatsapp.com/send?phone=${wa}&text=${encodeURIComponent(`Assalam o Alaikum *${c.name}*,\n\nآپ کی payment pending ہے: Rs ${stats.pending.toLocaleString()}\n\n— Dastak 🙏`)}" target="_blank" class="p-1.5 bg-green-100 text-green-700 rounded-lg text-xs"><i class="fab fa-whatsapp"></i></a>`:''}
                    <button onclick="app.editCustomer('${c.id}')" class="p-1.5 bg-indigo-100 text-indigo-600 rounded-lg text-xs"><i class="fas fa-edit"></i></button>
                    <button onclick="app.deleteCustomer('${c.id}')" class="p-1.5 bg-red-100 text-red-500 rounded-lg text-xs"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        },

        renderCustomerPagination(totalItems, currentPage, perPage) {
            const totalPages = Math.ceil(totalItems/perPage);
            if (totalPages<=1) return '';
            let buttons = '';
            for (let i=1;i<=totalPages;i++) { buttons+=`<button onclick="app.data.custPage=${i};app._renderCustomersPage();" class="w-8 h-8 rounded-lg text-xs font-medium ${i===currentPage?'bg-indigo-600 text-white':'bg-white text-gray-700 border border-gray-300'}">${i}</button>`; }
            return `<div class="flex items-center justify-center gap-1 pt-3">${buttons}</div>`;
