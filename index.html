    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar-link { transition: all 0.3s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-present { background: #d1fae5; color: #065f46; }
        .status-absent { background: #fee2e2; color: #991b1b; }
        .status-relief { background: #dbeafe; color: #1e40af; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
        .ai-processing { background: linear-gradient(90deg, #4f46e5, #7c3aed, #4f46e5); background-size: 200% 100%; animation: gradient-shift 2s ease infinite; }
        @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* Mobile Sidebar Styles */
        #sidebar { transition: transform 0.3s ease-in-out; }
        #sidebar.mobile-hidden { transform: translateX(-100%); }
        #sidebar-overlay { transition: opacity 0.3s ease; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 50; transform: translateX(-100%); }
            #sidebar.mobile-visible { transform: translateX(0); }
            .main-content-shift { margin-left: 0 !important; }
        }
        
        /* Card Styles */
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .quick-action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .quick-action-btn:active { transform: scale(0.98); }
        
        .section-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .time-filter-btn {
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #e5e7eb;
            background: white;
            color: #6b7280;
        }
        .time-filter-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        .time-filter-btn:hover:not(.active) {
            background: #f3f4f6;
        }

        .attendance-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e5e7eb;
        }
        .calendar-day:hover { transform: scale(1.05); }
        .calendar-day.present { background: #d1fae5; color: #065f46; border-color: #10b981; }
        .calendar-day.absent { background: #fee2e2; color: #991b1b; border-color: #ef4444; }
        .calendar-day.relief { background: #dbeafe; color: #1e40af; border-color: #3b82f6; }
        .calendar-day.empty { background: #f9fafb; border-color: #f3f4f6; cursor: default; }
        .calendar-day.empty:hover { transform: none; }
    </style>
</head>

// ✅✅✅ YEH NAYA FUNCTION ADD KARO ✅✅✅
setupRealtimeListeners() {
    // Riders real-time sync
    window.db.collection('users').where('role', '==', 'rider').onSnapshot((snapshot) => {
        const riders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        this.data.users = [...this.data.users.filter(u => u.role === 'admin'), ...riders];
    });

    // Reports real-time sync
    window.db.collection('reports').onSnapshot((snapshot) => {
        this.data.reports = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    });

    // Attendance real-time sync
    window.db.collection('attendance').onSnapshot((snapshot) => {
        this.data.attendance = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    });
},

            handleResetPassword(e, email) {
                e.preventDefault();
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;
                
                if (newPass !== confirmPass) {
                    alert('Passwords do not match!');
                    return;
                }
                
                const user = this.data.users.find(u => u.email === email);
                if (user) {
                    user.password = newPass;
                    this.saveData();
                    alert('Password reset successfully! Please sign in with your new password.');
                    this.showLogin();
                }

            // --- Helper Functions for Date Aggregation ---

            getDailyProfits(days = 30) {
                const endDate = new Date();
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - days);
                
                const dailyData = {};
                
                // Initialize all days with 0
                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    const dateStr = d.toISOString().split('T')[0];
                    dailyData[dateStr] = 0;
                }
                
                // Aggregate profits
                this.data.reports
                    .filter(r => r.status === 'approved')
                    .forEach(r => {
                        if (dailyData.hasOwnProperty(r.date)) {
                            dailyData[r.date] += r.finalAmount || 0;
                        }
                    });
                
                return Object.entries(dailyData).map(([date, profit]) => ({
                    date,
                    profit,
                    displayDate: new Date(date).toLocaleDateString('en-PK', { day: 'numeric', month: 'short' })
                })).sort((a, b) => new Date(a.date) - new Date(b.date));
            },

            getMonthlyProfits(year = new Date().getFullYear()) {
                const monthlyData = {};
                
                // Initialize all months
                for (let i = 0; i < 12; i++) {
                    monthlyData[i] = 0;
                }
                
                this.data.reports
                    .filter(r => {
                        const rDate = new Date(r.date);
                        return r.status === 'approved' && rDate.getFullYear() === year;
                    })
                    .forEach(r => {
                        const month = new Date(r.date).getMonth();
                        monthlyData[month] += r.finalAmount || 0;
                    });
                
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                
                return Object.entries(monthlyData).map(([month, profit]) => ({
                    month: parseInt(month),
                    monthName: monthNames[month],
                    profit
                }));
            },

            getYearlyProfits() {
                const yearlyData = {};
                
                this.data.reports
                    .filter(r => r.status === 'approved')
                    .forEach(r => {
                        const year = new Date(r.date).getFullYear();
                        yearlyData[year] = (yearlyData[year] || 0) + (r.finalAmount || 0);
                    });
                
                return Object.entries(yearlyData)
                    .map(([year, profit]) => ({ year: parseInt(year), profit }))
                    .sort((a, b) => a.year - b.year);
            },

            // --- Attendance Helper Functions ---

            getMonthlyAbsences(riderId, month, year) {
                return this.data.attendance.filter(a => {
                    const aDate = new Date(a.date);
                    return a.riderId === riderId && 
                           a.status === 'absent' && 
                           aDate.getMonth() === month && 
                           aDate.getFullYear() === year;
                });
            },

            calculateAttendanceDeductions(riderId, month, year) {
                const absences = this.getMonthlyAbsences(riderId, month, year);
                const rider = this.data.users.find(u => u.id === riderId);
                const dailyWage = rider?.dailyWage || 500;
                
                // Relief policy: First absence is relief (no deduction), deductions start from 2nd absence
                const deductibleAbsences = Math.max(0, absences.length - 1);
                const reliefDays = Math.min(1, absences.length); // Max 1 relief day
                
                const totalDeduction = deductibleAbsences * dailyWage;
                
                return {
                    totalAbsences: absences.length,
                    reliefDays,
                    deductibleAbsences,
                    dailyWage,
                    totalDeduction
                };
            },

            calculateTotals() {
                const userCommission = this.data.currentUser.commissionRate || this.data.commissionSettings.defaultRate;
                
                let grossTotal = 0;
                let commissionTotal = 0;
                
                [1, 2, 3].forEach(i => {
                    const qty = parseFloat(document.getElementById(`order-qty-${i}`).value) || 0;
                    const rate = parseFloat(document.getElementById(`order-rate-${i}`).value) || 0;
                    const gross = qty * rate;
                    const commission = gross * (userCommission / 100);
                    
                    document.getElementById(`order-gross-${i}`).textContent = `Rs ${gross.toLocaleString()}`;
                    document.getElementById(`order-commission-${i}`).textContent = `Rs ${commission.toLocaleString()}`;
                    
                    grossTotal += gross;
                    commissionTotal += commission;
                });
                
                document.getElementById('grand-gross-total').textContent = `Rs ${grossTotal.toLocaleString()}`;
                document.getElementById('grand-commission-total').textContent = `Rs ${commissionTotal.toLocaleString()}`;

                let onlineTotal = 0;
                let onlinePending = 0;
                let onlineReceived = 0;
                
                document.querySelectorAll('#online-payments-list > div').forEach(row => {
                    const amt = parseFloat(row.querySelector('.online-amt').value) || 0;
                    const status = row.querySelector('.online-status').value;
                    
                    onlineTotal += amt;
                    
                    if (status === 'pending') onlinePending += amt;
                    else onlineReceived += amt;
                });

                document.getElementById('online-pending-display').textContent = `Rs ${onlinePending.toLocaleString()}`;
                document.getElementById('online-received-display').textContent = `Rs ${onlineReceived.toLocaleString()}`;

                const fuel = parseFloat(document.getElementById('exp-fuel').value) || 0;
                const food = parseFloat(document.getElementById('exp-food').value) || 0;
                const maint = parseFloat(document.getElementById('exp-maint').value) || 0;
                const expensesTotal = fuel + food + maint;

                const opening = parseFloat(document.getElementById('opening-balance').value) || 0;
                const final = opening + commissionTotal - onlineTotal - expensesTotal;

                document.getElementById('sum-opening').textContent = `Rs ${opening.toLocaleString()}`;
                document.getElementById('sum-commission').textContent = `Rs ${commissionTotal.toLocaleString()}`;
                document.getElementById('sum-online').textContent = `Rs ${onlineTotal.toLocaleString()}`;
                document.getElementById('sum-expenses').textContent = `Rs ${expensesTotal.toLocaleString()}`;
                document.getElementById('sum-final').textContent = `Rs ${final.toLocaleString()}`;
            },

            previewImage(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('proof-preview-img').src = e.target.result;
                        document.getElementById('proof-preview-img').classList.remove('hidden');
                        document.getElementById('proof-preview-area').classList.add('hidden');
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            },

            submitReport(e) {
                e.preventDefault();
                if(!confirm("Submit this report?")) return;

                const opening = parseFloat(document.getElementById('opening-balance').value) || 0;
                const userCommission = this.data.currentUser.commissionRate || this.data.commissionSettings.defaultRate;
                
                const orders = [1, 2, 3].map(i => {
                    const qty = parseInt(document.getElementById(`order-qty-${i}`).value) || 0;
                    const rate = parseFloat(document.getElementById(`order-rate-${i}`).value) || 0;
                    const gross = qty * rate;
                    return {
                        type: `Type ${i}`,
                        qty: qty,
                        rate: rate,
                        gross: gross,
                        commission: gross * (userCommission / 100)
                    };
                }).filter(o => o.qty > 0);

                const onlinePayments = [];
                document.querySelectorAll('#online-payments-list > div').forEach(row => {
                    const inputs = row.querySelectorAll('input, select');
                    onlinePayments.push({
                        detail: inputs[0].value,
                        amount: parseFloat(inputs[1].value) || 0,
                        status: inputs[2].value
                    });
                });

                const expenses = [
                    { type: 'Fuel', amount: parseFloat(document.getElementById('exp-fuel').value) || 0 },
                    { type: 'Food', amount: parseFloat(document.getElementById('exp-food').value) || 0 },
                    { type: 'Maintenance', amount: parseFloat(document.getElementById('exp-maint').value) || 0 }
                ].filter(e => e.amount > 0);

                const totalGross = orders.reduce((acc, o) => acc + o.gross, 0);
                const totalCommission = orders.reduce((acc, o) => acc + o.commission, 0);
                const totalExpenses = expenses.reduce((acc, e) => acc + e.amount, 0);
                const totalOnline = onlinePayments.reduce((acc, p) => acc + p.amount, 0);
                const finalAmount = opening + totalCommission - totalOnline - totalExpenses;

                const newReport = {
                    id: 'rep-' + Date.now(),
                    riderId: this.data.currentUser.id,
                    riderName: this.data.currentUser.name,
                    date: new Date().toISOString().split('T')[0],
                    createdAt: new Date().toISOString(),
                    openingBalance: opening,
                    orders: orders,
                    onlinePayments: onlinePayments,
                    expenses: expenses,
                    totalGross: totalGross,
                    totalCommission: totalCommission,
                    totalExpenses: totalExpenses,
                    finalAmount: finalAmount,
                    status: 'pending',
                    proofImage: document.getElementById('proof-preview-img').src || null,
                    shiftDuration: '8h 30m',
                    commissionRate: userCommission
                };

          // this.data.reports.push(newReport);  // ✅ HATAO - LINE 852
// this.saveData();  // ✅ HATAO - LINE 853
await window.db.collection('reports').add(newReport);  // ✅ LINE 852-853 REPLACE
alert('Report Submitted Successfully!');
this.navigate('rider-dashboard');

            showAttendanceCalendar(riderId) {
                const rider = this.data.users.find(u => u.id === riderId);
                if (!rider) return;

                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                const firstDay = new Date(currentYear, currentMonth, 1).getDay();

                const modalContent = document.getElementById('modal-content');
                const overlay = document.getElementById('modal-overlay');

                // Generate calendar days
                let calendarHTML = '';
                // Empty cells for days before start of month
                for (let i = 0; i < firstDay; i++) {
                    calendarHTML += `<div class="calendar-day empty"></div>`;
                }
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const attendance = this.data.attendance.find(a => a.riderId === riderId && a.date === dateStr);
                    
                    let dayClass = 'empty';
                    let statusIcon = '';
                    
                    if (attendance) {
                        if (attendance.status === 'present') {
                            dayClass = 'present';
                            statusIcon = '<i class="fas fa-check text-xs"></i>';
                        } else if (attendance.status === 'absent') {
                            if (attendance.isReliefDay) {
                                dayClass = 'relief';
                                statusIcon = '<i class="fas fa-umbrella text-xs"></i>';
                            } else {
                                dayClass = 'absent';
                                statusIcon = '<i class="fas fa-times text-xs"></i>';
                            }
                        }
                    }

                    calendarHTML += `
                        <div class="calendar-day ${dayClass}" onclick="app.toggleAttendance('${riderId}', '${dateStr}')">
                            <span class="font-bold">${day}</span>
                            ${statusIcon}
                        </div>
                    `;
                }

                modalContent.innerHTML = `
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h2 class="text-xl font-bold text-gray-800">${rider.name}</h2>
                                <p class="text-sm text-gray-500">Attendance - ${new Date(currentYear, currentMonth).toLocaleDateString('en-PK', { month: 'long', year: 'numeric' })}</p>
                            </div>
                            <button onclick="app.closeModal()" class="text-gray-400 hover:text-gray-600 p-2"><i class="fas fa-times text-xl"></i></button>
                        </div>

                        <div class="flex justify-center gap-4 mb-4 text-xs">
                            <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-green-200 border border-green-500"></div> Present</div>
                            <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-200 border border-red-500"></div> Absent</div>
                            <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-blue-200 border border-blue-500"></div> Relief</div>
                        </div>

                        <div class="attendance-calendar mb-4">
                            <div class="text-center text-xs font-bold text-gray-500 py-2">Sun</div>
                            <div class="text-center text-xs font-bold text-gray-500 py-2">Mon</div>
                            <div class="text-center text-xs font-bold text-gray-500 py-2">Tue</div>
                            <div class="text-center text-xs font-bold text-gray-500 py-2">Wed</div>
                            <div class="text-center text-xs font-bold text-gray-500 py-2">Thu</div>
                            <div class="text-center text-xs font-bold text-gray-500 py-2">Fri</div>
                            <div class="text-center text-xs font-bold text-gray-500 py-2">Sat</div>
                            ${calendarHTML}
                        </div>

                        <div class="bg-gray-50 rounded-lg p-3 text-sm text-gray-600">
                            <p class="mb-2"><strong>Instructions:</strong></p>
                            <ul class="list-disc list-inside space-y-1 text-xs">
                                <li>Click on any date to toggle attendance</li>
                                <li>First absence is automatically marked as relief day</li>
                                <li>Subsequent absences will incur wage deductions</li>
                            </ul>
                        </div>
                    </div>
                `;

                overlay.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
            },

            toggleAttendance(riderId, dateStr) {
                const existing = this.data.attendance.find(a => a.riderId === riderId && a.date === dateStr);
                const month = new Date(dateStr).getMonth();
                const year = new Date(dateStr).getFullYear();
                
               const docId = `${riderId}_${dateStr}`;  // ✅ LINE 1353 ADD

if (existing) {
    if (existing.status === 'present') {
        // Update to absent
        const monthAbsences = this.getMonthlyAbsences(riderId, month, year);
        const isReliefDay = monthAbsences.length === 0;
        await window.db.collection('attendance').doc(docId).update({  // ✅ LINE 1358-1361 REPLACE
            status: 'absent',
            isReliefDay: isReliefDay
        });
    } else {
        // Delete record
        await window.db.collection('attendance').doc(docId).delete();  // ✅ LINE 1366 REPLACE
    }
} else {
    // Add present
    await window.db.collection('attendance').doc(docId).set({  // ✅ LINE 1374-1378 REPLACE
        riderId,
        date: dateStr,
        status: 'present',
        isReliefDay: false,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
}

            renderAIParser() {
                document.getElementById('page-title').textContent = 'AI Parser';
                const container = document.getElementById('main-container');
                
                container.innerHTML = `
                    <div class="fade-in pb-20 space-y-4">
                        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-5 rounded-2xl">
                            <h3 class="font-bold mb-1"><i class="fas fa-robot mr-2"></i>AI Order Parser</h3>
                            <p class="text-sm text-purple-100">Paste customer message to extract items</p>
                        </div>

                        <div class="section-card">
                            <textarea id="ai-input" rows="4" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-sm" placeholder="Example: 2 kg aloo, 1 dozen ande, double roti 4"></textarea>
                            <button onclick="app.parseMessage()" id="parse-btn" class="w-full mt-3 bg-indigo-600 text-white py-3 rounded-lg font-bold">
                                <i class="fas fa-magic mr-2"></i>Parse Message
                            </button>
                        </div>

                        <div id="ai-output-section" class="hidden">
                            <div class="section-card">
                                <h3 class="font-bold text-gray-800 mb-3">Parsed Items</h3>
                                <div id="ai-output" class="space-y-2"></div>
                                <div class="flex gap-2 mt-4">
                                    <button onclick="app.copyOrderList()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium">Copy</button>
                                    <button onclick="app.printOrderList()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-medium">Print</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            parseMessage() {
                const input = document.getElementById('ai-input').value.trim();
                if (!input) return;

                const btn = document.getElementById('parse-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Processing...';
                btn.disabled = true;

                setTimeout(() => {
                    const items = this.aiParseLogic(input);
                    this.displayParsedItems(items);
                    btn.innerHTML = '<i class="fas fa-magic mr-2"></i>Parse Message';
                    btn.disabled = false;
                }, 1000);
            },

            aiParseLogic(message) {
                const items = [];
                const lowerMsg = message.toLowerCase();
                
                const patterns = [
                    { regex: /(\d+\.?\d*)\s*(kg|kilo|kilogram|kgs)\s+(\w+)/g, type: 'weight', unit: 'kg' },
                    { regex: /(\d+)\s*(dozen)\s+(\w+)/g, type: 'dozen', unit: 'dozen' },
                    { regex: /(\d+\.?\d*)\s*(liter|litre|l|ltr)\s+(\w+)/g, type: 'volume', unit: 'L' },
                    { regex: /(\d+)\s*(single|double|pack|bottle|can)?\s*(\w+)/g, type: 'piece', unit: 'pcs' },
                    { regex: /(\d+)\s*(gm|g|gram)\s+(\w+)/g, type: 'weight', unit: 'g' },
                    { regex: /(\d+)\s+(\w+)/g, type: 'piece', unit: 'pcs' }
                ];

                const seen = new Set();
                
                patterns.forEach(pattern => {
                    let match;
                    while ((match = pattern.regex.exec(lowerMsg)) !== null) {
                        const qty = parseFloat(match[1]);
                        const descriptor = match[2] || '';
                        const itemName = match[3];
                        const key = `${itemName}-${qty}-${descriptor}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            items.push({
                                name: itemName.charAt(0).toUpperCase() + itemName.slice(1),
                                quantity: qty,
                                unit: pattern.unit,
                                descriptor: descriptor
                            });
                        }
                    }
                });

                return items;
            },

            displayParsedItems(items) {
                const outputSection = document.getElementById('ai-output-section');
                const output = document.getElementById('ai-output');
                
                if (items.length === 0) {
                    alert('Could not parse items. Try simpler format.');
                    return;
                }

                output.innerHTML = items.map((item, idx) => `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <span class="w-6 h-6 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-xs font-bold">${idx + 1}</span>
                            <span class="font-medium">${item.descriptor ? item.descriptor + ' ' : ''}${item.name}</span>
                        </div>
                        <span class="font-bold text-indigo-600">${item.quantity} ${item.unit}</span>
                    </div>
                `).join('');
                
                outputSection.classList.remove('hidden');
                this.currentParsedOrder = items;
            },

            copyOrderList() {
                if (!this.currentParsedOrder) return;
                const text = this.currentParsedOrder.map((item, i) => 
                    `${i + 1}. ${item.descriptor ? item.descriptor + ' ' : ''}${item.name} - ${item.quantity} ${item.unit}`
                ).join('\n');
                navigator.clipboard.writeText(text);
                alert('Copied to clipboard!');
            },

            printOrderList() {
                if (!this.currentParsedOrder) return;
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                    <head><title>Order List</title></head>
                    <body style="font-family: Arial; padding: 20px;">
                        <h2>Order List - ${new Date().toLocaleString()}</h2>
                        <table border="1" cellpadding="10" style="border-collapse: collapse; width: 100%;">
                            <tr style="background: #4f46e5; color: white;">
                                <th>#</th><th>Item</th><th>Qty</th><th>Unit</th>
                            </tr>
                            ${this.currentParsedOrder.map((item, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${item.descriptor ? item.descriptor + ' ' : ''}${item.name}</td>
                                    <td>${item.quantity}</td>
                                    <td>${item.unit}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
            },
